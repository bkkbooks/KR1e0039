body:
  text: 左氏傳說卷八宋吕祖謙撰襄公諸侯同伐齊齊侯禦諸平隂十八年鞍之戰大敗齊師成二年晉之伐齊其大戰有二當齊頃公之時鞍之戰郤克為帥大敗齊師齊靈公之時平隂之戰荀偃將中軍亦敗齊師此兩戰有難易不同當郤克與頃公對敵以頃公之所為克之勝甚難荀偃與靈公為對敵以靈公之所為偃之勝甚易考其事大槩可見郤克之戰當時頃公氣吞晉師如余姑翦滅此而後朝食如求逄丑父三出三入於晉軍之閒到得敗北之後猶且如此其君之强勇可知其臣如髙固桀石以投人繫桑本以徇曰欲勇者賈余餘勇其臣又可知故郤克之勝為甚難若荀偃之遇靈公而靈公則昏懦之君觀范宣子告析文子自其鄉入文子告公公恐遂登巫山以望晉師晉人使司馬斥山澤之險僞以斾而疏陳之使乘車者左實右僞以斾先輿曳柴而從之且以山上空張許多旌旗又曳柴以揚塵皆以虛聲恐嚇如入無人之境丙寅晦齊師夜遁到得入平隂圍盧伐雍門洋洋然如入無人之境舉此以見得偃之勝甚易以兩戰觀之郤克成功之難而既勝之後羣帥相讓不敢居其功如范文子至不敢先入郤伯曰君之訓也二三子之力也臣何力之有焉范叔曰庚所命也克之制也燮何力之有焉欒伯曰燮之詔也士用命也書何力之有焉退然不居其功如此此其所甚難然而未幾猶且滿盈君臣驕縱如郤克則辱於齊侯如晉侯則不敬魯君夫成大功而能警戒相讓其後尚不免有滿盈之心況荀偃克兹孱敵如入無人境其功初不足道而且以功自居宜其一勝之後霸業遂衰合兩戰論之猶有可言者鞍之戰雖止於敗齊師然於頃公之强而賔媚人致賂求和親朝晉則是一戰之後能服齊也平隂之戰晉師直至其城下靈公雖卻走郵棠太子光叩馬止之能料其晉師將退而齊侯終不下晉及莊公即位大隧之盟方及晉平以此見晉之君臣皆不足此霸業所以衰也齊侯遂東太子光後光即位殺太子牙十九年齊侯娶于魯無子其姪生光以為太子仲子生牙戎子請以為太子許之仲子曰不可公曰在我而已遂東太子光到得靈公疾甚崔杼逆太子光而立之殺戎子執公子牙殺二人而太子光即位莊公得國皆是崔杼之力其終何故見殺於崔杼之手當時立得不正了所謂以此始亦必以此終得之始初不正國柄自然歸崔杼靈公既廢莊公莊公乃乘君父危篤之時却私與强臣深結殺戎子而即位得之不以其道惟其得之非正故杼恃援立之功而不可制方莊公即位未幾杼遂殺髙厚而兼其室便是崔杼弒君履霜堅氷之漸在此使莊公雖不貪淫亦被殺緣莊公初立之時不正故也古之人行一不義殺一不辜而得天下皆不為正此之謂也范宣子逐欒盈欒盈復入于晉二十三年欒盈奔楚初無大罪范宣子直以其勢位逼己兩不相容而逐之盈亡之後自楚適齊自齊入絳幾危晉室盈之罪尤大當時宣子逐盈之勢甚迫既禁錮之使無容足之地所以激成欒盈之禍宣子雖先逐欒盈晉亦從此衰夫晉以堂堂之大國逐一亡大夫東西南北任其所之可也何至勤天下之諸侯見得霸業不競故諸侯得以輕侮晉室而至於失諸侯也古者大夫出疆三年不反然後收其田里欒盈無大罪乃兩合諸侯無所容於天地間其勢無聊安得而不作亂非其本心使宣子疾之不如此之甚欒盈亦不至如此罪在宣子不可專罪盈雖然就盈身上論亦不得無罪自欒書弒厲公勢已炙手可熱繼以欒黶驕狠侈虐上無君下無同列以欒書之强又繼之以黶之虐欒氏之門如烈火炎炎可畏盈於此繼祖父之業正當恐懼修省尚恐不濟却又如何用箕遺黃淵嘉父等人以固其黨使其如楚子文自毁其家以紓楚國之難尚未能免却招許多人如以火濟火其勢方炎正滿盈之後不能自損抑又却如此雖宣子之罪而縱風止炎抱薪救火遂致滅欒氏之門實欒盈之罪也晉欒盈復入于晉入于曲沃二十三年晉欒盈得罪於晉遂出奔齊自齊復入舊邑帥曲沃之甲以晝入絳夫晉以堂堂之大國范宣子為政不設戒備而使叛臣得日以兵而入於國都當時晉國之社稷不亡若綴旒然使向者因欒氏之汰諸侯從而救之則晉之不亡者幾希宣子秉政而至此蓋緣他倚靠外面裏面都不曾謹封疆明斥候使持兵直入國都幾亡社稷與其外面號令諸侯何如自家謹守分疆宣子初當盈奔在外時非是不知戒觀其兩次大合諸侯以重錮欒氏宣子自以為諸侯決不受欒氏矣他只管去外面理會裏面守備都懈怠了及盈既入曲沃宣子都不知前面更無一人之禦蓋緣只去外面理㑹然當時處這大亂當此大變粗能支持致敗欒氏存晉社稷者其謀皆出於樂王鮒欒氏之入也宣子倉皇無計王鮒教之以奉君走固宫又教之以欒所得惟魏氏而可强取使當時不從王鮒奉君之謀則欒氏之勢殆未可禦不從強取魏氏之謀則魏氏以佐悼公之智而助欒氏未易可去王鮒必欲劫而取所以終敗欒氏其功亦大矣然看得王鮒之功固有力於晉亦所以為晉之害王鮒在晉一嬖臣也安晉之謀不出於晉之士大夫而出於嬖幸之王鮒則晉君豈不輕視士大夫而益重嬖臣之寵乎故使嬖臣之權愈重而晉之愈不振而霸業愈衰者士大夫之過也季武子無嫡子公彌長而愛悼子二十三年季武子無嫡子公彌長而悼子少武子偏愛廢長立少始者訪於家臣申豐申豐據義守正不從其言退歸盡室將行他日又訪之對曰其然將具敝車而行武子廢長之心稍止他日又訪臧紇紇諂諛容悅之人欲將迎武子之意乃曰飲酒吾為子立之乃廢公鉏立悼子大抵人心未定之際最看他問得甚底人彼其欲為不正之舉其初心未敢便為使其問得正人則陳善閉邪私心決不敢啓若是問一箇容悅諂諛之人逢其惡其事易做得成唐明皇雖有廢立太子之意問張九齡九齡據義守正不從其言明皇雖有廢立之意終未敢為到得訪李林甫林甫便承當此事使明皇一日殺三子明皇之張九齡武子之申豐也明皇之林甫武子之臧武仲也古之人君必使朝廷之上藹藹然多吉士皆無一憸人厠於其間蓋平時未見其害正恐當是非未決邪正未分時若有一箇小人逢君之惡便到覆亡國家如間時固未害何故上之人未有所問到得上之人一有所問小人便因風縱燎推波助瀾以此知古之君子在朝不可容一小人蓋為此然而臧紇助武子立少蓋欲依托季氏自固權位然武仲所以出奔亦緣此雖然目下甚得武子意然公鉏却怨他公鉏後來却效臧紇之舉以脅季武子故孟孫氏卒廢秩立羯武子問之鉏即以何長之有惟其才也之言劫武子蓋武子廢鉏之時有擇才而立之語武子懷前之歉遂不復問武子正卿也鉏陪臣也武子父也鉏子也以正卿而受制於陪臣以父而受制於子人心不可有所歉也如此臧武仲所以成季武子之志不過欲媚武子以固有其權而已使其當初不媚武子未必便失其位以此知天下事不可計校惟其守正道則位可常有小人當以是為誡太史書崔杼弒君崔子殺之其弟嗣書而死者二人其弟又書南史氏聞太史盡死執簡以往二十五年齊崔杼弒莊公其一時凶威虐焰舉國無一人敢禦太史書崔杼弒君已自是難崔杼殺太史而其弟嗣書則又難二人死而其弟復嗣書則尤難且三人死而其弟又書則愈難南史氏執簡以往則又愈難大抵君子守正果堅則小人雖有如此凶威虐焰終不能移奪然這裏須看得非偶然如此蓋文武成康涵養數百年風俗所以有此且以本朝論之自太祖太宗真宗以來朝廷之上養成一箇愛君憂國犯顔逆耳底風俗故一時忠臣輩出當時如青苗如市易如保甲如户役爭者殆未以一二計固不可悉數止以一事論之李定以資淺入臺而宋敏求從之而去李大林繼之又去蘇頌又去黜者相踵而爭者方切當是時天下有三舍人之號齊之三太史即我宋之三舍人也觀三太史之事當知文武成康涵養風俗之所致觀三舍人之事當知我祖宗涵養風俗之所致學者不可不知蒍掩為司馬子木庀賦掩書土田二十五年蒍掩為司馬子木使庀賦掩書土田有曰町原防井衍沃此得井田之制先輩嘗論先王井田之制如畫棊局有邱陵原隰必不可行遂謂井田之制不可行於後世觀此則先王之制初未嘗如棊局何故其言原防之閒其地不得方正如井田則別為小頃町至衍沃平美之地則用井田之法先王之制曷嘗槩之以棊局之畫哉觀此則前輩疑井田之論破矣程鄭卒子産始知然明二十五年晉程鄭卒子産始知然明問為政對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子太叔曰他日吾見蔑之面而已今吾見其心矣子産何故喜之如是之深蓋子産是箇要人合己者何故他却是箇善善惡惡明白底人然明如此說話有以合己故深喜之不然刑書之事何其聽之不如是之喜大抵人最怕要人合己使子産聞與其殺不辜寧失不經之言而喜之如是則子産是進一步處秦伯使其弟針如晉叔向命召行人子員子朱曰當御三云叔向不應二十六年秦伯使其弟針如晉修成叔向命召行人行人是通國好主辭命之官子朱亦居行人之職而次又輪當到他朱自以為當御三云叔向不應不勝其忿遂撫劒從叔向叔向亦不平拂衣從之平公曰晉其庶乎吾臣所爭者大這一段事儘有可論就叔向身上言之叔向為晉之卿既知子朱是姦以事君者平時當告平公使黜之無使居行人之職則可也叔向既使之居是職而不使之任是事叔向之罪一也當時叔向要命行人子貟而不命子朱既不能去時論到却潛召子貟豈别無善道理可以調護至他三說又漠然不應反激子朱之怒遂致按劒相逐僅免害人此叔向之罪二也蓋叔向自謂我晉之上卿下視行人之賤直欲以氣陵之不然正當召他而乃召子貟豈無一箇委曲調護道理惟其欲以氣陵之所以至此若就平公身上言之雖是叔向之罪亦平公之暗有以致之平公庸暗之君居朝之日不能正色端拱威稜氣焰足以震壓小人之心豈有行人敢持刃於朝略無顧忌平公庸暗之甚方且曰吾臣所爭者大晉其庶乎豈有行人敢撫劒以逐卿於朝近而朝廷猶如此逺而四境爭鬪相尋略無顧忌直視為故常矣此其為至庸最暗處大抵暗有三等有一等臨事雖知之而無以鎮服其臣而其臣至於無所畏者此暗而未甚者也至於其臣如此至於漠然而不知者此暗之甚者也至於其臣如是而反以為興國之兆者此以亂為治以危為安以惡為善又暗之極者也平公之暗正是暗之極者幸而得一師曠與之言曰公室懼卑臣不心競而力爭不務德而爭善若是心競務德便是唐虞之朝百僚師師百工惟時氣象至於撫劒相逐於朝事固無有未說唐虞雖當霸主之盛如文公悼公之時朝廷之上六卿協和便相推遜亦無此等事以是見得平公霸業之閒至於如此遂衰宋寺人伊戾無寵於太子痤譖諸公而害之二十六年宋寺人伊戾無寵於太子痤欲害太子當時內則有夫人之欲立而為之主其謀於內又有左師之惡太子而為之和其謀於外主之於內和之於外此所以終害太子這一段就宋公身上看方楚客過宋太子以其與己有舊請野享之伊戾請從之公曰夫不惡汝乎是平公固知太子之惡伊戾既而為伊戾逺近之言所惑即遣其往伊戾才往便謀害太子及其往則欿用牲加書徴之馳告公曰太子為亂公又㑹說為我子又何求是公又果知太子決不為變伊戾之言決不可信既而又為伊戾欲速言所惑使人窺之卒囚太子看此一段便見得平公都暗矣大抵人之暗者遇事之始未嘗不曉得一二及其被人惑後則漸漸入於暗而不自知使平公能充此明守之能堅終必不至如此昏暗惟其不能於明處思量所以不免被人惑向使能就他夫不惡汝乎與為我子又何求之說上守之以堅則伊戾自無所容其奸矣就左師身上看宋向戌能弭諸侯之兵當時號為名卿乃內與寵姬用謀戕害冢嗣人臣大惡亦無過於此以戍之罪雖誅之可也平公方且置而不問平公之心必謂戍能弭諸侯之兵故可以功掩過殊不知害國本大惡也弭諸侯之兵小善也髮毫之善豈能掩邱山之惡平公之暗又不言而可知若就佐身上說則尤有可論者夫人同謀共殺太子他日居太子之位者佐也是禍根皆本於佐是佐為惡首佐處此嫌疑之地何故太子却說道惟佐也能免我又與之期約曰日中不來吾知死矣佐之處此地何故能使太子不疑而反求解於佐以此見得佐平日於孝友慈祥上做工夫浹洽於兄弟之閒至使危疑之際太子信而不疑佐固可取然至左師聒而而與之語遂為戍所留過期而不報卒致太子於死地是佐以曾於平公前為太子解了聒語之際操守不定為他移換痤死即為太子想是時亦為利所動因救太子不力使佐於此時操守若定則身處嫌疑之地既為太子解了當急報太子如救焚拯溺既可以脫太子之死又可以去一己之惡名何暇顧向戌之言論其始則固可取論其後則佐雖誅首可也宋向戌欲弭諸侯之兵以為名二十七年宋左師請免死之邑同上宋向戌欲㑹晉楚諸侯以弭兵左氏書曰欲弭諸侯之兵以為名左氏書得極好最得法觀左氏書以為名三字便見得向戌之弭兵非是果欲息民欲求息民之名耳當時大國惟晉與楚向戌善於趙文子又善於令尹子木晉楚既從諸小國自不得不赴故卒成弭兵之一事其後向戌挾弭兵之事又書左師請賞公與之邑六十則向戌弭兵之意非果欲息天下之民平諸侯之爭區區為一己之利而已上而為名下而為利左氏於前書弭兵為名既有以誅其心於後則記其請邑之事又有以正其罪左氏真有書法則戌弭兵之謀其心固可知矣當時子罕之言猶有可論者以是而論弭兵以為名是固可辭及其以邑示子罕子罕削而投之左師便辭邑向氏欲攻司城左師曰夫子存我德莫大焉又可攻乎其初可罪至此而能悔亦可嘉又須看弭兵是全生靈之事息戰爭之苦固善然惟聖人能內外無患自非聖人內寧必有外憂此意正與孟子入則無法家拂士之意同又如本朝李文靖為相當時南北皆未寧或至旰食羽檄日至廟堂王文正每以為憂歎曰我輩安能坐致太平得優游無事耶文靖公曰少有憂勤足為警戒參政謂今日多事萬一邊鄙既寧竊恐朝廷事反多於今日參政自將見之其後澶淵既盟之後及北講和西戎納款而東封西祀搜講墜典靡有暇日丁謂王欽若諸人相繼更進迭用天下紛紛果如文靖之言子罕之言亦文靖之意左氏傳說卷八
