body:
  text: 左氏傳說卷四宋吕祖謙撰僖公晉侯侵曹伐衛二十八年戰于城濮二十八年晉文公凡出外許多時直到成霸業皆是趙衰狐偃二人為之謀主文公自僖之二十四年入國至僖二十七年搜于被廬方始命狐偃將上軍狐偃則讓於狐毛而佐之命趙衰為卿則又讓於欒枝先軫若以後世論之二人自入國便合處於髙官大職可也何故經涉許多年方命他將上軍及為卿之任他又相遜二人初不曾計較官職以此知二人是心腹宗臣與社稷同休戚初不論職位之髙下又見得古之體國之臣但欲成國事不曾計較官職且如齊桓公之伯全在管仲仲只為下卿及平戎于王王以上卿之禮享之仲不敢受曰有天子之二守國髙在當時國子髙子常為齊上卿然國髙初無功於齊所以讓者是不計較官職之髙下漢髙祖之興張良實在三傑之列叔孫通初無大功後來立太子使叔孫通為太傅良止為少傅自常人處之必有憤然不平之心凡此皆國之宗臣初不曾計較官職髙下專以推賢讓能使之利害相謀是非相參而已又見人材不厭多夫晉文之有子犯亦猶齊桓之有管仲相似晉文一箇霸諸侯之規模皆是子犯出然文公之規模與齊桓大段不同桓公是三十年工夫方做得成所以優游文公兩三年盡做許多事所以急迫桓公雖有兵車之會然史無可書之事亦無可喜之功至於文公事業載在史冊粲然可觀如城濮一戰功業森然在目齊桓成霸業却無迹晉文公霸業便有迹桓公霸業緩成文公霸業速就此晉文所以不如齊桓處試又舉其大者言之如齊桓之興便去封已滅之衛歸公乘馬凡牛羊豕雞狗門材皆以與衛閔二年救邢復具邢器用而遷之又與城邢其存植亡國如此晉文公於僖二十八年伐衛使衛失國其一國君臣互相屠戮又執曹伯至使其國亂亡方復曹伯桓公封衛遷邢以存亡國文公執曹伯衛侯使其國亂桓公遷邢封衛一舉便得安迹文公復曹衛反使其國家危亂足見文公不如桓公處然不特此初晉文公於僖之二十三年欲歸國及鄭鄭文公不為之禮後來於僖之二十八年城濮既勝之後鄭伯使子人九行成于晉晉使欒枝與盟五月文公及鄭伯盟于衡雍凡與鄭盟者再矣亦可以釋怨至僖三十年復與秦圍鄭看得文公度量不廣未到坦然大度處所以記人之怨而不忘其不及齊桓又如此齊桓九合諸侯一正天下無非尊王室天子亦未嘗親出慰勞若文公踐土之盟河陽之狩兩屈天子之尊蓋周王不畏齊而畏晉天子視齊桓乃忠臣不過一誠實而晉文權謀髙大所以畏晉不畏齊也舉天子畏與不畏又見文公不如桓公看得晉文公既種種不如桓公然桓公霸業不繼而文公雖死霸業不絶何故只緣有一件勝如齊威此晉文所以霸業相繼不絶前說管仲一身任事不能為齊求人材而晉專務收人材看得晉國人材之盛皆出於狐趙初間使狐偃將上軍則讓於狐毛而佐之命趙衰為卿則讓於欒枝先軫及先軫死復使且居將中軍又佐之晉人材之所以盛緣狐趙之徒倡推賢讓能之風於上一國所以皆有此風至臼季見冀缺於田野之間其夫婦敬相待如賓臼季歸既薦之於文公文公以為下軍大夫以此見非特朝廷如此相遜而田野之間亦莫不皆然一國所以皆有推賢讓能之風趙衰狐偃實倡之也直至悼公時范宣子讓其下皆讓其波流之及直至如此故晉之霸業所以長久桓公之霸業所以不永也晉侯秦伯圍鄭鄭使燭之武說秦秦伯說與鄭人盟三十年秦穆公當時納晉文公使之有晉國者其德可謂甚大文公既立之後鑒晉惠公之事與秦穆公左右周旋盟會征伐未嘗不同然而後來秦晉同伐鄭秦納燭之武之說私與鄭盟而戍之秦之背晉亦要察其由若以惠公之事甚易見如秦納晉惠公時晉許秦地及歸又不與秦晉饑秦輸之粟秦饑晉閉之糴其曲直甚分明此固是曲在晉直在秦若以曲直未察之時論之曲全不在晉直全不在秦何故秦晉連兵伐鄭而穆公獨與鄭盟及子犯請擊秦晉文公却又說微夫人之力不及此此見晉文公不忘舊德處若把此一段看似乎直在文公到得殽之役又不是晉先犯秦秦先襲鄭然後先軫遂發命兵端又不在晉似乎曲又不在晉考其實事論之則不然晉之失秦有自來矣不獨因鄭當時天王出居于鄭晉與秦本要同出兵納王晉專功求霸故辭秦師順流而下秦穆公是曉了人豈不知他辭師之意其閒隙已自形見於此但未見於事晉文公驪姬之難受恩於秦其結好如此及到圍鄭一使燭之武說秦秦穆公便欣然與鄭盟何故以此知曲全在晉不在秦觀秦穆公恩意之於晉文甚拳拳不獨納他歸國既歸之後如後來吕郤之難將焚公宫晉侯潜㑹秦伯於王城瑕甥郤芮不獲公乃如河上秦伯誘而殺之又以三千紀綱之僕為晉文之衛其拳拳於晉當是時尚無疑晉文公之心自晉文辭師專功掠美之後其閒隙已自形見以此事迹上稽之則秦合與鄭盟不是曲在秦曲全在晉蹇叔言師之所為鄭必知之三十二年勤而無所必有悖心三十二年秦穆公興兵伐鄭而蹇叔諫勞師襲逺非所聞也師之所為鄭必知之且行千里其誰不知秦伯不用蹇叔之言終於出師所以有殽之敗論蹇叔諫秦伯一段為秦穆公謀甚忠後世論蹇叔能料事情於千里之外如此之審自今觀之大抵看書考古今成敗不當隨成敗論若以成敗看蹇叔為秦穆公逆料事情於千里之外如此精審雖著龜亦不過如是此未免為隨事迹論人若深考事情蹇叔意甚忠所以諫秦伯之辭當時所料未為精審如謂師之所為鄭未必知幸然鄭商人弦髙將市於周方知秦師之出以牛十二犒秦師詐為鄭辭以款秦師使傳告於鄭鄭聞其言然後使視客館方見束載厲兵秣馬以此知秦師出路上不遇弦髙鄭未必知秦未必不成功則蹇叔師行千里其誰不知之言未為精審這未見得事情舉此一段看古今成敗不當以迹看雖然蹇叔之言其中自有精審處若勤而無所必有悖心此兩句却最精審何故其勞師千里既無所成必不肯空手歸所以滅滑當時本要滅鄭不要滅滑所以既勤而無所所以滅滑而還果中蹇叔之所料當時秦聞鄭知便歸時尚可以全師蹇叔前幾句雖忠未料得事情惟是此兩句料得事情出所以最為精審文公諸侯朝晉元年衛成公不朝元年齊桓淮之㑹城鄫役人夜登丘而呼曰齊有亂晉文公之季年諸侯朝晉衛成公不朝使孔達侵鄭始者葵􅉌之㑹踐土之盟天下莫不從風而靡至末年齊一城鄫而役人至於夜呼諸侯朝晉而衛成至於不朝又使孔達奸盟以伐鄭是知力之果不足恃也大抵王霸之分王以德霸以力以德為尚則終始如一以力為尚未有始盛而終不衰者方霸者之盛時如葵丘之㑹踐土之盟諸侯見勢力之盛莫敢不赴其功之可喜若勝於王及至末年勢力之衰身未及死役人已有登邱之呼文公亦有衛侯不朝之事以此始信力之終不如德也先且居請君朝王臣伐衛元年晉襄公既祥使告諸侯而伐衛從先且音苴居之請也觀且居之言乃曰請君朝王臣從師晉侯朝王于溫先且居胥臣伐衛以此知春秋霸者之尊王皆非其本心蓋必有所為而然初不知君臣之大義倘使襄公不伐衛則不復為朝王之舉矣楚國之舉常在少者元年楚子立商臣為太子令尹子上曰楚國之舉常在少者觀此見蠻荆之與列國本不同大抵列國之所以為列國以其有三綱蠻荆之所以為蠻荆只緣無三綱三綱者君臣父子夫婦也以楚甲兵之衆土地之廣固足以抗衡列國至於傳國立嗣之際則失其大倫亂其大本所以多有戕弒之禍正緣無三綱故如此觀其上有天王而僭稱王號則無君臣之綱矣立嫡以長而常在少者則無父子之綱矣息媯繩於蔡哀侯而息遂見滅以息媯歸則無夫婦之綱矣三綱既絶此春秋所以擯之而不齒也大抵看書其間有兩句可以見得一國之風俗者最當深考這一段只看令尹子上說楚國之舉常在少者便可見一國之風俗學者不可不察秦伯復使孟明為政元年秦伯猶用孟明二年秦穆公用孟明有殽之敗左右皆罪孟明公獨舉周芮良夫之詩且曰孤實貪以禍夫子復使為政穆公悔過秦誓見之詳矣參之以此段方見得穆公自知得病源在於貪向使穆公不知病源所在則雖欲悔過亦無下工夫處惟穆公既自知得病源所以悔過又能刻意消除之此所以遂霸西戎大抵學者要做工夫亦須各自知得病源方會長進且如易之噬嗑卦口中有物欲噬而嗑之故謂之噬嗑其爻辭曰利用獄何取夫獄蓋獄之情有閒亦如口中有物須是推究獄情知其病之所在而噬嗑之殽之敗穆公再用孟明未足為難及彭衙再䘐之後猶用孟明實天下之至難也蓋一敗雖不足以沮穆公之心再敗而不沮者實寡穆公所以能為天下至難之事者只緣他見得定處故能信之不移任之不易也大凡人君任人須是要見得端的方能如此先且居將中軍趙衰佐之二年齊孝公繼桓公之後霸業遂替晉襄公繼文公之後霸業不衰者須是識得襄公所以勝孝公之大端處先軫一死既用其子且居將中軍初非以先軫死狄之故以此報之實且居有是能遂拔之元老大臣之中觀請君朝王一事亦足以見先且居之賢又如文公出奔以及於歸國定伯狐趙實有大功所謂佐命元勳是宜居尊位秉國政而後有以報之今襄公繼文之後乃以先且居將中軍而趙衰佐之衰亦不以元勳自居甘處其下此見得趙衰乃愛君體國與國同休底人故但知一意為國理㑹人材初不計校祿位之髙下惟上有好賢之君下有推忠之臣襄公勝得孝公處大端在此晉人懼無禮於公請改盟三年晉襄公以魯文公朝晉之緩使陽處父盟公以恥之又懼其無禮於公請改盟大抵國之盛時雖有一二事不是卒未見其害蓋天下畏其强不敢與之校故襄公雖以大夫之卑盟國君之尊魯之君臣熟視亦不敢校至於改盟魯亦惟命是聽在當時雖未見其害馴致衰世平公襲其迹而為之欲改衛盟衛既叛而不從遂至兵連禍結數年不解正緣襄公做得樣子不是此所以後世蹈之有其害也楚滅六蓼五年邾滅須句僖二十一年邾滅須句楚滅六蓼夫須句司大皡之祀六蓼實臯陶之後此皆先王所封諸侯自唐虞三代以至春秋之初千百世綿延而皆不廢絶何故才入春秋之世便見屠戮蓋須句六蓼皆小國所以不廢於春秋之前者蓋向時閒有聖賢之君以振作之風聲氣習尚有典刑老成人相與維持故得世守其祀所以雖小而僅存至此先王德澤既已斬絶漸入春秋戰國氣象故先王之諸侯亦不能自存此最見得風聲氣習之大推移習俗之大變革處學者當子細看到此又須看得天下大𫝑與戰國漢唐相接晉搜于夷易中軍六年晉國之霸固賴賢才衆多然亦有偏處大抵天下之事有一利必有一害出乎此必反乎彼最不要流入于一偏善為治者常就一偏處救方晉之盛時英豪滿朝皆能率職勸功聽命之不暇雖賴其力及其後君上之權浸移於臣下試舉一二端論之如襄公之歸秦囚先軫則不顧而唾則有無君之心夷之搜陽處父則終於易中軍則專君上之權此二人皆已暗移易了惟其積而不能收故其流弊至於厲公之弒馴而至於六卿之分晉正緣偏於此不能收其權而終至於亡國也是知權不可弛患不可不自微時制士會如秦納公子雍六年晉納捷菑于邾十四年晉文公之後襄靈二三君所以不墜霸業者趙宣子之力居多故當時號為名卿而左氏亦稱以賢大夫然考其處大事則有若可疑者天下之𫝑內與外而已內事莫大於立君外事莫大於伐國襄公卒宣子欲結秦援使先蔑士會如秦納公子雍未幾迫於穆嬴與國人之大義改立靈公是其立君之不審也邾文公卒宣子以諸侯之師八百乘納捷菑于邾既而邾辭以齊出貜且長宣子以其辭順遂還師此是伐國之不審也夫宣子處大事如此何以能光輔晉君使霸業纍葉不衰蓋宣子亦有長處只緣他能不遂過飾非始雖不審繼而能改此所以轉危而為安易非而為是不失為當時之名卿是知改過善之大者也非特為國如此大抵學者改過亦當如此趙孟殺公子樂立公子雍六年郤缺請復衛田七年八年士會在秦七年十三年晉趙宣子秉國政當時謀臣非不多如襄公卒欲立公子雍賈季欲立公子樂宣子不從賈季之言遂殺公子樂至郤缺請復衛田引六府三事趙宣子因而舉匡戚之田申虎牢之境盡還於衛立君之事既不從賈季然一聞郤缺之言遂捨己得之田地棄之於衛士會在秦賈季在狄中行桓子請復賈季郤缺請復士會宣子不從中行桓子而從郤缺歸士會於秦何宣子於他人之言皆不從而郤缺每言輒聽自三代以後至春秋閒正心誠意修身齊家之學不講故言語無力不能動人大率要得言語動人須是自裏面做工夫出來郤缺耕於田野耒耜之際其妻饁之敬相待如賔則知郤缺工夫皆自裏面做出來故其言語有力足以動人也賈季怨陽子易班六年先克奪蒯得田八年晉自文襄以來人材衆多然人材既多則不能無爭陽處父易賈季之班賈季乃使續簡伯殺陽處父先克爭箕鄭父之位將奪蒯得之田亦至於相屠滅蓋人材之多固是國家之福須是上面有一箇總統處然上之人苟無以總其要會平其猜疑杜其閒隙引其禮遜使有才者獻其才智者獻其智則才者以才相戕智者以智相謀當文公之時人材非不多然不至於爭者有文公總統其會要也襄靈之際往往多是先朝故臣然上無賢君以總統故至於相戕相賊無所顧忌如此臯陶謨曰翕受敷施九德咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝自俊乂在官以上是唐虞總天下人材處自百僚師師以下是唐虞人材能師師相遜如此有前一節又無後一節不足以見唐虞之氣象晉襄時正緣有後一節無前一節所以其害如此范山言晉可圗九年范山言於楚子曰晉君少不在諸侯北方可圗也楚子遂伐鄭以此見外域才見中國衰便來陵犯如齊桓之前楚固强矣自召陵一勝楚遂不敢與中國爭桓公既衰楚遂伐宋敗襄公于泓自晉文城濮一勝楚又衰至靈公時去城濮之勝十餘年楚輒敢陵犯中國之衰而後入數十年閒須用一次鎮壓之方俯首帖耳不敢校故唐虞五載一巡狩周十二年一巡狩皆是欲時復一提撕整頓過故天下有姦謀邪志者不敢作不特外患小人亦然左氏傳說卷四
