body:
  text: 左氏傳說卷五宋吕祖謙撰文公夷之搜士縠將中軍八年先克言狐趙之勳不可廢八年齊桓公後繼之以孝公霸業墜晉文公後繼之以襄公霸業不墜論來善繼前人之業莫善於襄公莫不善於孝公考二國所以興亡齊之霸業雖衰於孝公齊之亡形不成於孝公晉之霸業雖繼於襄公晉之亡形却成於襄公所當精察孝公不過委靡無志失霸業而已襄公當時自殽之戰名為繼前人之業諸侯又服從何故亡形成於此蓋襄公之權移於臣下所以後來六卿分晉自襄公造出來且如自殽之戰論之方其在喪服之中從先軫至既戰勝舍三帥以從文夫人之請先軫怒不顧而唾已失君臣之義後來襄公依舊敬先軫先軫之志不衰若把來做好事論襄公能用直言能待故老不知失君臣之義正在此到得夷之搜時要立中軍帥其中又無所主大抵晉之中軍帥秉國政如後世兼將相者最是國之重任君之大事初襄公欲使士縠將中軍謀既定先克說狐趙之勳不可廢也公從之又使狐射姑將中軍趙盾佐之此是謀不定到陽處父至自溫又改搜于董又改趙盾將中軍狐射姑佐之謀中軍帥襄公全無所主頃刻閒三次改易人君大權何有自此趙盾有弒靈公之難中行偃有弒厲公之難自此馴致六卿分晉晉遂亡論來當時虗心任賢固可以成霸業然全無所主不知君道權安得不下移所以謂晉亡形成於襄公襄公但知虗心任人不看洪範三德所謂惟辟作福惟辟作威惟辟玉食權皆在上初不知虗心與秉權兩者何嘗相妨只看晉文公可見當時以大者論之謀中軍帥問於趙衰衰對曰郤縠可乃使將中軍當時何嘗不虗心但不曾如此紛紛不定其中自有所主大抵人君用人固當虛心又當中有所主為君之道禍福相半遂至於亡西乞術來聘十二年西乞術聘魯襄仲辭玉西乞術一時應對之閒文辭可觀襄仲遂曰不有君子其能國乎國無陋矣厚賄之何襄仲一聞其言便信其為君子且知其國無陋何故蓋春秋去三代尚近人之氣質尚厚巧言令色者尚少至後世則氣質漸薄其言始不可信矣夫子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行自春秋至孔子方百有餘年風俗推移其言便不可信如此況後世乎秦伐晉胥甲趙穿無功十二年秦伐晉晉與秦戰胥甲趙穿干紀犯令當軍門而呼帥遂無功而還晉治其罪殺胥甲恕趙穿自此以後趙穿順長其惡馴致弒君以此見權綱所在不可一日失晉所以不治趙穿當時不過謂穿是晉之壻不知其來有自惟當時不治趙穿之罪不知履霜堅氷之戒遂至穿後來去弒靈公然此事其端又出於晉文初晉文公遣顛頡魏犫去伐曹令無入僖負羈之宫魏犫顛頡至焚其宫文公止殺顛頡以徇于師以魏犫為才而免之所犯同而一誅一赦由文公倡之於先故襄公亦學之於後循習其弊至此以是知創業垂統之君苟有一毫不盡處其流弊皆足以為後世子孫纍也君弱不可以怠十五年晉郤缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還晉靈公之時人材如趙盾士㑹郤缺之徒皆立於朝人材非不衆多然靈公終至於身弒國危者何故蓋當靈公少時其惡未成郤缺趙盾士㑹之徒皆晉賢人都不能於是時正君心養君德自裏面做工夫一向只是謀人城攻人國却曰君弱不可以怠都去外面做了至於正君心裏面工夫都不曾做得一分及靈公長其惡已成熟雖先之以士會之諫繼之以趙盾之諫辭盡意竭終不能正救其惡賢如郤缺在當時人臣之最其謀亦不過張其甲兵侵伐以示威耳所以終不免有篡弒之禍羣蠻百濮叛楚十六年楚人謀徙阪髙十六年羣蠻百濮叛楚楚人謀徙阪髙使當時不有蒍賈之謀楚便有退避消縮之氣則羣蠻百濮並起乘之楚自此瓜分亦未可知賴有蒍賈之謀振作其氣出師侵庸而羣蠻諸小國氷消瓦解使楚之社稷既危而復安將亡而復存則賈之謀國可謂精審然以其終始考之其終乃與伯棼共譖鬬般殺之伯棼為令尹已為司馬席未及暖而死於伯棼之手何故不知伯棼狼子野心蓋為利祿蔽了況賈初閒謀國利害不入其心心平氣定不為事所昏故其謀精其後則以貪位慕祿之心生雖伯棼是狼子野心之人亦與之共事而不覺卒斃其手所謂驅而納之罟擭陷穽而莫之避司馬遷曰利令智昏是也學者於此不可不戒宋饑公子鮑竭粟而貸十六年春秋之世上失其政亂臣賊子多以小惠取其民如公子鮑以粟救饑取宋公子商人以賑施取齊陳氏亦以賑施取齊當時亂臣賊子取人國者無不以小惠取其民其閒雖不是亂臣賊子公卿能保其世家亦多因小惠如宋之樂氏鄭之罕氏皆賑貸乏絶之故所以如此者亦有由矣大抵先王盛時荒政十有二有司之所掌至於札瘥荒歉有司聞于上以舉行荒政亂臣賊子無緣得入其間惟春秋時荒政不舉所以到札瘥患難之時小民剪焉傾覆無所告訴亂臣賊子便乘此以賑施收民心取其國若究本原論之大抵為人君者不能逃其責君職不盡荒政不舉不當專責亂臣賊子侵上之權何故上失其道亂臣賊子何世無之雖然就亂臣賊子之中論之其間勢有厚薄而其失又有淺深且如陳氏以私施取齊公子商人亦以私施取齊然陳氏就他私施中積纍多時自齊景公至於田恆所施已多時所以至於戰國尚能因此以取人之國若公子商人始者取齊固與陳氏無異然公子商人既得國之後又滅人之國奪人之妻肆行無道向來姑息小惠都消散了所以商人為人所殺舍爵而行略無人恤也何故區區之私惠本不足恃既得其國又以無道行之如何㑹持久如以理推而大之大抵或以惠恩或以勢力牢籠把持天下才力衰便無餘裕自然絶滅晉侯不見鄭伯十七年鄭子家以書與趙宣子十七年晉靈公時不見鄭伯以為二於楚當時鄭子家執訊而與之書具述朝會之疏數所謂將悉敝賦以待于鯈唯執事命之子家辭如此之峻晉遂使鞏朔行成於鄭又使趙穿公壻池貴寵之人為質方得鄭平此一段若以事迹論之晉始者不見鄭伯如此之倨後來見子家辭峻又却從而行成又使貴寵人為質其禮又如此之恭前倨後恭全不度德量力然就事上看是時趙宣子為政德雖不足其閲天下之事亦熟何故猖狂不審見輕小國徐思此事有由當時靈公不君自此後晉中衰外以霸主虛名加諸侯始者强張霸主之威以虛名加鄭卻得鄭服後來動不得鄭鄭却以實事抗晉之虛名都被他勝了此一段事正如涉他成何一般當時趙簡子為政亦要張霸主虛威加衛侯到得衛侯忿怒始者執涉他以求成於衛衛人不許又殺涉他以謝衛亦未能得衛服然就趙宣子趙簡子二人論之亦是不同宣子自度不能服鄭便與他平所以遮蓋得疏脫簡子不能便平他所以直至後來無措至於殺涉他若以理論之晉中衰虛𫝑不足以加人若以權謀論之簡子不如宣子以此知晉國雖緣霸業之盛衰亦緣當時秉權之臣有能否又就子家身上論之子家能不屈晉國之虛威以峻辭拒晉亦可謂能自立有子産之風然後來公子宋欲弒君不免受惡名何故子家外面拒晉能自立如此內而首鼠依違從公子宋不能自立蓋天下事切近處最難子家以峻辭拒晉晉雖强尚封疆不相接雖拒晉苟有兵戈之禍時事尚逺惟子家見得事𫝑逺所以敢明目張膽峻辭厲色以拒晉若夫公子宋與子家並立於朝其凶威姦謀甚切近便到身上所以子家到這裏畏縮不免從他弒君學者須知利害切近處能自立方可若利害不切近雖能自立未足為喜然子家為公子宋脅持亦自有由所謂利害逺近則是大綱論他若公子宋所以敢脅持他時就左氏看亦有形見處所謂子宋與子家謀先子家始欲不從公子宋反譖子家子家懼而從之只看這幾句便見得子家依違怯懦所以致公子宋敢為弒君之謀何故伐國不問仁人始者公子宋敢與他論則子家可知此不足論子家曰畜老猶憚殺之而況君乎子家雖有不忍之意他語脉已自慢無力了弒君何等事却以此語對之雖有隱然不忍之意未有凛然可畏之氣到後面又依違所以到公子宋反要譖他既懼不免從他弒君其間煞經時節使子家能以剛直自立聞公子宋謀便告君以正其罪何緣會有弒君之罪以受此惡名惟其不忍所以如此非惟不忍弒君亦不忍告公子宋於君惟依違無斷所以有此事此是他病之根由敬嬴私事襄仲十八年仲殺惡及視十八年文公敬嬴私事襄仲仲殺惡及視而立宣公以襄仲殺嫡立庶論之罪固不可逃然論其根本源流却不在此閔之二年成風聞成季有為公室輔之繇乃事之而屬僖公焉故成季立之敬嬴惟見成風留下樣子在遂亦案本而行效成風私事襄仲而立宣公終有篡逆之惡大抵天下事雖當盛時不可做一件徼幸事徼幸而得者其害雖不見於當時終必為子孫之害如僖公之儉以足用寬以愛民三十年間魯國之人賴之季友為此初無大過失然後世做之其害始有不可勝言者徼幸之事不可做以此知家法不可不正宣公宋鄭戰于大棘元年宋城城者謳元年宋鄭大棘之戰華元師敗身囚其辱國亦甚矣終不失為春秋名臣者蓋元之為人雖有寬縱處亦有含洪之度觀羊斟與入鄭師而敗其反國也自他人處之必殺羊斟而後入元乃曰子之馬然也又如城者之所嘲誚元則曰牛則有皮犀兕尚多役人曰從其有皮丹漆若何元則曰夫其口衆我寡全不與之校聞其言即去之此二事足見元之度量深得為上之體大抵為上有包含容納之度雖有小疵亦蓋覆得過古人居上克寬之道元雖未盡如古人之寬亦足以得其髣佛所以能維持宋國也普趙盾弒其君夷臯二年趙穿弒靈公董狐直筆書之曰趙盾弒其君蓋弒雖是趙穿其情實為趙盾出去了蓋盾平日所與親厚者惟穿耳穿為盾之出故敢行弒君之逆此雖是穿弒君實為盾弒何故見得是盾意以穿既弒君之後盾歸既不討其弒君之罪反使穿逆公子黑臀于周而立之則盾親厚穿之情無所逃矣楚子問鼎之大小輕重三年楚莊王之在春秋時皆謂之賢君如左氏載其築京觀之事甚詳亦以為賢君考其觀兵於周問鼎之大小輕重則傲然有篡逆無君之心暴露於此雖有終身之小善亦蓋覆不過今左氏不見其大惡而特取其末節何故蓋緣當時之人風聲氣習都不知君臣之大義人皆有此患視篡奪之禍不以為怪以為常事看了以此知學者最不可不識大義楚滅舒蓼及滑汭盟吳越而還八年當楚莊王時楚之威北加於中國南被蠻夷所謂盟吳越而還看傳所載則與舒絞州蓼相似到得十一二年莊王既沒共王繼之吳始大不憚楚晉申公巫臣以五乘車教吳楚自此疲於奔命其閒爭得二三十年莊王時吳越與羣舒之徒同受盟於楚其時可謂微弱何故數十年閒吳便為害後來至於郢幾滅楚以此知天下形勢不獨中國與外域相為盛衰外域自處亦自相為盛衰何故楚盛時吳越衰到莊王死楚衰吳越盛吳出來威加中國到得夫差墮越却起如漢時胸奴盛方其盛時凡北方所自擁據之國無不服胸奴後來胸奴分南北烏丸又盛到烏丸既盛所謂胸奴微矣散而處中國如劉元海亦列于邊民之閒到西晉時邉方多故胸奴左右賢王劉元海再起舊時烏丸又微了自此邉風迭長始者北越盛氐羌衰及北越衰氐羌再盛苻堅盛氐羌卻衰苻堅衰慕容鮮卑繼之慕容衰孛頭元魏繼之更為消長直到唐藩鎮未嘗不相為盛衰論來一消一長此天道不息處令尹蒍艾獵城沂使封人慮事十一年孫叔敖城沂此一段見得築城規模曲折詳細精密處正要學者看此如版築之事孫叔敖已洞曉如何却使封人慮事蓋不親細務深得為上之大體規模曲折雖自知之又須是衆謀使親其事者具上規模條目將來然後從而增損裁正之下不侵有司之事築城是大事獨問守封疆之小臣此亦見深慮無不當量功命日量功是量用功之多寡命日是度其日子多少分財用者財用謂芻茭版築分謂看四隅所費多少而分配撥料之平版幹平是商量必平其髙低厚薄板幹謂合當築幾雉稱畚築稱謂一人可以運幾工一人可以築幾堵畚是度其負土之多寡不使虛費人得預其閒築下手也程土物程是料度用得多少土是泥也物是材木也議逺邇謂就近取水取土如百步與五十步去百步內取已爭一半略基址略是巡行也先巡略基址闊狹髙下方圓曲直都安排之具餱糧謂先辦其役夫之糧食度有司是審度有司各稱其材謂如材有餘者可以領大事至若無材之人却能謹信者則可使之監視有便利輕捷者可以供來往度謂如使謹信者治財却不得若令監視則必專其才亦不至於無用所謂度者如此惟其精密詳細如此所以事三旬而成不愆于素蓋謂今日用事與前日所料條目一般並無增損至後來用事這裏添一件那裏又退一件如此是愆于素也大抵左氏載版築用兵救焚之事如世務曲折條目所裁纎悉備具所載甚詳亦足以見當時風聲氣習近於三代其人皆是著實做工夫皆為有用之學非尚虛文也今人為學多尚虛文不於著實處下工夫到臨事之際種種不曉學者須當為有用之學邲之戰楚莊不築武軍十三年春秋霸者到志得意滿之後未有不自滿者所謂五霸是齊桓晉文楚莊秦穆宋襄如宋公不度德不量力不當受霸者之名今且論四者齊自葵丘之盟滿至用易牙𥪡刁晉自踐土之盟滿以私鴆衛侯秦自焚舟之役滿後用三良殉葬到楚莊王邲之戰勝後亦滿看楚莊王邲戰之前規模警戒晉之所稱上下相規截然可見可謂戰戰兢兢不築武軍不作京觀如此到後來志得意滿使申舟無假道於宋公子馮無假道於鄭分明逞大國之威憑陵小國論來假道禮之常載在聘禮假道之禮甚明楚使兩使經涉兩國而不假道此見得楚莊王滿處前三人未足論唯楚莊王之滿最要看大抵天下之事當能謙退時猶得意未深去警戒近所以能不築武軍不作京觀然而必竟到後面移換了至於憑陵中夏吞滅小國而不自知正如人飲酒正飲時猶自得酒過了方作以此知人遇得意事當時能謙損者未足名喜須防在後作這要人深察左氏傳說卷五
