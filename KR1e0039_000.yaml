  text: 欽定四庫全書經部五
  hash: sha256:02dd33ef1c70b837406ca8d729e4163b1ab6b8a43895174682c3937c960ea212
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0039_WYG_000-1a, image: WYG0152/WYG0152-0001a.png}
body:
  text: 春秋左氏傳説春秋類提要臣等謹按春秋左氏傳説二十卷宋吕祖謙撰祖謙有古周易已著録其生平硏究左傳凡著三書一曰左傳類篇二曰左傳博議一節是編其類編取左氏之文分别為十九目久無傳本惟散見永樂大典中頗無可採博義則隨事立義以評其得失是編持論與博議畧同而推闡更為詳盡陳振孫書録解題稱其于左氏一書多所𤼵明而不為文似一時講説門人所抄録者其説良是朱子語録亦稱其極為詳博然遣詞命意頗為傷巧考祖謙所作大事記朱子亦謂有纎巧處而稱其扵公孫宏張湯姦狡處皆説得羞愧殺人云云然則朱子所謂巧者乃指其筆鋒頴利凡所指摘皆刻露不留餘地耳非謂巧于馳辨或至顛倒是非也書録觧題載是書為三十卷此本僅二十卷考明張萱内閣書目所載傳説四冊外尚有續説四冊知陳氏所謂三十卷者實兼續説十卷計之今續説别于永樂大典之中裒采成帙以其體例自為起訖仍分著于録云乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書經部五左氏傳説目錄春秋類卷首看左氏規模卷一隠公桓公莊公卷二莊公閔公僖公卷三僖公卷四僖公文公卷五文公宣公卷六宣公成公卷七成公襄公卷八襄公卷九襄公昭公卷十昭公卷十一昭公卷十二昭公卷十三昭公卷十四昭公卷十五昭公卷十六昭公卷十七昭公定公卷十八定公卷十九定公卷二十定公哀公欽定四庫全書左氏傳說卷首看左氏規模看左傳須看一代之所以升降一國之所以盛衰一君之所以治亂一人之所以變遷能如此看則所謂先立乎其大者然後看一書之所以得失試以隱公六七年間考之事事皆備所謂一代之所以升降者春秋之際三代之衰也然去三代雖逺先王之流風遺制典章文物猶有存者禮樂征伐尚自天子出如鄭武莊為平桓卿士鄭伯為左卿士則諸侯猶入為臣如伐曲沃立哀侯則猶能立君至於宋公不王鄭伯伐以王命曲沃叛王王命虢公伐之則征伐之權尚在如戎朝發幣猶不廢禮觀鄭莊封叔叚京城過制而祭仲之諫張皇駭愕翼以九宗五正逆晉侯于隨此蓋成王封唐叔之灋則先王制度尚存凡此皆三代之餘澤未泯使平王當此之時能振作奮厲尚可有為則西周之美可尋文武之迹不墜然所以不三代而春秋者蓋由平王自為不振如鄭莊公為卿士當用則用當廢則廢何必以虛言欺之此全失人君之體曲沃莊伯本出孽正當助翼伐曲沃今乃助曲沃伐翼此附臣伐君全不是天討君臣之綱亂矣仲子惠公之嬖妾也今乃以天王之尊而下賵諸侯之嬖妾則夫婦之綱亂矣以至祭伯非王命而私交武氏子非王命而求賻及鄭伯怨王奪政而有交質之舉若敵國然則王綱解紐委靡削弱因以不振皆是平王自壊了所謂一國之所以盛衰者試以魯衞鄭宋言之如臧僖伯諫觀魚攷其言而及典章文物之盛孔子所謂一變至道者於此可驗而韓宣子亦謂周禮盡在魯至於其後而猶有存如鄭莊公有權謀善用人當時有祭仲子封原繁洩駕曼伯子元之徒皆為之用故能以小而强而其後有子皮子産之徒出來如衞之亂石碏以身徇國定亂討賊維持社稷而其後有史鰌蘧瑗之徒出來故季札有衞多君子之言發源蓋始於此至於宋之宣穆亂父子繼立之義而貽殤公子馮之亂其後隨有六卿爭政骨肉相殘之禍舉此數端雖數百年之事皆可槩而見也所謂一君之所以治亂者且以隱公言之惠公既沒隱公居長本自當立徒以姑息惠公之愛遂居攝而不能正君位至如費伯非公命而城郎公子豫非公命而擅及邾鄭盟公子翬非公命而帥師皆隱公不能收君柄故末年所以有鍾巫之變也所謂一人之所以變遷者今且舉兩端而言之有自善而入惡者有自惡而入善者如鄭莊寘母姜氏於城潁天理已絶古今大惡也及其終也一有悔心因潁考叔以遺羮之意開導也天理油然而生遂為母子如初此自惡入善者如鄭請成陳侯不許五父有親仁善鄰之諫見得歷歷分明其於謀國也如此豈不甚善不一二年間如鄭涖盟而歃如忘全不以盟誓為事到此昬然不曉如喪心失志者與前面諫陳侯時和氣無復存幾乎自是兩箇人此自善入惡者讀左氏傳能如此看則所謂先立乎其大者矣然後看一書之所以得失所謂一書之得失如序鄭莊公之事極有筆力寫其怨端之所以萌良心之所以回皆可見始言亟請於武公亟之一字母子之相仇疾病源在此後面言姜氏欲之焉辟害此全無母子之心蓋莊公材略儘髙叔叚也在他掌握中故祭仲之徒愈急而莊公之心愈緩待叚先發而後應之前面命西鄙北鄙貳於已與收貳為己邑莊公都不管且只是放他去到後來罪惡貫盈乃遽絶之略不假借命子封帥師伐京叚奔鄢公又親帥師伐鄢於其未發待之甚緩於其已發追之甚急公之於叚始如處女敵人開户後如脱兎敵不及拒者也然莊公此等計術施於敵國則為巧施於骨肉則為忍大凡人於骨肉兄弟分上最不可分彼曲我直纔分一箇彼曲我直便失親親之意觀莊公始者欲害叚而有姜氏欲之焉辟害之語則是欲曲在姜氏直在莊公及其欲伐叚而待其惡大亦欲曲在叔叚直在莊公此所以伐之無辭莊公之心只分曲直兩字殊不知兄弟間豈較曲直纔言彼曲我直彼我對敵便有日相戕賊之害此左氏鋪叙好處以十分筆力寫十分人情其後序周鄭交質一事則全不能分别君臣之大義如云周鄭交質與結二國之信此等言語似敵國一般蓋周之衰習俗見得如此左氏雖才髙識逺然不曾明理溺於習俗之中而不能於習俗之外别着一隻眼看此左氏紀述之失也若向所說通鑑四條六七年間亦可見得軍制如鄭之敗燕以三軍軍其前潛軍軍其後若此之類人孰不知其為兵制至於不說兵制因而見之者須當看也如諸侯敗鄭徒兵此雖等閑句而三代兵制大沿革處可見於此蓋徒兵自此立而車戰自此浸弛也財賦之顯然者人孰不知其為財賦至於不說財賦因而說之者須當看也如臧僖伯之諫觀魚此固非論財賦然所謂魚鼈鳥獸之肉不登於爼皮革齒牙骨角毛羽不登於噐之類此亦見當時惟正之供其經常之大者雖歸之公上而其小者常在民間此所以取之無窮用之不竭也如武氏子來求賻一事此可見天子之權不振不能使諸侯自來貢而反求之盖周之盛時自有大喪記之類使其制不廢亦何縁至於求賻地位乎須當如此考如鄭武公莊公為王卿士則猶有官制之舊左氏一書接三代之末流五經之餘𣲖學者苟盡心於此則有不盡之用矣故今特言其大槩耳
