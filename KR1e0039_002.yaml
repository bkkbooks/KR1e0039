body:
  text: 左氏傳説卷二宋吕祖謙撰莊公齊小白入于齊九年會于鄄齊始霸十五年莊九年齊桓公自莒入齊十五年始霸鄉者説左傳須分三節看五霸未興以前是一節五霸迭興之際是一節五霸既衰之後是一節五霸桓公為盛孔子稱微管仲吾其被髮左衽矣則桓公之有大功於天下固可知也然看得桓公之有大功又須看得他有可憾者當王綱解紐國自為政強者陵弱衆者暴寡當時之人思大國之正已如褰裳之詩此時得桓公出來總集天下之𫝑整頓天下之事豈非有大功於當世然所謂猶有可憾者蓋五霸未出先王之遺風餘澤猶有存者天下之人猶有可見者霸主一出則天下之人見霸者之功而無復見先王之澤矣大抵重新總集整頓一次必十分是當方可或有一毫之憾則前美皆失之矣試以二事明之傳注之學漢之諸儒專門名家以至於魏晉梁隋唐全經固失然而王肅鄭元之徒説存而猶有可見之美自唐太宗命孔頴逹集諸家之説為正義才經一畨總集後之觀經者便只知有正義而諸儒之説無復存詩詞之作自漢魏而下如建安七子如顔謝徐庾雖為淫麗而古人之遺風餘韻猶間見也至唐杜子美以大才為之一切蓋了故後世惟見子美之詩而前日之詩無復見矣師及齊師戰乾時九年公敗齊師于長勺十年公敗齊師于乘丘十年齊桓公霸業在春秋涉三公莊閔僖若莊公正是桓公當時初歸經營霸業桓公規模自用管仲後與未用管仲及管仲新得政時事體不同桓公以莊九年入齊即位是時敗魯師是年取管仲歸國而相之管仲雖初入國是時尚新得政若莊公十年此一兩年事未是管仲經營所以與後來不相似大抵管仲圗霸規模緩而不迫看莊公十年前既敗魯師于乾時次年又舉師伐魯長勺之戰為魯所敗到六月齊又與宋次于郎看得涉兩年間三加師於魯規模促迫大抵與後不同以此知正緣管仲新得政未得盡施其術不惟三加師於魯規模迫促後面兩為魯敗長勺之戰為魯人三鼓而敗後來郎之次又為公子偃先敗宋師齊師乃還若當時管仲便謀慮計闕無緣得兩敗以此看得管仲規模不惟外面經營諸侯緩而不迫他裏面所以得君得政亦緩而不迫何故前年桓公因鮑叔之言相管仲若是管仲規模促迫時便須諫桓公不可加兵於魯使加兵於魯管仲必紛然建謀出其所長蓋管仲初得政當時自有國子髙子政未專出他他且袖手旁觀一兩年以此見管仲得君得政亦緩而不迫自此以後桓公之規模大率不同十三年北杏之會是時管仲全得政且如楚當時憑陵諸國管仲且放二三十年不問直到屈完之盟不戰而自屈晉獻公父子憑陵諸國亦放而不問到得後來葵丘之會晉侯自來蓋管仲不去歲月間見效常要自家政事修舉兵乘修整本強則精神折衝所謂崛強不服之國教他自入管仲規模中此其所以為管仲此其所以五霸桓公為盛大抵王之與霸論來王者不計功謀利霸者計功謀利王者不求近功速效霸者求近功速效然而就霸者論之以桓文對説時桓公計功謀利比文公時便少桓公不急功效勝文公桓公却做得王者事何故晉文公事業在僖二十八年都做了如侵曹伐衛敗楚朝王聲績赫然震蕩人耳目一年都做盡桓公規模三十餘年尚熾其用功之所以遲速時便是桓文才之髙與下管仲舅犯規模之深與淺以是知晉文不如管仲齊桓霸中國十五年侵蔡伐楚僖四年晉文退舍避子玉喜二十八年看桓公之所以霸須看得管仲規模當時桓公之霸蓋將以尊內攘外為功也楚之憑陵中國者非一日矣如伐鄭伐蔡而桓公皆不之問桓公以莊之十五年霸中國而以僖之四年始伐楚置楚於度外而不問且二十年者何故仲之意豈不以吾驟加兵於楚萬一不勝則霸威屈矣故遵養時晦至於力強威盛而後一舉以臨之則楚無不服矣夫以堂堂之楚而不敢以兵抗齊不過使人如師及使屈完來盟則齊之盛強蓋可知至於晉文公則不然桓公以兵加楚而楚不敢抗文公退舍辟子玉而子玉犯之文公之規模小於管仲也明矣文公蓋數年便欲服楚雖力戰而僅勝之然傷威損重已多仲之相桓則遲楚以二十年之久則文豈足以及桓哉其服晉也規模猶大於服楚晉獻公之滅耿滅霍滅魏伐東山而齊皆不問者何故仲之意豈不欲以晉之於齊猶家也楚之於齊猶鄰也以至強之晉吾驟臨之以兵萬一不勝為晉所敗則吾家人猶不能勝之何以服其鄰故一切置而不問逮夫諸侯盡服外域皆從光焰既大聲勢既盛故葵邱之會晉侯不召而自至服楚以兵服晉以不召而自來則以聲勢光焰臨之耳其服晉過於服楚逺矣蓋其遲速之不同故其力有厚薄威有輕重論至於此非惟王道不可要近功而霸者亦然齊桓遲之以二十餘年而晉文求之於六七年間須要做盡許多事故晉文之霸不及齊桓之盛當時葵邱之會晉侯欲往而宰孔止之而不會蓋宰孔見得齊侯之驕故如此於此又須看得管仲之事桓公專去事上做工夫却不去君心上做工夫惟其去事上做工夫故鋪排次敘二三十年皆如其規模惟其不去君心上做工夫故訑訑之聲音顔色拒人於千里之外管仲之事蓋積數十年而成桓公之驕止一日而壞不能格君心之非其禍蓋如此也荆伐鄭十六年二十八年楚人伐鄭僖元年三年齊桓公霸中國楚數侵鄭桓公惟務於鄭而不再加兵於楚者何故以此儘見得管仲之規模大能養威處蓋仲之意以謂能勝楚則不過如前日萬一不勝則霸權屈矣此仲之所以善養威也鄭伯見虢叔曰盍納王二十年鄭伯將王自圉門入虢叔自此門入殺王子頽二十一年周惠王以王子頽之亂出奔鄭處于櫟是時虢公與鄭伯同帥師納王殺王子頽當時齊桓為霸主却自不納王其納者却出於虢鄭齊桓却不管他何故若是晉文凡有一事便要占做如納襄王時辭秦師而下必欲出於已不要與秦分功到桓公為霸聽虢鄭納王亦是規模不同處然所以虢鄭納王時亦自有來歷自周室東遷虢鄭秉周政虢公為王卿士鄭伯為王左卿士兩國入仕王朝與周最親者所以凡有患難二國首先任為已責定王室之亂正王室之義所以當時齊桓公雖圖霸業必竟當時自有王室親臣定其亂桓公不得而預所以諸侯皆未出虢鄭獨先去正緣世秉周政之故這是霸者之初王綱尚在處當時以土地論之虢鄭之地甚小齊之地甚強以堂堂大國因虢鄭世秉周政故便退然讓與虢鄭以此知當時尚不以甲兵強弱為事諸侯尚秉王命後來王室衰時王室自為之自此以後諸侯無復事王朝霸者所以興至於諸侯皆霸者此周之所以衰然虢鄭之所以事王亦周自為之當時本是鄭伯為王卿士虢以諂媚奪鄭政自取周之麥溫之禾時虢已有寵鄭已無寵然而到得周有患難虢視之常緩鄭視之常急且如王出居櫟鄭伯見虢叔曰臨禍忘憂憂必及之盍納王乎論來情意厚薄虢當先鄭當後今舉兵時却是鄭在先虢在後到得後來王賜虢公酒泉又與之爵與鄭伯止以鞶鑑夫王室定後王何故不察平定之功又却與虢之爵復厚虢而薄鄭蓋虢公於王室無事時又却築王宫于玤又以阿媚周王以此知阿媚順旨大抵無事時此等人固可喜才到患難時看得意思終是緩了齊侯使敬仲為卿二十二年齊侯欲使敬仲為卿辭以豈不欲往畏我友朋此見得當時朋友之清議尚在故管仲前來請齊侯救邢亦援詩云豈不懷歸畏此簡書如上文畏此朋友之義此見得當時猶知簡書朋友之可畏又見得古詩之意猶有存者懿氏卜妻敬仲二十二年畢萬筮仕於晉閔元年懿氏卜妻敬仲一假後人云符命讖緯之説起於王莽篡漢假此以愚人耳目不知已見於春秋之際看左氏所載敬仲畢萬之言蓋左氏之生適當戰國之初田魏始興故誇誣其祖以神下民當時民無有知者故皆信之左氏亦惑於流俗之所見不能於流俗外著一隻眼故於敬仲畢萬之事亦從而書之後來栁子厚作貞符以為符命俱不足信逐以玄鳥生商伏羲負圖之事皆可疑此又墮於一偏之見也天降時雨山川出雲耆欲將至有開必先大抵帝王之興和氣充塞豈無祥瑞但當觀象之正邪豈可謂之無也有媯之後將育于薑二十二年畢萬之後必大閔元年符命讖緯之説王莽以此篡漢後世論符命讖緯之説起於哀平之間比附王莽以此為禎祥移人耳目篡奪天下然推其源流符命固是起於哀平之間而符命讖緯之實已自始於戰國之初考之左氏可見戰國之初如所謂如秦如楚如燕都是世襲舊國如晉如齊皆是暴戾之國當時未嘗不假符命之説為篡奪之事看左氏所載畢萬敬仲見當時以此移人所以載懿氏之卜敬仲説有媯之後將育于薑五世其昌並于正卿八世之後莫之與京及生敬仲周史以周易見陳侯者陳侯使筮之遇觀之否謂此其代陳有國至於畢萬卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣以此知戰國時已自有符命惑人了雖左氏好説符怪然戰國之時已自相傳如此便到得陳涉以狐鳴魚腹惑亂一世遂盛於王莽然此所謂符命皆是造作湊合得來如栁子厚作貞符之説謂無符命此又見得一偏大抵符命之説亦不可謂之無如所謂天降時雨山川出雲耆欲將至有開必先所謂帝王之興見乎蓍龜動乎四體當深察其邪正若以不正之説例論之且如玄鳥生商伏羲受圖也不足信是因噎而廢食也大抵帝王之興自有自然之兆人之正心感天地之正氣所謂符命者自可信却不是附會湊合得來豈可謂之不于其祥于其仁若以此察之正邪之説昭然如日星之明楚公子元帥師伐鄭而處王宫鬭射師諫則執而梏之秋申公鬬班殺子元鬭榖於莵自毁其家以紓楚國之難三十年楚之興自武王兼并自此便強繼以文王亦能守其基業而不失傳于成王成王初即位尚幼是時公子元為令尹以貪冒淫縱為申公鬭班所殺當時君尚幼大臣見殺論來楚到此合衰所以不衰時蓋緣楚能用子文子元初死時正是楚之盛衰存亡交關樞紐處是時復有子元時楚自便亡幸而得一子文為令尹以清忠表倡於一國自毁其家以紓楚國之難自此楚再安大抵楚之所以立國本皆以勤儉所謂民生在勤勤則不匱如告戒之辭所謂訓衆而好鎮撫之召諸司而勸之以令德見莫敖而告諸天之不假易也皆以勤儉勤儉是楚之家法到子元出來淫縱不道以破楚之家法如築館于夫人宫側振萬舞貪淫不厭臣下不平卒至相戕以殺令尹楚之勤儉家法或幾乎息矣子文出來獨以清忠勤儉再復楚之規模當時子文繼子元之後平常也做不得須是自毁其家自貶損方可何故到奢侈驕淫之後能以清忠勤儉表倡於一國如易之小過所謂行過乎恭用過乎儉當時是却恁地平常做不得所以自毁其家却不是矯枉過直正是合做底事故不如是則何以救已離之人心續將絶之國命閔公狄人伐邢元年狄人伐衛二年齊桓公始霸之初狄滅衛又伐邢見得當時外域憑陵中國如此之甚向非齊桓之霸封衛遷邢則中國幾何而不淪胥為所滅此孔子所以有微管仲吾其之歎蓋桓公之霸盛矣太子申生伐東山臯落氏二年晉獻公使太子申生伐東山臯落氏里克則入諫獻公出則告太子以孝固是善處父子之間然其後驪姬欲殺申生未敢下手使問於克克對以中立之言夫驪姬之欲殺申生久矣所憚者惟克耳今克既告之以中立之言則驪姬固無所畏何為而不下手左氏書曰既與中大夫成謀此句有筆法中大夫即里克也克雖不助驪姬既不拒之是亦助之也使克能拒驪姬彼必有所畏而不敢下手其後里克殺奚齊卓勑角反子克雖有區區之心終不免弒逆之惡者由其守初心之不堅而為驪姬之所動搖也學者最怕守初心不堅申生伐東山一假論者自先友而下凡數人或是或非而皆有意味亦見當時隨所在有人又見晉國人才之盛僖公晉假道於虞以伐虢二十五年晉荀息假道於虞以伐虢此一假知宫之竒諫必不聽知虞之必可假知虢之必可亡料敵如見自是觀之晉國智謀之士如息者亦自有數至於傅奚齊此假全不能知却不能先為保護之計何料敵如是之審謀國如是之踈蓋息本非就自身上做工夫專以臆度揣摩為事故有著不著處驪姬欲殺申生四年驪姬之殺申生國語所載甚詳看左氏與國語相為表裏而晉語中所載本末具備中大夫里克也左氏則載將立奚齊既與中大夫成謀而晉語中則載當時驪姬欲殺申生而立奚齊所難者尚有里克使優施以酒飲里克欲以優言説之觀優施以言動克言人皆集於苑已獨集於枯是言申生之勢已自摧死不可倚恃里克却言吾秉君以殺太子吾不忍通復故交吾不敢中立其免乎優施曰免則驪姬之計行矣故優施得里克之語以告驪姬姬聞優施之言遂肆行而無忌以國語所載論之所謂里克不同謀殺申生但對優施言然左氏直書中大夫成謀當時姬難里克里克若能守正不奪則殺申生之謀必不成克既有中立之言故姬得以肆其謀而無憚雖不預驪姬謀謂之成謀亦可也大抵姦人作亂不必要人依附則且持兩端中立以為無所與於其間則姦人便可以成謀左氏斷所以歸中大夫之罪到後面一假使之歸胙於獻公當時驪姬殺申生之謀獻公已許他了今特造此一假事為罪名而已然則殺申生不是獻公不知當驪姬譖君之際論來太子合當便行當時太子謂我辭姬必有罪或使之行謂君實不察其罪皆是不知獻公之心然此時太子既是不出亡甘心待死而已辦一死了以正理論固是成父之過然而犯逆死罪了已自不是太子合即便就死又却奔歸於所封之邑須當看這一節這箇不是變生倉卒時無措如此申生既不畏死尚自當倉卒之變奔歸於邑又不是要恃城郭以作亂以此見處死却易從容就死則難此無他元無工夫且則是小心不忍便至倉卒無措其不近道理亦自可見左氏傳説卷二
