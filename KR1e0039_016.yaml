body:
  text: 左氏傳説卷十六宋吕祖謙撰昭公齊侯欲納昭公命無受魯貨二十六年齊侯欲納昭公命無受魯貨此命固是然後來季氏之家臣申豐以貨如齊終能轉移伐魯之謀以此知國家不可存小人之根小人之根正如人之有病根外邪客氣乗他病處入來當齊君下令於國非不信然而病根却在梁丘據上魯之家臣雖在千里之外亦能逆知齊侯病根所在而投之毫髪不差唐時栁子厚論梁丘據言能尊信晏子至與之作賛他當時固有所激然亦不識他大姦所在亦不知晏子所以就他處晏子國之正人雖梁丘據欲效區區之小忠晏子何嘗肯附他所以每事指他情狀淺而論之固如此深而論之則不然以晏子之介亦自被他移換了雖其正色立朝介然自守梁丘據雖獻小忠施小惠晏子固不肯受他然與他不竝立之意思都慢了不過時時規正他梁丘據才調䕶得晏子無不兩立之意他於此可以立脚便是轉移得晏子處便是晏子就他處晏子論彗星則曰天道不謟昭公二十六年論路寢則曰在禮同上一言省刑踊貴屨賤昭公三年不誅祝史厚歛困民昭公二十年齊之業固衰於景公然當時忠言讜論亦莫盛於景公看左氏所載晏子立齊之朝雖不秉政觀其前後獻忠如論踊貴屨賤至於一言省刑如論不誅祝史如論厚歛困民如論省方觀民如論和同之説如論彗星則曰天道不謟論路寢則曰在禮大抵左氏所載七八事忠言讜論如此之多何故不能救齊之衰亡且景公非不能聽信晏子之言看左氏載晏子之諫或曰公乃止或曰公曰善哉此類甚多如孟子所載晏子論巡狩述職景公大説又如論語所載景公問政夫子言君君臣臣父父子子則曰善哉見得景公於忠言讜論未嘗不欣然領受而齊卒不振者蓋能聽而不能用也此所謂法語之言能無從乎改之為貴巽與之言能無説乎繹之為貴説而不繹從而不改吾末如之何也已大抵人君寜可不受忠言固執而至於忿激如此只是不受猶可望他有箇轉移道理至於知聽而不知用人君之大患正在此孔子是大聖人言語尚不能轉移景公之心况晏子學問力量視孔子不啻天淵如何移得景公之心以此知人君雖有寛容之量徒受直言而不能用之則國之廢興存亡正不在此吴公子光弑其君僚二十七年吴公子光弑其君僚考左氏所載本末公子光固不能無罪然吴王亦不知根本之虚因楚喪而伐楚親賢國之望使公子掩餘公子燭庸伐潛用兵於外而季子又使之聘于上國遂至于晉以觀諸侯之強弱一時親近之臣皆安頓在外故公子光得窺伺間隙得行其謀而作亂此見得吴王不知根本之虚處大抵為國之根本莫大於親賢兩字有親則可以藩屏王室有賢則可以鎮重朝廷雖有姦賊不敢覬覦今則吴王親如掩餘燭庸則使之帥師圍潛賢如季子則使之出聘于外此公子光所以成篡弑之禍使數子皆在王之左右安得至此公子光包藏禍心固已久矣至此方得逞其志大抵篡弑之臣乗閒投隙固不足論所可罪者吴子也向使他不知公子光之姦愈信他為腹心如此則是不覺不悟不足深罪觀公子光伏甲享王之時吴王亦自知其謀觀其使甲坐于道及其門門階户席皆王之親當時設備如此其嚴然終不免於禍是明知其謀而明陷於禍吴王既明知他有篡弑之心須當兢兢業業遵飬時晦於此上做工夫既不曽於此上做工夫而親信之臣如掩餘燭庸季子之徒不當使之在外數子既在外安得不致篡弑之禍以此觀之則罪不專在公子光實吴王之罪楚郤宛直而和國人説之二十七年楚郤宛直而和國人説之為鄢將師費無極所譖卒不免於禍以常情論之直而不和固招尤納禍之道今郤宛既直且和亦似乎剛柔相濟亦似乎得守身之道何故為小人所譖終不免於禍此最當察大抵處無道之世䜛邪在朝郤宛在下位廼得一國之情為上下所喜自然招禍天下之人所以招悔尤之道有易察者有難察者若大剛不濟之以柔大柔不濟之以剛其為招尤召禍却易察到得既直而和柔剛相濟只去身上㸔已自無病已自得處身之道以大勢論之這箇病根難察蓋是郤宛己不識時了自以為處身於無愧之地然而致亂自有一箇要領但看費無極譖郤宛這一段可見大抵君子小人固猶氷炭薫蕕不相同塗然既與他不相入雖有仇疾之心終不至於甚且如小人所貪者在權勢我不可貪權勢而與彼同塗小人所慕者利禄我不可慕利禄而與彼同塗我既不與小人同趨於權勢利禄他如何仇疾得我當是時令尹子常既秉楚國之政是權勢利祿樞要處㸔他無極欲譖郤宛時先謂郤宛曰令尹將飲酒於子氏宛言我賤人也不足以辱令尹令尹將必來辱為惠已甚吾無以酬之費無極説令尹好甲兵子出之吾擇焉取五甲五兵曰寘諸門令尹至必觀之從而酬之雖是常事不知此正入無極機械所以得嗣進其説無極機械如此乃小人之常事然郤宛對無極之言如此便是親附子常之意子常好賄信䜛是權勢利禄所聚之地而小人之所附爭趨者也使郤宛有高見逺識方無極説誘時正當如以朝衣朝冠坐於塗炭望望焉若將凂之方可郤宛不合有親附之意安得不被禍以郤宛得一國之情何故不免於禍只緣又却親附子常正與小人同塗行若果是明直君子必無親附小人之意郤宛以親附取死未足多恤若飲酒一段此是費無極設機穽以陷人有不足論也魏獻子為政分祁氏之田為七縣分羊舌氏之田為三縣二十八年晉自平公之後公室漸衰當時六卿分職叔向前日對晏子言所謂欒郤胥原狐續慶伯降在皂隷所以扶持公室者剪滅殆盡到得祁氏羊舌氏之滅六卿之勢愈盛晉之亡證於此可見何故當襄公之前六卿雖已在列尚自有欒郤胥原狐續慶伯分布于朝小大相維參錯其間所以雖有人專政亦不得逞至此互相吞併所存者止六卿而已其餘強家大族皆剪滅殆盡自然禄去公室此一段事左氏所載論魏獻子為政分祁氏之田為七縣分羊舌氏之田為三縣及用十人為大夫他謂與得其人為獻子羙事這只見得小節不得大體所在若以小節觀之一時分付得當固是可喜這只見一時事殊不知以大體而觀之則六卿分公室實自此始豈不大可憂學者考古論治須當自大體處㸔不可就小節上㸔梗陽人有獄魏戊不能斷二十八年梗陽人有獄魏戊為大夫不能斷以獄上其大宗賂以女樂當時閻没女寛於從容飲食之間而能感悟獻子㸔他言語和易不迫自有感發人處前軰論之者多矣此一段尚見得三代之遺風又見得春秋之時乃戰國之初大抵春秋之際堯舜禹湯文武典刑法度幾盡而僅存戰國秦漢風俗方生而未盛正是兩邉接頭處且論梗陽人之獄其大宗賂以女樂固見得鄭衞之聲起雅正之音絶是戰國秦漢起頭處兼行賂亦不是好事然行賂乃是大宗尚見得患難相恤之風先王五宗之法尚消磨未盡未至相視如路人此猶見是三代之遺意以此知當時若有聖賢出扶持之尚自有所因可復先王之舊不如後世聲消氣絶難整頓因此一事亦可見得樂之變前此三代之衰雖有所謂淫樂如桑間濮上之音然當時尚未敢肆行不過是無道之君出來時暫如此後來便自消亡且如桀紂之衰女樂淫邪之聲固已有之然亦未至於肆行蓋此時先王之正氣未衰雖欲恣為之未可也此固不必於其善處觀之但即其不善處考之亦自可見且以春秋終始之變論之其始也楚是蠻夷之國令尹子元欲蠱文夫人為館於宫側振萬焉為淫慝之事以行不正固不可言然而用萬舞之樂尚自存雅正之音使當時敢肆行淫樂子元用之必矣以此見春秋之正氣勝淫樂尚未敢放行到得後來鄭賂宋以淫樂之矇齊人歸女樂晉侯賜魏絳女樂二八是女樂尚用於當時之諸侯及其大宗以女樂賂魏子是淫聲已徧於天下矣雖梗陽人之微亦或用之以此見春秋二百餘年之間而先王之流風遺俗掃除盡矣左氏傳説卷十六
