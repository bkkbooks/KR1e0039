body:
  text: 左氏傳說卷十三宋吕祖謙撰昭公齊侯伐徐徐人行成十六年楚子誘戎蠻子嘉殺之同上晉到得昭公以後諸侯各自為政不復禀霸主之命所以齊楚交兵於中國到得齊侯伐徐徐人行成賂以甲父之鼎叔孫昭子具言諸侯無霸之害魯莊公以前是時霸者未興自昭公以後霸權已失當霸者未興之前若魯衛宋鄭更相侵伐無所顧忌自齊桓一霸晉文繼興方有所統屬百餘年間敗王法滅小國雖日侵天子之權摟諸侯以伐諸侯其罪固多然一時維持中夏使諸侯有所畏懼遵守王度亦不為無助及霸權既失之後晉平公既卒昭公即位天下無霸齊之伐徐楚之取蠻肆行無憚甚至於呉越入中國㑹之有成而還莫之亢也當時諸侯大夫慨然反思有霸之時自此後夷夏無辨胡越蠻兵交中夏陵夷至於戰國之際終至強弱相吞成周所封千七百國所存僅七八皆為強大諸侯之所有若論敗王法滅小國摟諸侯以伐諸侯其罪固多迨夫先王之政掃地無餘爭地以戰殺人盈野爭城以戰殺人盈城到此之時反觀霸者維持之功雖一時上僭王法然止霸者一國而已天下諸侯不敢自肆不至如戰國之甚霸者之功不可厚誣故夫子稱管仲曰微管仲吾其被髮左衽矣分明是如此當時管仲雖有此功非夫子不能知也自後世觀之以為戎狄自强弱如此後来如五胡亂華懷愍至於中國天子反為狄驅之青衣行酒使當時有管仲決不至此以此知孔子之稱美管仲是灼知管仲之功如此也晉韓宣子有環其一在鄭商子産弗與十六年晉韓宣子欲市玉環於鄭商子産弗與至於反覆再三請之子産終弗與後世之論皆謂子産能自立不為强大威武之所屈以鄭一區區之小國介於晉楚之間能自立者固如此然亦未知子産之深意所在當是時昭公失政六卿皆貪冒而强所謂宣子在晉則謂之賢大夫在習俗中其貪利亦未能免子産所以固拒宣子蓋有深意何故晉既失政六卿又皆貪次第各求所欲於諸侯六卿既皆有所求於諸侯以鄭國之小豈足以一一供之使子産一從宣子之請則趙氏中行氏必相繼而至六卿既皆有所求纔不應副一處必為鄭國之禍觀後来事則可見宋樂氏以楊楯六十獻趙簡子范氏怒執宋之使終身不得反以此事可見得六卿皆爭求所欲為諸侯之禍唯子産見微而知著所以不與宣子玉環者其說有二一則宣子在晉居六卿之長以宣子求之鄭尚不與則下於宣子者必不敢求矣此子産所以痛塞其端一則宣子在晉居六卿之中尚知畏義略識道理猶可以告語故子産知其必畏義而服必不為鄭之禍所以敢再三拒之借宣子以杜六卿誅求之心而宣子果辭玉以此見得子産之處事凡百見微知著精審詳密如此讀書者觀子産拒宣子之事無徒曰子産能自立而已郯子来朝十七年郯子来朝此一段見得周衰制度散亡於諸侯之國中國已不能守先代典籍當時四夷尚有存者所以郯子来朝魯人問官名於郯子郯子所言自黄帝而下以至厯代官制之㳂革其本末皆備舉他就數代官制中惟是少昊之時郯子世守其祀所以其言最詳當時仲尼聞之見郯子請學官名既而告人曰吾聞之天子失官學在四夷猶信然則以此觀聖人之學一箇多識前言往行博學詳說雖夷狄之君尚虚心下問之然而又須要看聖人反約處聖人序書當時斷堯典自堯典以上有所不序說者以謂自堯典以上簡編散亡不可考也不專如此看少昊官名郯子所陳仲尼因而序之豈不可為一編之書然而不敢序者以簡編失實所以不序看斷自堯典見聖人反約處何故自鴻荒以来厯代聖人相繼而作到堯始備繼之以舜方為法於天下可傳後世此所以斷自堯典觀孔子學官名於郯子見聖人博學而詳說看孔子斷自堯典見聖人反說約處若不自上古考之無以知古之略今之詳合古今盡詳略然後可以繼為萬世之法周原伯魯不說學十八年曹平公之喪諸侯大夫皆往會葬魯大夫往見周原伯魯原伯周之大夫也魯大夫與之語不說學歸以告閔子馬閔子馬魯之賢者言周其亂乎夫必多有是說而後及其大人也蓋言公卿不說學必是一國風俗皆不說學也想下面人此般說話多然後漸漬到大人夫人之不說學自不居位之人觀之無利害得失尚不能辨況周原伯是周之大夫方且戰於人慾之地見衆人不說學豈暇辨是非利害亦隨波逐流何故只縁他心無主唯其如此乃曰可以無學無學不害若懷無學不害之心苟且因循翫嵗愒日使人人皆懷此心自然下陵上替其能無亂乎夫學者殖也不學將落人於學問譬如植木須栽培灌溉天之於人降衷秉彛猶木之有根本也人之良心亦須是學問栽培所以能灌溉封植之茍根本失其灌溉封植則枝葉自然枯槁矣其理甚明此一段見得魯一變至於道觀子馬之言見得當時魯之風俗尚有學問源流且如平公之葬諸侯大夫皆在其他人見周原伯不說學則以為常獨魯大夫見之則以為異而歸以告其國之賢者其他皆不以為事以此見學問源流漸染薫陶至於如此孔子所謂魯無君子斯焉取斯是也閔子馬在當時號為知學者看他此等言語非知道者不能道此其言近㫖逺而有深意如說夫必多有是說而後及其大人這一句最有意其他人見原伯不說學只就一人身上看閔子馬因一人占得一國之風俗而能知其所自来是猶察瓶水之凍而知天下之寒善觀國者如此學者觀古今之變時俗之遷亦當如此看若看一事止見得一事看一人止見得一人非所謂旁通倫類之學須當縁一人見一國風俗如閔子馬可也如言無學不害則苟而可此學問所以衰微處大抵君子之學本非是計校利害為已而已纔計校利害便是為人所以古之學者為己今之學者為人為己之學者則知不可不學若計校利害之心生則可以無學所以言則苟而可大抵天行健君子以自強不息亦人道也須天與人常相携持若曰苟而可或至於息則人道亡矣下安得不陵上安得不替哉道之正統自堯舜之後孔子以前當春秋戰國之閒班班亦可見蓋源流之不絶此乃道之大全正統也其他亦自相承接而不絶蓋堯傳之舜舜傳之禹禹傳之湯湯傳之文武文武傳之周公至於春秋之際傳之孔子蓋數聖人得其道之正統固是大統如此全備若其閒源流亦自相接雖數十年閒亦未嘗閒斷如商之時有遲任甘盤傅說如周之時有閔子馬皆源流相接使他無一箇正統相傳則閔子馬在春秋時何以能學問淵源漸染浸漬如此左氏所載當時人亦班班可見惟其源流皆相接不斷所以後来相繼亦有所因孔子言一變至於道者為此左氏傳說卷十三
