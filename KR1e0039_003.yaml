body:
  text: 左氏傳說卷三宋吕祖謙撰僖公士蒍築蒲與屈五年晋侯伐屈夷吾不守盟而行乃之梁六年自僖元年至卷終試舉數叚論之士蒍築蒲與屈一叚可以見重耳夷吾識度廣狹逺近一人終於霸諸侯一人終於失國當初士蒍築二邑皆不謹寘薪於其間重耳不訢至夷吾則訴之蓋重耳惟知共君父之命初不暇校城之美惡至於夷吾則惟知己之利便而至於訴則夷吾之識度已不如重耳矣非特如此晉侯之伐蒲重耳以君父之命不校則知臣子之義遂出奔蒲至於伐屈夷吾力不能守卒盟而行迫於不得已而奔梁則夷吾又不如重耳矣至若其從游賔客重耳則有狐趙之徒夷吾則有吕郤之徒耳以築蒲屈論之則二人之用心不同可知以一則知臣子之義而出奔一則迫於不得已而出奔論之則二人之臨事變不同可知以游從賔客論之則二人之得人不同可知此其所以一人終於霸諸侯一人終於亡國陳轅宣仲勸申侯美城五年後申侯見殺七年觀鄭申侯之陷陳轅濤塗之怨申侯深矣及陳轅宣仲勸申侯美城其賜邑而申侯卒以見殺夫宣仲之怨申侯申侯非不知視仇讎之言不啻如親宻卒為所陷而殺其身何也蓋人心不可有所倚申侯之心一倚乎利但只見利之為美而有以動乎其心故雖仇讎之言樂然聽而行之皆不見其為機謀陷穽也鄭太子華請去三族七年鄭太子華請去三族這一叚見得管仲猶有三代氣象其曰君若綏之以徳加之以訓辭而討鄭豈敢不懼若緫其罪人以臨之鄭有辭矣此等言語蓋嘗聞先生長者之餘論矣惜其急於功利俯首以就桓公自小了惟其嘗與聞先生長者之餘論故時出其所聞實有過人者如前此請齊侯救邢所云畏此簡書此等言語時時規正得桓公一兩叚若淺論之則管仲時有三代氣象固甚可喜責備論之管仲不能大其規模反俯首以就桓公一箇狹小規模亦甚可惜管仲之相桓公大抵務在正名辨分觀其王使宰孔賜齊侯胙管仲則教桓公以天威不違顔咫尺敢不下拜則不敢慢天子之命觀王以上卿之禮享管仲則對以有天子二守國髙在而不敢越周室班爵禄之制至於舅犯之相晉文則不能齊桓專在於扶名分晉文則適以壊名分如以諸侯而請天子之隧襄王以危言拒之而始不敢蓋仲則曽聞先生長者之餘論故所以輔桓公者猶有三代之遺制至於舅犯之徒未嘗聞先生長者議論徒知力之可以請隧召王而不知義之不可視仲為如何故孟子曰桓公之於管仲學焉而後臣之猶着得一箇學字至其後如晉文公之有舅犯楚莊王之有孫叔敖晉平公之有趙文子則皆無此一字矣晉郤芮使夷吾重賂秦以求入秦伯謂郤芮曰公子誰恃對曰亡人無黨有黨必有讎九年秦穆公納晉惠公問於郤芮曰公子誰恃郤芮曰亡人無黨有黨必有讎所以為此言是說晉惠公别無恃便見得專倚靠在秦謂所恃獨歸重秦秦固是如此大抵天下之人有䟽必有親有愛必有憎以亡人而方入新造之邦有愛惜厚薄禍亂自此興觀郤芮所謂亡人無黨有黨必有讎言語甚得要領然晉惠公入國即位之後所與偶者郤芮吕甥之為黨如舊臣耆徳翦滅殆盡安能謂之無黨以此知平居論事甚易到得臨時克愛心甚難秦饑晉閉之糴十四年晉侯背賂中大夫十五年晉惠公始以賂秦而入終以背賂而見伐其曲在晉明矣然其間亦有曲折可論大抵多賂必寡信惠公之所以許秦者皆是不可還之賂於其既入之後有不得不背且晉饑秦輸之粟秦饑晉閉之糴當時虢射之徒其為謀不過謂無損於怨而厚於寇是皆只去仇讎上思量却不能去解釋消除上思量豈不速秦師之志哉虢射之徒雖有罪然慶鄭亦不得恕把慶鄭事看時見得二國之禍皆慶鄭之言有以激而成之且其言曰背施無親幸災不仁貪愛不祥怒鄰不義如此等語分明是當面責他惠公既是一箇忌刻狠鷙之人慶鄭又不能和緩其辭以諫之得不激成其事以是知當時虢射之徒雖可罪然鄭亦不得辭其責也及惠公為秦所執其傳君命以告國人而國人皆哭於是作爰田作州兵夫以惠公之不道何以得此於民只緣惠公被秦虐得深故能感民心亦切使惠公既反國之後乗此機會能卧薪嘗膽側身修行以接續此民心則皆可用之民也晉之定霸當不在文公而在此矣一歸便殺慶鄭以快私怨則民心自此都渙㪚了是知暫時得民心不能接續者全不足恃也管仲辭上卿禮十二年管仲平戎于王當時王以管仲為齊相齊國權即在管仲特以上卿之禮享之當時仲辭曰臣賤有司有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭王命以予嘉乃勲往踐乃職管仲受下卿之禮而還此見得當時周室之典法尚在又見得齊之霸與晉不同且如晉文之霸時始者舉郤縠後來又舉原軫便命將中軍所謂上卿元帥初不請命於天子以管仲得君如此之專行國政如此之久尚退然在班次之下亦不敢原闕爵以此知當時與晉時節已自不同然王所以命管仲往踐乃職者謂管仲雖卑職是秉齊國權即自當用上卿之禮以此知當時秉國命者不必是上卿到這裏周王要尊管仲以職所以說往踐乃職蓋管仲之職實是秉公之權以此知當時周已有官與職兩者之分後世都如此且如漢時霍光司馬大將軍秉國政上面又有丞相當時章奏稱丞相楊敞大司馬霍光論班爵丞相在上論職時霍光實秉國政以此知周漢官制源流尚相接官是定制職却是一時所任秦晉戰于韓原十五年秦伯與晉韓原之戰秦晉之曲直其理固甚明然當時所以為晉謀國所親者如所謂虢射慶鄭吕甥郤稱冀芮之徒然當時趣得亂成實是慶鄭慶鄭是一箇剛狠自用之人以不見用於晉惠公相激所以致敗今則所可恨者蓋於慶鄭猶有可恨處使他當時若是愚而無知一向狠僻固無可恨觀他前面所言其論也多正為謀也多審其所可見者前論秦乞糴于晉晉人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義後來論馬見惠公乗小駟慶鄭曰古者大事必乗其産生其水土而知其人心則看論馬曲折如此推此兩端論之慶鄭於事理之間不為不諳練以理論之如論秦乞糴當時是非曲直所在慶鄭皆能知則可以謀王體斷國論後之論小駟曲折則可以議戎政既是如此當時可惜專以狠戾壊了蓋緣他氣不勝志故致得如此然晉侯以敗由慶鄭不能用固是如此然亦非晉侯不能用慶鄭慶鄭自以狠戾不能用其才耳學者治心養氣須當下十分工夫看慶鄭於是非邪正之理論馬之曲折事務無有不曽講者今却如此蓋緣慶鄭不知治心養氣之工夫學者於治心養氣不可不知其先後城鄫役人病十六年僖公中卷正是桓公末年霸業漸漸衰處故號令紀綱到此與前日甚不同舉城鄫一叚便見得役人病夜登邱而呼曰齊有亂不果城而還夫以桓公節制之盛初時一箇服楚遷邢封衞會諸侯投之所向無不如意及至末年欲做一件事也做不得同一桓公也何故昔彊今弱如此蓋桓公自葵丘之會志得意滿自放縱故霸業漸衰且如晉文公之季年諸侯朝晉衞成公不朝乃使孔逹侵鄭不能使諸侯畏威自至於用兵以闕之此亦是霸業衰處大抵霸業皆如此至王道却不然霸業初開故有可喜處到得末年往往易衰觀齊桓晉文之二君可知此亦力之不如徳然桓公末年城一小國而役人如此蓋是時管仲已死惑於内寵志慮昬蔽故前輩謂齊桓中主管仲輔之則治𥪡刁易牙開方輔之則亂此言極是管仲卒五公子求立十七年管仲卒五公子皆求立齊之霸業到此便衰這裏却有兩說一則管仲不能為齊求人二乃孝公無志不能繼桓之業所謂用管仲以興進竪刁以敗如晉文雖死至於悼公時猶能繼文公之業緣晉文雖死有狐趙之徒風聲氣習相與扶持孝公初無此般人故興衰之不同然陳穆公欲修桓公之好以此知齊桓之徳在諸侯使孝公有志而能振奮乗此機㑹繼齊桓之業其復興霸業甚易然而不能者雖是管仲當時不能用人亦是孝公無志及宋襄㑹諸侯便俯首㑹之其後宋敗便興師伐之大抵欺善怕惡畏彊陵弱非是霸者事業比所以不能復齊桓之業可深為孝公惜且如晉文成霸所謂伐原示之信大蒐示之禮皆積漸成霸業孝公有桓公見成規模反不能成霸業論此深為孝公惜也此固可為孝公惜然而管仲為桓公之大臣全不能立些根本亟薦引賢人以任國政徒能以一身盡忠而事君更不能謀身後事但區區屬孝公於宋襄故終無益也宋敗齊師于甗十八年晉敗秦師于殽二十三年五霸莫盛于桓文以桓公初時一箇規模宏逺豈晉文之所能及桓公身死之後未幾五公子争立其國遂亂晉文之後襄靈景厲悼六七君迭相為霸與春秋相為終始何故此蓋有兩說其一是齊之所以霸獨倚一管仲管仲以一身任齊國事更不旁招俊又為齊子孫之計晉文雖死有狐趙輩相與維持風聲氣習接續不絶此一説也其二桓公之後孝公懦弱無志不能激昻奮厲紹桓公已成之業且如鹿上之盟既頫首聽宋人之命其後宋敗方敢舉伐宋之師大抵畏彊陵弱豈是霸者規模此所以不能復齊桓之業晉文既死襄公殽之役雖未必是然既能勝彊敵終不至於委靡此又一說也此二説也固可見齊晉霸業之久近宋襄盟于鹿上二十一年齊晉所以霸皆先弱楚蓋楚於中國其勢不兩立惟齊晉能攘戎狄尊中國此所以成霸業桓公有葵丘之㑹以弱楚晉文有城濮之戰以服楚所以子子孫孫服晉且宋襄本不足以預五霸之列人見他亦曽㑹諸侯故列之於五霸夫宋襄尚且不識霸者題目霸者欲尊周㑹諸侯大要在擯楚蓋楚與中國相為消長宋襄欲成霸業反求諸侯於楚便不能攘戎狄尊中國與齊晉皆異此霸業所以不成宜其見辱於楚也然宋襄公之終始此一卷大可見若去事迹上看無緣看得出觀其初用鄫子于次睢之社那時之暴虐雖桀紂不過如此及其泓之戰不禽二毛其慈仁又如此若以事迹上看甚難曉人處世皆當明此若以理推之其仁其暴雖不同其失則一此皆是襄公一箇昬暗處惟其暗於前故欲徼一時之福而用鄫子于次睢之社惟其暗於後故泥古之陳言而不禽二毛自取敗亡之禍以理論之宋襄之所為不過一箇暗字所以求諸侯於楚使其稍知事體必不如此所以終於此而亡也王與晉陽樊温原攅茅田二十五年周襄王以王子帶之故出在鄭地晉文公納王襄王與之陽樊温原攅茅之田陽樊不服圍之倉葛呼曰徳以柔中國刑以威四夷宜吾不敢服也此誰非王之親姻其俘之也乃出其民足見文武成康之徳澤結民者深不肯輕捨王室且如前隠公十一年王與鄭人蘇忿生盟向之田直到桓公七年鄭伐盟向王遷盟向之民于郟然後盟向始服于鄭到此襄王與文公陽樊温原攅茅之田陽樊不服必待晉圍之蓋盟向之民不忍輕棄周而服鄭陽樊温原之民亦不忍輕棄周而服晉以此見周之徳澤結民深處不肯捨周服諸侯如此子犯言子玉無禮二十八年子犯請擊秦三十年推而詳論之文公人才之多無如子犯看晉文公始終用事皆子犯規模如二年敎民示之信示之義示之禮皆子犯使之如此文公所以成霸業皆是子犯規模看得子犯之在晉便是管仲之在齊然反覆論之其子犯亦未必一一皆是且如僖公二十八年子玉使宛春告於晉師請復衞而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二不可失矣若使文公從子犯之言則失親鄰報施之義當時若無先軫之言幾至於敗事頼得一先軫謀之晉方得勝又如僖三十年同秦圍鄭秦伯私與鄭盟而去鄭使杞子逄孫楊孫戌之乃還子犯請擊之公曰不可微夫人之力不及此使當時文公從子犯之言則又失親鄰報施之義未必不蹈惠公覆轍又頼得文公自理㑹得曰因人之力而斃之不仁亦歸舉此兩事論之人君雖有腹心謀臣須是自識得治體若使晉無子犯霸業未必成見得人材須要多然人材雖多亦要人君自理㑹得若使文公從子犯之言與秦戰便是蹈惠公覆轍舉前一叚謀臣不厭多舉後一叚人材雖多須是人君自識安危治亂之大體頽叔以狄師伐周二十四年王出鄭鄭伯省視官具于汜二十四年周襄王使頽叔桃子出狄師夏狄伐鄭取櫟王徳狄人以其女為后及後來不終狄反犯王室以致王失國出奔處鄭地汜鄭伯與孔將鉏石甲父侯宣多省視官具于汜而後聽其私政王初間厚狄狄後來反犯王室王初間伐鄭鄭後來反忠於王室此一叚人事最要人看其始周王以狄女為后時所厚者在狄所薄者在鄭及其終所厚者反興兵伐王室所薄者反忠於王室及王出奔又却不去他國却入居鄭此最要看左傳云我周之東遷晉鄭焉依其來舊矣鄭前為王所薄及出奔又為王省視官具而後聽其私政何反勤王室如此蓋鄭是懿親雖王薄之到急難不廢臣子之禮狄則逺矣王待之少有不到處便起反心發兵伐王室至王失國以此事論之大之于天下小之于一身無不如此所以親親為大也晉人復衞侯寗武子與衞人盟于宛濮二十八年寗武子處衞侯奔走艱難之時君臣上下皆失其道始者晉伐衞國人出衞君臣之逐君當時釁隙已自大後來再得歸寗武子為宛濮之盟曰行者無保其力居者無懼其罪要得合和彼此緣此國人稍不貳衞侯又先期入至殺其弟叔武元咺奔晉愬之於晉晉受元咺之愬所以執之歸于京師後晉遂欲鴆殺衞侯以此知衞侯亦危乎殆哉何故一國之人共怨既出其君衞之君臣上下相戕相賊晉是堂堂大國為霸主亦致毒於衞侯内則一國之怨外則霸主之怒如衆箭俱發叢在衞侯之一身雖泰山之壓卵亦未足以喻今寗武子獨以區區一夫之誠左枝右梧欲調䕶衞國上下之怨以氣勢論之寗武子一夫之力甚小一國之怨甚大霸主之氣甚大一夫之氣甚小何故一夫之氣内而回得一國之勢外而勝得霸主之力這見得寗武子忠誠懇切積徳深厚處雖堂堂霸主之怒如此一國之怨又如此人皆知之一夫之忠誠如何勝得殊不知忠誠到處天地可動金石可貫雖浩浩然一國之怨堂堂然霸主之怒皆可以消釋融化以此知為國患無忠臣若得其人則何事不成左氏傳說卷三
