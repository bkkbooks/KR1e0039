body:
  text: 左氏傳説卷六宋吕祖謙撰宣公晉楚戰于邲晉師敗績十二年楚子圍鄭宣成之間正是楚莊王霸業強盛之時舉邲之戰晉楚之強弱可知當是時晉景公但循常襲故政事少怠楚莊王方厲精為治政事修明晉楚之強弱大綱在此楚之所以強蓋得孫叔敖整齊軍政訓教卒伍細大本末無不具舉兵威所向雖中國亦不敢當其鋒楚之盛不特兵之不可敵亦莊王善能持勝何故其能縣陳又復封之既而克鄭鄭伯肉袒牽羊以逆又復其社稷夫楚用兵以取兩國而又復封其社稷此見楚王有其功而不居其功齊桓晉文以來未之有也當邲之戰晉楚正欲爭衡荀林父欒書之徒一見楚師便欲斂軍避楚則其強弱又易曉要之邲之敗其罪固在先縠然林父亦不能無罪以縠之剛愎不仁固不可信用林父以晉之名臣統元帥之權而不能制一先縠者蓋其新進之徒威德未孚于人故如此以楚嬖人伍參之言觀之謂晉之從政者新此言論林父最切當大抵賢才處事或至敗事者未必其才之不足處事之不審特其素望之未熟於人所以至於敗事古之人所以四十而仕五十而為大夫蓋欲涵養積習使威望在人已熟然後可以從政若是養之無素驟然居人上鮮有不敗事者良以此也故邲之敗雖是彘子之罪然荀林父亦有不是處觀彘子以中軍佐先濟林父不得已而從之此彘子之罪又使趙括更行人之辭是以惡言以激楚之怒亦彘子之罪不設備而為楚所乘三者雖彘子之罪然荀林父乃元帥至於魏錡趙旃以不得官職挾憾而往楚欲敗晉師是人皆知其不可用獨林父不察焉一請往即許之遂至於敗國事此乃林父之罪先縠先濟而林父亦從之此亦林父之罪及後為楚軍所乘鼓於軍中曰先濟者有賞遂致中軍下軍爭舟舟中之指可掬此亦林父之罪原邲之敗皆是晉羣帥浮躁不協遂至於敗師晉自邲敗之後大率規模與前不同故常厚蓄自養不敢有事乎他既不急於報楚亦不急於報鄭如伐鄭但搜焉示之以整而還及楚圍宋亦不過使解揚致命而已惟其如此所以有鞍之勝夫以滅夷數者之事觀之林父之謀慮亦可謂明矣至於邲之戰何如此之昏亂蓋人心最不可昏當邲之戰緣先縠強狠必欲先濟林父又不得已勉強從之惟其自相矛盾自相攻奪如此故林父方寸精明都昏亂了其徒先濟之時心已不在軍事是以舉措乖錯邲之戰先縠曰由我失霸不如死欒書從傍而止之至鄢陵之戰欒書為元帥乃曰不可以當吾世失諸侯反蹈先縠之覆轍而不自知范武子從傍而止之何智於前而昏於後也蓋天下之事傍觀之時無不精審及自臨事時利害切於己私心難克所以如此楚莊既勝晉不肯築京觀此亦是不敢自居功之意既伐陳因申叔之言即封之既入鄭因其君有禮復封其地退然不敢自滿引詩書之言宛有儒者氣象及其過周問鼎之輕重遽然陵轢天子聘齊不假道于宋聘晉不假道於鄭而又陵辱諸侯所謂儒者之氣象已不復見何故蓋生乎其地安乎其俗風聲氣習易於漸染故難轉移楚自武王以來其君臣日夜所講者無非此等事觀其僭號稱王其迫脅陵轢氣象亦有定本此亦家法所使故雖莊王之賢不能免乎氣習故莊王視以為常做了以此知居移氣養移體學者不可不知晉自莊王在時其兵未嘗輕動觀林父略狄土以廣晉初未嘗與楚爭也及其伐鄭亦但搜以示之整而已初未嘗急於服鄭但積習培養其力遂致有鞍之勝至鞍之戰莊王已死方敢用威以治中夏蓋當是時莊王之威加於諸侯自齊桓晉文之後襄公以下皆不及楚楚所以霸其根本安在惟欒書之言最得其要其曰楚自克庸以來其君無日不討國人而訓之于民生之不易禍至之無日戒懼之不可以怠在軍無日不討軍實而申警之于勝之不可保紂之百克而卒無後訓之以若敖蚡冒篳路藍縷以啓山林針之曰民生在勤勤則不匱不可謂驕此數句是得楚君臣自相警戒雖王之所以王霸之所以霸強國之所以為強國聖賢之所以為聖賢皆不出此最學者所宜用工夫處邲之所以敗以羣帥之情不一自相矛盾不能降心相從所以致敗至鞍之戰深以相從為先且以郤克為元帥韓厥為司馬元帥之尊司馬之卑韓厥欲斬人克救之無及從而勸之使徇且曰吾以分謗也克之意未必止於分謗所以先自降尊貶重如此則羣帥安得不和正欲啓將帥降心下志相從之意其後晉帥有功師歸范文子後入其羣帥亦皆相讓皆郤克啓之也以是知邲之敗其條目雖多一言以蔽之曰爭而已鞍之勝其條目雖多一言以蔽之曰和而已其後君臣不無自滿之心雖比厲公鄢陵之勝後臣下相戕賊不同當時君臣不能不為勝心所動何故見得觀魯來朝晉晉景公以不敬之遂至魯捨晉以從楚其君未免為勝心所動以驕魯侯也又齊侯來朝晉郤克曰此行也君為婦人之笑辱也以臣對君前乃敢如是則其臣亦為勝心所動以驕諸侯也君臣皆為勝心所動而驕心生以是知楚莊善持勝有是功而不居其功所以霸中國而景公之所以止為景公此晉之所以不如楚也邲之戰晉楚軍制十二年邲之戰如晉楚之所以勝敗前固嘗論之然而晉楚軍制惟此一戰所載甚詳晉出師時為三軍荀林父將中軍士會將上軍趙朔將下軍到後來賞鞍之功方分為六軍然以邲之戰考之當此時晉雖未分六軍之名已有六軍部分了何故當晉師臨河自隨武子以下皆不欲進惟彘子以中軍佐先濟當時若止是三軍時中軍將自是荀林父彘子安能分軍先濟以此知當時雖未有六軍之名已有六軍部分何故荀林父是中軍帥彘子是中軍佐士會是上軍帥郤克是上軍佐趙朔是下軍帥欒書是下軍佐以此知當時六軍已自分了所以彘子獨能以中軍佐濟若當時六軍部分未分彘子雖剛狠然區區一夫安能獨濟所以韓獻子謂荀林父曰彘子以偏師陷是則六軍部分已分了晉固如是然當時楚之軍制尤詳當時楚亦有三軍如子重左子反右所謂三軍是正軍時孫叔敖為令尹秉國之政不在三軍之數是統三軍者且如南轅反斾其或進或退軍之號令皆由令尹以此知令尹是統三軍者當時三軍是正軍其君之戎分為二廣內官序當其夜是親軍亦不在三軍之數常隨禁軍者到得率遊闕四十乘從唐侯遊闕自是楚兵亦不是親兵亦不是正軍往來補闕者看甚處薄遊闕則從而補之此所謂竒軍竒軍便是正軍中旋分出不是正軍之外别有竒軍但不係步伍之數者臨時看厚薄旋分補到後來楚既敗晉以乙卯日敗丙辰楚重方至以此知輜重常後正軍一日到蓋楚之軍甚有法輜重不過正軍一日若與正軍大過相逺時便有邀擊之患大過近時重兵才亂便亂了正軍後世用兵先擊輜重取勝者甚多只緣不是太近則太逺不近之間然楚之軍制不特如此看他所謂軍行右轅左追蓐前茅慮無中權後徑此尤詳備軍行時敵在右則持轅以備敵在左尋水草為宿之備軍若宿後旋求水草則亦有邀擊之患惟軍正行時右則持轅左則尋草頓兵相接截然整齊所謂前茅今之所謂達白之類前茅旗名或遇山險或遇敵前舉旗則後面可以為備中權是中軍大將軍進退之權三軍之心在此所謂後徑楚精兵在後大抵後來徑兵多在前多被人擊敗後面無繼惟精兵在後可以為前之備百官象物而動物是旗如周禮公卿建旜大夫士建物隨旗所向看舉甚處公卿都隨此是師之耳目處然其晝如此夜又甚嚴何故舉親兵論之可見右廣初駕數及日中左則受之以至于昏內官序當其夜親兵之軍十五乘常駕在這裏晝夜相輪凡宿當夜今之所謂當更如此則敵人掩襲不得看楚軍制如此之詳安得不取勝又看楚之戰亦有法當時楚既陳晉未成列孫叔敖三軍皆進當時楚王在中間中軍與晉中軍相對臨戰時又分左右拒右拒時當晉下軍左拒時當晉上軍兩者陳相對及戰時晉中下軍皆望風而走至於爭舟舟中之指可掬惟上軍未動時楚左拒正對上軍之整恐左拒獨當不得楚子告唐侯使潘黨以四十乘從唐侯以為左拒以從上軍何故添遊闕四十乘又添唐侯一軍只緣中下軍皆散了惟上軍未動若見添生軍時也退何故見他添生軍多惟晉之上軍見他添生軍多所以説楚師方壯緣此三軍都走此又楚戰之法成公欒書救鄭楚禦桑隧六年欒書侵蔡侵楚侵沈獲沈子揖八年欒書為政用知莊子范文子韓獻子之謀三人者皆晉國之望也任其計謀所向有功桑隧之役欲與楚戰能用其謀全師以歸此是用知范韓之第一次也侵蔡侵楚獲楚大夫申驪侵沈獲沈子揖亦用其謀有功而歸是用知范韓之第二次也夫三子晉國之望一時之名大夫書能屈身用三子之謀自以為從善矣三子亦以其謀䇿之見用自以為得行其言就事迹上論之固是如此然深考之則不然大抵為政有大體為國有大勢所謂用賢不在一謀一䇿之是用所謂賢亦不在一謀一策之見用皆須於大體大勢上用之看得晉景公因鞍之戰一勝遂至於驕其實君心都未曾正政事荒廢而大體大勢皆不曾整頓當時趙同趙括亦是一箇世臣故家罪未至死晉侯因趙姬之譖以殺之遂大失晉國之情內之大體已失之矣外之奪魯汶陽之田復歸於齊霸者統御諸侯大要只在信義晉既使齊歸汶陽之田未幾而二三其命又執鄭伯殺行人以失諸侯之心遂至渙散離亂晉之統體大綱都失了觀季文子之言信不可知義無所立四方諸侯其誰不解體則大體大勢顛倒錯亂可知欒書只知從三子之謀為善三子亦只知一謀一䇿之用為得不曾與整頓大綱數子之罪均也大抵賢者論忠於君翻然而出與之格君心之非正其本原須看大勢若大勢未轉亦當用力而轉之今欒書數子都不察晉景公是何時節大綱都不理會學者不可以一謀一䇿之用為善須當以大勢大體論而知范韓乃反使之有功而驕其志則知三子亦衮衮隨波逐流者耳晉郤至如楚聘楚子享之十二年晉郤至如楚楚子享之子反相為地室而縣焉郤至將登金奏作於下驚而走出子反曰日云暮矣寡君須矣吾子其入也郤至曰君不忘先君之好施及下臣貺之以大禮重之以備樂如天之福子反對以如天之福兩君相見無亦唯是一矢以相加遺焉用樂子反之言甚無義理郤子遂引兔罝之詩以闢之卒事而歸以語范文子文子曰無禮必食言吾死無日矣此一段觀郤至鋪陳典禮以事迹論郤至專對之才似可喜若就實事上看則不然蓋文子之意非畏楚人之叛盟然所以深自憂慮畏怯者蓋當晉厲公之時是何時節資質所為又薄了在朝之臣都不能深憂逺慮獨范文子憂時正恐晉勝楚有以重厲公之禍卒至於亡國厲公所為自有一箇覆亡篡殺在後面如郤子之賢亦止以其能專對之才便自喜都不能惕然深憂反自矜其才以增君之驕當時在朝逺慮者范文子一人而已惟文子見識髙明不特憂楚之食言最憂晉國以速覆亡篡弒之禍成子受胙于社不敬十二年成子受胙于社不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤此一段見堯舜禹湯文武相傳之妙旨力學之根本觀劉子之言乃見胸中所得皆三代老師宿儒傳道之淵源大本皆自此中出學者為學當致力於此數句上觀之吾聞兩字便見得老師宿儒之傳不是康公口中語其曰民受天地之中以生所謂命也此在中庸便是子思天命之謂性在大易即是太極一判品物流形各正性命萬物得天地之偏人乃得天地之全夫天之生物同一氣耳人與物在偏全之間故民者天地之心也此中即命之所在即詩所謂維天之命於穆不已便是此命也是以有動作禮義威儀之則以定命也須看是以兩字人之所動履適亦舉止得節皆不自外來無所勉強無所矯拂皆自然而然不可差一毫之過亦不可差一毫之不及此見是以有則處所謂以定命者此心操之常存則與天地流行而不息一或捨之而不存則便墮於私意人欲中天命便至於壅遏而不流行能者養之以福不能者敗以取禍福則不言取而禍言取者何故此心常操而存則心廣體胖怡愈安泰福本自內有若一欲敗度縱敗禮則禍自外來故禍言取而福不言取是故君子勤禮小人盡力今之所謂學士大夫皆是君子所謂農工商賈皆是小人論其中本無君子小人之別蓋君子小人各自有則所謂勤禮莫如致敬最是下工夫處人能致敬則動作威儀皆合於禮便是有則處所謂盡力如今或從事於畎畝或服勞於商賈就小人盡力處便是君子勤禮處勤禮莫如致敬如曲禮三百威儀三千苟泛然無統則無以行必有根本自我一心之敬發出則動皆合禮盡力莫如敦篤如勤畎畝以奉父母如服商賈以致孝養是也此一段最要就動作禮義威儀之則一句下工夫中者一身之大本下面一句却是入道之門户而今人多把作間看了不知此一句最是用工夫端的處如成王作誥思夫人自亂于威儀爾無以釗冒貢于非幾至於曾子臨終亦得孔子之深旨説君子所貴乎道者三動容貌正顔色出辭氣而今學者正要用力在如此一步之速以事考之亦未害事不知當時此心是定與不定一言之悖以事考之亦未害事不知當時此心還是存與不存正心誠意之事學者當隨力深淺行之其始雖若勉強其得味自有不可已者曹人使公子負芻守秋負芻殺其太子而自立十三年曹宣公從晉侯伐秦卒于師使公子負芻守國使公子欣時逆曹伯之喪公子欣時即子臧也負芻與欣時俱曹伯庶子公子欣時逆喪未歸之間負芻殺其太子而自立晉為霸主率諸侯討殺太子之禍執曹成公而歸之京師諸侯將見子臧於王而立之子臧辭曰聖達節次守節下失節遂逃奔宋不肯立後來負芻歸自京師自為曹君大抵學者之患最是勇於義而不能精擇如子臧輕千乘之國視之如弊屣而不肯受固是勇於為義然而講學不明擇義不精所以辭受取豫之際亦不曉自曹宣公之卒太子是正嫡本當立負芻殺太子而自立其罪當討晉人討篡弒之賊諸侯擇其賢者而立之太子在時子臧固不當立然而既死之後子臧固當受之可也亦當討前日弒君之賊今乃遷延不受反使篡弒之人儼然居一國之上使三綱五常都失序豈是晉人之罪都緣子臧歸潔其身太過輕重隆殺都不分却説聖達節次守節之語觀這一二句便見他講學未盡擇義不精亦皆有病夫所謂節者天之生民降衷秉彞天地智愚聖賢同守之而不可加損在文王則曰順帝之則在易則曰乾元用九乃見天則今子臧講學不明却以九縱八橫超乎節之外亦是子臧未曉得帝則民彞處雖有髙世之行難行之操所以不免得罪於君子都是擇義不精之過左氏傳説卷六
