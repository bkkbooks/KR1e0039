body:
  text: 左氏傳說卷九宋吕祖謙撰襄公崔杼廢成立明二十七年慶封好田耆酒二十八年陳無宇言得慶氏之木百車於莊同上崔杼廢成立明崔成崔疆殺東郭偃棠無咎於崔氏之朝慶封使盧蒲嫳帥甲攻崔氏殺成與疆盡俘其家而杼遂縊死大抵小人以勢利相合一旦勢均力敵必相屠戮而後已初崔杼弑莊公立景公而相之慶封為左相弑崔慶同為此逆謀杼弑君之後收一國之權其凶威虐焰太史書而死者三人舉齊國無一人敢當之者孰得而滅之及其死也乃以家禍而死因其處家無法廢嫡立庶遂致禍由内作故不旋踵而滅亡如安慶緒之弑安禄山史朝義之弑史思明皆如此自古之姦雄其威焰可畏無有能禦之者其終未有不死於内亂安禄山陷京師迫天子其聲勢蓋天下當時外面雖有張睢陽顔平原之徒盡忠於國何曽損得禄山一毫毛及其死也乃其子安慶緒殺之史思明僭叛飛揚奄據河北其聲勢再蓋天下當時外面雖有郭汾陽李臨淮之徒盡忠為國何曽損得思明一毫毛及其死也乃其子史朝義殺之姦雄之人看他凶強誰損得他而其終也其禍却自内始譬如百圍之木外面誰能摇撼得他動及其仆未有不自内蠧崔氏旣弑莊公以慶封為左相至慶封謀於盧蒲嫳嫳曰崔之薄慶之厚也慶氏終滅崔氏崔氏旣滅慶封自謂無事好田嗜酒與慶舎政未幾而有盧蒲癸王何之變夫崔杼弑君未幾而慶封俘其室慶封戕崔氏未幾而盧蒲癸破其家夫崔慶相繼當國一時威虐可畏外人不可得而滅其禍皆發於内也然崔慶之亂也又須㸔慶封其初甚精宻及旣滅崔杼之後君臣泰然自謂可以專齊國之柄盧蒲嫳慶封之所與謀者也子雅子尾之事嫳自謂譬之禽獸吾寢處其皮君臣都恁地驕解了此其所以終於亡且當時滅慶氏之人皆爭分財貨玉帛惟陳無宇之志皆不在貨財但對曰得慶氏之木百車於莊是其簒齊之大志已萌於此學者觀此當知沛公入關珍貨無所取婦女無所幸而范増所以憂看此一段雖可以為齊喜亦可以為齊憂慶氏旣平而得目前之安是可喜也禍亂旣平之後陳恒弑君之胎實萌於此豈不深可憂乎學者當看於此呉季札来聘觀樂二十九年季札来聘魯請觀周樂魯使樂工為之歌諸國之風及歷代之詩如小大雅頌之類札隨所觀次第品評之有論其聲者有論其義者如所謂美哉淵乎美哉泱泱乎美哉渢渢乎廣哉熙熙乎之類此皆是論其聲也如所謂憂而不困思而不懼樂而不􅁋大而婉險而易行思而不貳怨而不言曲而有直體之類此皆是論其義也以此知古人之詩聲與義合相發而不可偏廢至於後世義雖存而聲則亡矣大抵詩人之作詩發乎情性止乎禮義固其義也至聲依永律和聲則所為詩之義又賴五音六律之聲以發揚之然後鼓舞動盪使人有興起之意如清廟之瑟朱絃而䟽越一唱而三嘆有遺音者矣至今清廟之詩其義雖存而一唱三歎之音何在然音雖亡而義存學者亦可涵泳其音節使有所興起也所謂工以納言時而颺之五音六律今之世固不可求須想像所謂歌永言聲依永律和聲庶幾聲義交相發然魯工之所歌乃未刪之詩而今之詩已經孔子刪定故魯為季札歌諸國之風置豳於秦魏之前然札隨所歌品評又有可議者如歌小雅之詩則曰周徳之衰乎至後世文中子則曰孰謂季札子知樂小雅烏乎衰其周之盛乎小雅之一詩季札以為周之衰而文中子以為周之盛蓋是中子錯看了當時魯史樂工為季札歌諸國之詩欲觀歷代之樂一時之間每國不過歌一兩篇而已若使其於風雅頌一一徧歌則雖窮年越嵗歌亦未能畢豈一朝一夕之間樂工能盡歌之乎札所聽者樂工偶歌變風故札隨所歌言之且如歌唐季札則曰其有陶唐氏之遺民乎不然何其憂之逺也這只是歌蟋蟀一篇分明以此知文中子亦錯觀了這二段又須看得次序與今之次序不同以此知孔子刪詩大段移轉以季札之言考之聲音尚可想見如歌秦則曰此之謂夏聲此則全以聲論非無衣小戎之所可見札當時觀樂一一品評之札見舞韶箾則曰若有他樂不敢請己杜預以為魯用四代之樂故及韶箾而季札知其終然其義似不止此要皆不必如此說蓋韶之樂虞舜之時最和氣之所聚觀益稷之篇所載其和可以想而知之故韶最為盡善美雖善如雲門亦不能出此札一聞之有感於中其曰不敢請己者非謂聽樂欲止於此言其樂無加於此也正如孔子在齊聞韶三月不知肉味之意相類能知此意則知札觀樂之意此殆未易以言語訓詁求也呉季札聘列國觀人材二十九年當是時季札歷聘諸國遇魯則說叔孫穆子過齊則說晏平仲過鄭則說子産過衞則說蘧伯玉史狗史鰌公子荆公叔發之徒過晉則說叔向夫呉僻陋在夷而未嘗通於中國今一旦札自呉出見諸國賢者便傾蓋如故若素相知以是知賢者同聲相應同氣相求初不可以逺近論也如一見穆子便說子其不得死乎好善而不能擇人一見晏子便說納政與邑以免欒髙之難􅂊見一人便說許多話如平生心腹之友蓋同心之言其臭如蘭故如此又㸔過戚聞鍾聲一段札在戚聞鍾聲曰異哉夫子獲罪於君以在此懼猶不足而又何樂夫子之在此猶燕之巢於幕上君又在殯而可以為樂留數語在文子胷中而能使文子感之終身不聽琴瑟夫文子逐衛獻公而以邑叛附晉是衞之賊臣小人之尤者今一旦聞札之言遂至終身感悟不聽樂其變化轉移之速使當時未逐君之前文子獲與札處朝夕聞札之言未必不改移遷轉歸之於善以是知有國家者不患有小人而患無君子蓋有君子則小人已為他移奪變化衞之蘧伯玉夫子亦嘗稱之以君子就當時言之伯玉地位已髙亦未易及然把伯玉比季札只看這一事知文子逐君之時伯玉不能止之不過從近關出而已何伯玉不能化文子於乆處之餘而札能悟之於一言之頃以是知伯玉之地位固已髙而札之地位又髙於伯玉也伯玉不能已文子於未逐君之時而季札數語能使終身不聽琴瑟則伯玉與季札已爭數等如不有季札則伯玉地位已儘髙看札方知地歩高多在學者當如此看鄭子産如陳涖盟而知陳亡三十年鄭子産如陳涖盟歸告大夫曰陳亡國也不可與也聚禾粟繕城郭恃此二者而不撫其民其君弱植公子侈太子卑大夫敖政多門能無亡乎這見子産之觀國與他人不同常人如拙醫之觀形子産之觀國如良醫之視脉自常人觀陳國之形其聚禾粟則富矣繕城郭則強矣子産獨於陳國富強之中而察一國之脉知其君弱植公子侈大夫敖政多門雖有富强之形而不足恃矣鄭子皮授子産政三十年鄭子皮授子産政子産為政始終左右調䕶人皆歸功於子皮非子皮子産不能自立信然考子皮實迹愈見其難及子皮四世之望臨政當子皮而乃退然以遜子産子産之立於鄭非子皮不能者三初伯有之亂子産不助子駟攻伯有子駟欲攻子産子皮兩止之及伯有旣死其亂旣平次第當子皮為政子皮又授之子産子産辭以國小而偪族大多寵子皮曰虎帥以聽孰敢犯子以子皮鄭國之望帥其人以聼子産其誰不從及豐卷將田獵以祭子産弗許子張徵役欲攻子産子産奔晉子皮又止之而逐豐卷生子産於旣死還子産於己奔向使伯有之亂子産無子皮則子産不能自保其身中間無子皮則子産不得為政後来豐卷之亂子産無子皮則子産亦不得安於鄭是子産為政始終皆子皮之力固是如此然子産所以見知於子皮子皮所以終始愛䕶子産又有可論觀子皮使尹何為邑子産曰少未知可否子皮又曰使夫往而學焉子産又曰猶未能操刀而使割也其傷實多子皮一聞子産此言曰善哉虎不敏吾聞君子務知大者逺者小人務知小者近者我小人也微子吾不知也今而後知不足自今請雖吾家聽子而行其至誠懇切如此前面許多事迹却不似這一段至誠懇切開心見意惜乎其不登聖人之門使其得登聖人之門殆未可量子皮固是虚心如此又須看子産與子皮道同氣合略無一毫居功收能處方且忠告善道曰人心不同如其面焉吾豈敢謂子面如吾面乎子産之謙抑一至於此此所以感動子皮致他終始愛䕶他看子皮所言便見得子皮用子産看子産所對便見得子産所以用於子皮者精神骨髓都在此前面事迹亦都在此然子産内政又有可論處觀其有事伯石賂與之邑及豐卷旣奔以他罪論来自當終身不復入鄭可也子産為之其規模甚有次序其先皆是去委曲相就蓋當時有強家大族以亂治如子産賂伯石人問其故曰安定國家必大焉先如伯石三辭卿子産既惡之復處之髙位如旣逐豐卷三年而復反其田里以定反側之情與勸焚載書皆是一意當時都是委曲相遂却要就這上看紀綱自外觀之似若懦弱委靡如怕強家大族之模稜殊不知鄭國族大多寵子産怕他来壞了我紀綱故外面特先恁地調䕶他了然後紀綱可立至其都鄙有章上下有服田有封洫廬井有伍等事立經陳紀大人之忠儉者與之泰侈者斃之然後出賞罰示勸懲其規模截然有不可犯者此兩事須當合看子産之為政特外面如此示弱他國中紀綱未嘗不立也然此只是論子産好處然子産亦有不是處觀鄭人游於鄉校以論執政然明勸毁鄉校子産曰我聞忠善以損怨不聞作威以防怨這幾句雖三代之名臣所言亦不過如此則子産地位不是不髙其後欲鑄刑書叔向勸之堅執不從看這一處與向時所言大段各别此是何故蓋子産才地雖髙不得聖人為之依歸此子産所以止於子産不能無所失以子産之賢尚如此此學者不可不勉昭公鄭徐吾犯之妹美公孫楚聘之公孫黒又使强委禽焉犯懼告子産元年鄭子産之為政當時強家大族蟠根錯節勢若難制然子産卒能削制強族使政歸君上者蓋子産為之自有次序就當時巨族中觀之其跋扈難制無如子晳伯有然子晳之黨盛伯有之族孤子晳之勢強伯有之勢弱前此數年鄭國之所以不盛者以此二人為之害也及子晳旣殺伯有子晳之勢愈强後来其惡浸長至於欲殺子南而取其妻此一段事以常法斷之子南之聘在前子晳之聘在後自合直子南而曲子晳矣然今乃執子南而放之於子晳則置而不問子産蓋以子晳之族尚強未可遽加以罪故委曲斟酌調䕶駕其罪於子南也使子産便殺子晳則其𫝑之亟未必不再有伯有之亂矣然子産之放子南其理亦不至於全曲他當時蓋立得名字好了何故布幣之事子晳直而子南曲二人互有曲直也故子産曰直鈞然子晳是上大夫子南是嬖大夫以卑犯尊以賤陵貴事出倒置故子産特立此名字以歸罪於子南若名字不正則放一子南雖可以委曲調護强家大族然鄭國之紀綱未必不由此壞之此子産非遽然放子南必咨之大叔蓋大叔是子南族最賢者咨其族而後放之所以使其族體察子産不得已之意若不咨而遽然放之未必不反致怨於游氏也此皆權輕重識事機如此非有淵深之識欲做此等事不能到也及其後罪盈惡貫親戚叛之子産乃乗其機而討之至於數其犯罪五與之相抗略無少恕何前日治之如此之緩今日治之如此其急也蓋前日子晳之黨尚盛治之若急適所以至於召亂今日子晳之黨已離故急乗此機而去之不敢緩此一段學者最要看晉侯求醫於秦秦伯使醫和視之曰疾不可為也元年晉平公疾求醫於秦秦伯使醫和視之論晉侯疾證之外而及良臣將死趙孟問誰當良臣對曰主之謂矣此一段見得先王之典禮銷磨未盡雖工之技微亦獲知之其後言國之大臣有災禍興而無改焉必受其咎今君至於淫以生疾將不能圖社稷大抵國之大臣在乎養其君德保其君體三代之時為大臣者皆能如此故其典禮之遺雖工技亦知之至漢唐則無知者如霍光固可托六尺之孤寄百里之命其後昭帝以夭終則光所以養其德保其體者可知唐李德裕外誅藩鎮之強梁者而使武宗終惑神仙則是德裕無以養其德保其體盡此道者莫如周公佐成王所以養其德保其體公專以身任此事故無逸之作教之以先王之夀夭戒之以無逸豫遂使成王終其夭命而臨崩之際死生矻然不亂後之為大臣必如周公而後可漢唐之間雖有霍光德裕之相昭帝武宗猶不知保養之意韓宣子聘于魯見易象與魯春秋曰周禮盡在魯二年韓宣子来聘且告為政此一段可見當時君弱臣強之漸春秋時諸侯即位則告政於鄰國為其繼先君之政不敢輕其事且欲繼舊好也宣子晉之大夫為政之初乃行諸侯朝聘之禮及觀書於太史氏見易象與魯春秋則知周禮盡在魯矣此數句最要看觀易象魯春秋與周禮初無干預須看得宣子善觀書處如春秋周禮自易看若易與周禮大不相干此最難看蓋左氏所書合於禮者褒之不合於禮者貶之此與周禮相去猶近然左氏所釋乃魯之舊史未經夫子之筆削者宣子但見夫子未筆削之春秋不見夫子已筆削之春秋夫子已筆削之後抑揚髙下無非妙用所在此非宣子所能見易象之初未有爻辭至文王周公始為之大抵經禮三百曲禮三千吉凶軍賔嘉皆寓於其中故易之三百八十四爻所以該在是禮周公作周禮之書所以具其條目是以周公旣作易之後又作周禮實相表裏如此知周禮之所以盡在魯也宣子固不能知此必其得於老師宿儒之傳故能言之鄭游吉如晉送少姜之葬梁丙張趯曰甚矣子之為此来也三年晉有少姜之喪故鄭游吉如晉送葬梁丙張趯一見游吉曰甚矣哉子之為此来也其意蓋謂晉乃一嬖妾之喪正不必逺覲大矣則亦自悼晉國之喪故子太叔言將得已乎昔文襄之霸也其務不煩諸侯令諸侯三歳而聘五嵗而朝有事而㑹不協而盟君薨大夫弔卿共葬事夫人士弔大夫送葬足以昭禮命事謀闕而已無加命矣今嬖寵之喪不敢擇位而數於守適惟懼獲戾豈敢憚煩少姜有寵而死齊必繼室今兹吾又来賀不唯此行也張趯又善其言乃曰然自今子無事矣其意謂自後晉國之衰大矣夫亦且不来矣譬如火焉火中寒暑乃退此乃盛滿之時必有傾覆之患二大夫退子太叔告人曰張趯有知其猶在君子之後乎蓋譏其交結未深便自不隱宗國之衰此固如此至齊侯欲繼室於晉而使晏嬰来請觀晏嬰之言亦不隱宗國之衰叔向之告晏嬰亦不自隱宗國之衰觀此二段其意似覺相似而張趯見譏於子太叔而晏嬰叔向略無一言相譏何故蓋叔向晏嬰是一等之賢人屏藩籬破崖岸如石投水不知所問愛民憂國之心惻然有動於中雖各言其宗國之衰不以為譏也至於張趯不度其交之淺深一見太叔之賢便欲強親附之至言宗國之衰略無所隱匿便說通心腹話張趯只是佞䛕之人耳宜其不免於子太叔之譏也此固如此考之後一段尤可見其強附處其後鄭子皮如晉賀夫人張趯使謂太叔曰自子之歸也小人糞除先人之弊廬曰子其將来今子皮實来小人失望張趯於太叔旣去之後猶有強附之心故太叔告之曰吉賤不獲来畏大國尊夫人也且孟曰而將無事吉庻幾焉至此太叔之言非特譏之又且覺得有憎厭之意大抵學者見一賢者如道同氣合之時我能破藩籬與之言雖彼有崖岸此固不足論如道不相似而彼不親我而我強附之是交淺言深未嘗不見憎厭於人觀張趯之事苟非其人則當察言觀色不可強去附人觀叔向晏子之事於道同氣合之人則當剖破藩籬不可有所間隔左氏傳說卷九
