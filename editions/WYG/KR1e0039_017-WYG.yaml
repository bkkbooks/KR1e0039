body:
  text: 左氏傳説卷十七宋吕祖謙撰昭公晉頃公卒八月葬鄭游吉弔且送葬三十年晉頃公之喪鄭游吉弔且送葬以一人兼二人之職晉人所以責之當時觀子太叔對尚見得先王之制士弔大夫送葬這箇三代典制天子須加一等後來晉之喪事諸侯葬禮已過厚及周失政諸侯移所以事天子者事晉了稍有所貶降晉人便責之然而觀子太叔之對當時周室雖微天子有事諸侯皆徃事之雖不如事霸主之恭看靈王之喪鄭簡公在楚印段實住以此觀靈王之時去霸者未逺周室有喪諸侯大夫尚自徃見得王室雖衰尚自間有相維持處到得後來五霸盡了到七國不復有周因看許多制度見孔孟之時不同孔子之時周雖衰天命未改先王德澤尚在諸侯尚有尊王室之心孔子出來多説尊王至作春秋以尊王為本到孟子時分周為東西天命已改孟子出來勸諸侯以王者蓋緣時節大不同了大抵後世不考其時節不同欲解説孟子不尊王強取孟子一二事終不能勝議論者之口孔子時尚可整頓天命未改孟子時不可扶持天命已去了須如此看方公平吳子問伍貟伐楚何如三十年吳子問伍貟以伐楚之䇿對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之如隋之平陳賀若弼以沿江防人每交代之際必集廣陵陳人以為隋兵大至急發兵為備既知防人交代其衆復散後以為常不復設備故弼之濟江陳人不覺韓擒虎將兵五百人自横江宵濟采石守者皆醉遂克之正是得伍貟多方以誤既罷而後以三軍繼之必大克之之䇿伍貟之精於兵固不待論他説楚病源執政衆而乖莫適任患而以為敗亡之根本大而天下小而一國必衆人扶持而後得立若各自彼此無人任國事何緣能立得伍貟之言甚的當大抵觀一國之興亡有樞機闗紐處楚之所以亡執政衆而乖莫適任患其樞機闗紐在此雖以六千里無一箇擔當國事人安得不亡然又須看其所以亡大抵公則一理私則萬殊若人人同心戮力無緣得乖惟其各私其私互相忌疾互相彼此所以衆而乖此推於彼甲推於乙各自謀身而已楚之朝人臣非不衆國家無一人肯擔當為楚王者都不見為鄰國者已見之此最可慮楚國人臣雖衆都無人把國事為已事最為國之巨患人主所當深憂晉侯將以師納昭公三十一年晉侯始者將以師納昭公范獻子受賂曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎看晉執政之臣如此豈誠有納昭公之意不過為盟主備禮做這一着子家羈見得事勢如此本無納公之心但是晉以方伯欲為具文備禮塞天下之議故慇懃勸昭公不就此歸終身無歸期晉人謂我欲歸公公自不歸我責已塞以子家羈之明豈不知昭公之歸季氏專權縱使昭公歸國失權子家羈於是權輕重量事勢説公雖不得好歸亦勝越在草莾從昭公之衆可謂不察事情看昭公之臣左右前後都是輕淺不察事情前此在國既如此今此在外又如此公不知季孫之召是備禮反認做誠了靠之如泰山之重然而昭公有一子家羈不能用反聽從亡之言以此知昭公終始皆未盡善子家羈之謀雖無一中其忠誠懇切如此雖然看他心大抵觀古人事迹於事上看不足以知他心須平心看他心之所存以他迹考他心以所載考所不載以形見考所不形見而今只就形迹上看子家羈勸休伐季氏昭公不從所以出亡後來勸昭公歸昭公不從終不得歸若去形迹上看子家羈初勸休伐季氏不過鎮靜不生事及勸昭公歸不過包羞忍恥所遇事勢不同所以為此謀殊不知子家之心不得已如此看他才識智慮使其不事昭公豈止安忍不犯強臣使其遇明君必能遵養時晦再振公室之權惟是昭公手段設施不得看子家羈為昭公謀都是第七八着若子家羈之謀止於此大段失本意王使富辛如晉請城成周三十二年自王子朝之亂諸侯戍周到這裏敬王謀於晉為之城成周當時人心未定所恃者城郭而已今范獻子魏獻子謀與其戌周不如城之天子實云雖有後事晉勿與知可也他是晉秉政大臣自相謀如此以事迹上看晉人合諸大夫以城成周定其髙低厚薄以令諸侯似共王事以春秋之末晉之衰諸侯能如此已是閒見之事看晉執政不要去迹上看須看其執政之相謀雖有後事晉勿與知可也做此城成周一段事自此天子之事都不要去管他了這一段大段要看自周之衰五霸扶持王室固是無誠心欲借王室以求寵於諸侯何故到春秋之末雖五霸亦無尚有王澤未盡略知有王室在到得王澤欲盡僅有毫髮之存王不能因此振奮再張王室此一段事以略言之做一畨便不管所以謀雖有後事晉勿與知可也晉一國之心如此若以天下大勢論見得周所以不復振處何故當時人心九分在私止有一分在王室以一分做十分事為周城了事王室之心便亡蓋緣此一畨用盡豈特范獻子魏獻子之過為周王者所當増修國政保護愛養生起諸侯尊王之心反不審天下之大勢令城其城諸侯尊王室之心皆亡此周所以衰定公季孫言子家子亟言於我未嘗不中吾志也吾欲與之從政元年魯昭公身没於外季平子使叔孫成子逆昭公之喪於乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聽命焉當昭公之時昭公與季平子相與如水火從昭公者是季氏之讎從季氏者是昭公之讎子家當時從昭公於外竭其股肱之力無所不至以人情常理論之從昭公則不得於季氏得於季氏則必不從於昭公子家既從昭公今季氏却反思其謀深中吾心要與之共國事須看子家羈何以得此於季氏這一事便見得子家平日忠信誠實雖居君臣如水火之際上則不見疑於昭公下則不見疑於季氏兩不相疑使昭公能盡心以聽子家羈其小則可調護季氏使不至於有跋扈之患其大則可以平季氏而復公室之權故其從昭公淹恤在外許多年尚自兩邊無疑心未有謀不中者使其當時悉心聽之則君臣之間豈不可平惜乎有如此之人昭公不用都無所施大抵兩邊相疑中間最難為人得那一邊人信這一邊人便不信兩邊人最難得惟是子家羈忠信誠實所以能如此昭公不用此人以調和却至客死於外昭公之失自可知看子家羈所以去就之際所謂商之三臣自獻于先王亦是此心無愧於幽明叔孫自乾侯逆昭公之喪便見得子家外國之朝相避就而不見及至叔孫請見子家羈便辭以羈未得見而從君以出君不命而薨羈不敢見這一段自常情論之不過説道不敢見恐相見了雖為辭然其意也不止此夫子家羈所以不見叔孫正所以明大義昭公魯國之君淹恤在外十數年魯之臣子都無復君之心皆不知有君只以喪自外國歸魯國而無臣子如此以王法論之皆在可誅然則子家不見叔孫不是恐難為辭正所以明人臣之大義子家子既從昭公出自不當見昭公之讎季孫左右前後無非昭公之讎子家子正所以明大義叔孫既不得見子家羈叔孫受季氏之命至誠説與他使告之曰公衍公為實使羣臣不得事君若公子宋主社稷則羣臣之願也見得昭公之謀季氏公子宋元無預於其間所以季氏欲立之這一叚是欲與子家商量同謀立君凡從君出而可以入者將唯子是聽這第二節是商量納從亡臣子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告這第三節致季孫慇懃之意他説季氏願與子家同為政看叔孫傳季氏之言皆心腹之語以告子家如立君之大事欲與之同謀是果然信得子家過非子家忠信誠實何以至此觀子家之辭叔孫從容曲折有不盡之意看他説若立君則有卿士大夫與守龜在羈弗敢知且立君大事自有公論幽則有鬼神以至公之法論之不見叔孫乃是不與季氏之大者若從君者則貌而出者入可也寇而出者行可也這兩句斷了若以禮貌從昭公出者無從君之誠心不得已而出若是誠心從君其義自不當與季氏同處子家自知去就之義所以説道若羈也則君知其出也而未知其入也羈將逃也子家這幾句却是無愧於幽明觀子家言語人情大段合天理有一箇自獻于先王之心不共戴天之義當時昭公知我出今昭公雖死豈可背我之義固自當逃不與季氏同處這幾句最可以感發人處子家報此心於神明對此心於天地凡有血氣者無不感發當時若昭公許多人不都是至誠從昭公須有一半要歸一半不要歸一半是誠心從昭公一半是貌從昭公貌從者自可歸至誠從者不當歸當時雖是一半貌從昭公何故從公者無一人肯歸皆是子家誠心感動有力皆有不共戴天義觀子家此言此心可以動天地感鬼神何况人之有血氣者乎今觀此言自有感動人之意大抵看子家羈之事須當子細玩味凡人材多隨風氣所降春秋風氣如此便有春秋人材戰國風氣如此便有戰國人材秦漢風氣如此便有秦漢人材世人莫不為風氣所移惟豪傑之士不為所移如子家羈雖在春秋喚做春秋人材不得如董仲舒雖在漢喚做漢人材不得如諸葛亮雖在蜀喚做蜀人材不得皆不為風氣所移學者深思反覆玩味則良心油然生矣左氏傳説卷十七
