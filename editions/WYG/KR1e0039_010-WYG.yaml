body:
  text: 左氏傳說卷十宋吕祖謙撰昭公楚靈王使椒舉如晉求諸侯四年楚靈王使椒舉求諸侯於晉當時晉平公怠惰溺於宴安無諸侯之志其臣亦無奮然有志為宏逺規模楚靈王初欲求諸侯問於子産子産固已料之於先矣言晉君少安不在諸侯則楚強晉弱宜晉之必從楚也然初間靈王使椒舉之来晉侯欲不許司馬侯曰不可晉楚惟天所相不可與爭君其許之而修德以待其歸吾猶將事之晉侯又未肯乃言晉有三不殆其何敵之有國險而多馬齊楚多難必待司馬侯反覆調護然後許之何晉侯初閒未肯許它必待至於再至於三而後許也當時楚方强晉方弱晉自是不能與楚爭何故初閒尚欲不許蓋天下之事人不自量者最多使人而皆知自量則弱自安於弱如此則諸侯何戰奪之有正縁衰世之君不知自量故内有削弱之實而外欲避削弱之名不肯屈意下心以為人役尚欲爭虚氣晉君之病正在此向使平公不得司馬侯委曲調䕶亦未必從晉旣不能主諸侯諸侯勢必從楚則以楚之威熖亦必自㑹諸侯矣當是時晉傷威損重多矣而頼一司馬侯調護許楚之請今諸侯之從楚必竟是因晉侯許之後從之則傷威損重猶未至扵極也然司馬侯當時地位不在六卿之列所以其力止如此但就事上面能使晉侯不至於傷威損重若在六卿之列須能輔晉侯忍強楚侵陵之恥掃雪奮迅治楚之罪可也六月丙午楚子合諸侯于申四年當時靈王旣殺其君却要得諸侯為申之㑹當時諸夏之君莫不咸在楚子見得如此盛其心已滿所以欲示諸侯侈然自滿子産已知其不過十年學者到這裏最要識得他器量淺深之别處大抵人之分量滿溢又各自有先後如齊桓公圖霸業以前三十年都不曽滿到得葵丘之㑹方滿晉悼公圖霸業以前七八年都不曽滿到得蕭魚之㑹方滿然未有如楚靈王􅂊得諸侯便滿以此見人之分量不同方葵邱未㑹之前三十年間固嘗有安王室之功有服強楚之功有㑹諸侯之功初不見其自滿也方蕭魚未㑹之前七八年間固嘗合諸侯和戎狄亦未嘗自滿齊桓公必至三十年之乆方始自滿桓公到此分量去不得故滿唯其滿得遲所以為五霸之盛其不能不滿是以止於五霸悼公和戎以正諸華三駕而楚不能與争都未嘗滿到蕭魚之㑹分量亦去不得故滿以桓公三十年校悼公之七八年其滿溢之遲速分量之淺深霸業之久近已大段不同至於楚靈王則大異其所以不悠久終為天下笑今楚靈王方一㑹諸侯便侈然自滿度量之淺深不言可知晉悼公之分量逺不及齊桓公楚靈之分量又逺不如晉悼公之甚也雖然自楚靈王志意未滿之前有識之君子己自逆料他必至於此何故初間他一出来做事所為無不如意東西南北無不服從一求諸侯於晉晉便許一伐呉呉便克一伐頼頼便滅一伐朱方朱方便克承篡弑之餘而以無道行之自以謂天下事皆可等閑做反所以速其禍敗使當時晉尚強尚有齟齬於其間楚之禍敗亦未必如此之速奈何晉日以柔懦不能與楚爭楚王之心到此故侈然志盈而意滿唯其滿得速所以禍敗也亦速鄭子産作丘賦國人謗之四年子産作丘賦國人謗之是改三代井田之法如魯作丘甲一般子寛告之子産拒子寛之言甚峻推原子産為政此一段事蓋自有說鄭小國也中立乎晉楚強國之間前後數年從晉不從楚從楚則不從晉不過但供一邉貢賦而已則小國尚可支持到楚靈王方無道晉平公衰弱又不能與之校鄭以蕞爾之小國事兩霸主朝廷貢賦與平時所貢之物已添了一倍所以子産不得已作丘賦當時其他諸侯亦莫不供兩霸主貢賦何故其他諸侯皆能供而不至作丘賦何獨鄭不能供而作丘賦須是推原子産所以作丘賦之意蓋子産為政常欲使鄭國整齊有餘不使到闕乏地位所以不恤人之謗已而作之大率子産為人必欲要就窄狹中却示其寛裕衰弱中却示其強大子産之規模多是如此是以有得力處有不得力處其他諸國則是到闕乏時逐旋為之子産不肯教國中有困乏之患於是寜甘心受謗而不顧所以多取於民其弊至於如此故子寛曰作法於涼其弊猶貪作法於貪弊將若之何寛之言天下之至言也大抵士君子要識微慮逺有髙見逺識而能推原存亡之所以然方謂之通逹國體若不能如此只隨事上看必學有所未至也子寛見子産不從遂知國氏先亡又知蔡及曹滕無禮而先亡又知鄭無法而先衛亡可謂能推原得數百年存亡興衰之迹者其識甚逺其見甚明惜乎子産不能聽也公如晉自郊勞至於贈賄無失禮五年魯昭公如晉自郊勞至贈賄無失禮者女叔齊謂魯侯焉知禮夫自郊勞至贈賄皆無違何故謂之不知禮觀女叔齊之言謂是儀也非禮也禮與儀本非二事凡周旋上下俯仰揖遜之際無非至理之所在到得後世析而觀之儀自儀禮自禮至有以儀為非禮女叔齊不特辨魯侯儀禮之分乃所以深警晉平公不知禮之本平公之時六卿方强何異魯三家有女叔齊叔向不能用何異有子家覊不能用是魯晉當時皆不知禮之本矣方從事虚文而不能於實事上理㑹此女叔齊所以深警動他蓋周之衰大抵皆徇末忘本從事於末而不知本實寓於此也故林放問禮之本夫子曰大哉問是當時皆不知其本惟林放獨知而能問然夫子又曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉當時皆從事於鐘鼓王帛之末而不知鐘鼓玉帛者固有本末存焉今須看得禮樂固不在於玉帛鐘鼓而亦不在於玉帛鐘鼓之外使聖人有作雖不徒徇乎末而所以為本者又豈在於鐘鼓玉帛之外哉學者不可縁女叔齊之言遂分儀與禮為兩事使昭公果知郊勞贈賄之為禮而能立禮之本則三家決不至於盛而魯亦未至遽弱也鄭人鑄刑書叔向使詒子産書六年子産鑄刑書叔向詒子産書曰昔先王議事以制不為刑辟又曰民知爭端矣將棄禮而徵於書錐刀之末將盡爭之亂獄滋豐貨賂並行子産不從大抵古者象以典刑示五刑之大法而已其條目輕重淺深生殺一切付之以人未嘗立為定法民之有罪者隨其事而權其輕重故不得乗吾隙以投其姦後世立法纎悉曲折盡著於此便起人爭心姦人得以執其法以取必於上所以叔向言民知爭端將棄禮而徴於書錐刀之末將盡爭之蓋三代之治略示大綱才略示大綱刑便無定所以人心常警動敬戒而不敢犯當子産未鑄刑書民但知有五刑而不知有五刑條目故民猶有敬戒之心及刑書既鑄民皆可以便已自營執上之法而取必於上開人偽心堯舜立法之意都失了蓋子産只要目前整齊不為後計正縁他規模如此但要無一法之可議一事之可指而不知流弊於後世亦是不曽講學之過然以作田賦鑄刑書二者觀之方其作田賦渾罕諫之曰作法於涼其弊猶貪作法於貪弊將若何則不可以無法其鑄刑書也叔向諫之則以為不為刑辟大扺賦之與刑二者之用正相反賦不可使之無定刑不可使之有定蓋賦自有中制不可多取一分多則大桀小桀不可少一分少則大貉小貉豈可不定若刑則不可有定蓋先王議事以制不為刑辟臨事制刑人當謹戒及纎悉既著為法則小人執法為姦子産於二事正相反賦不可不守法却變法刑不可定法却作刑書以此知天下事治亂相去正如弈棊當去東處着却去西處着了當去西處着却去東處着了以東為西以西為東則勝負可知當時子産能以作田賦之心用之於鑄刑書必不使之有定法以鑄刑書之心作田賦必不使之無定法穿封戍為陳公曰城麇不諂八年穿封戍囚鄭皇頡公子圍與之爭之襄二十六年楚靈王在當時最號強暴無道然當時得以威行於中國雖終於滅亡然飛揚強大尚至於十四年蓋靈王雖是無道其間亦有一二件好處且如使穿封戍為陳公曰城麇之役不諂當靈王為王子時與穿封戍爭囚鄭皇頡戍操戈欲逐王子圍是仇讎之人今既即位不惟不報其讎旣滅陳又封之為陳公如此等事正如齊桓公忘射鈎之讎而用管仲晉文公忘斬袪之讎而用寺人披異世一揆此皆與桓文暗合處若是他全是無道時雖凶威惡焰足以憑陵諸侯如何過得十四年惟其間有一二件與賢君暗合處故當時雖以無道行之猶可支持十餘年大抵天下之道最不可須臾離如穿封戍事故可取至於申無宇執人於王宫在靈王之虐冝若必誅而無赦今乃寛假慰遣之蓋十事中有一二事暗合所以過得十四年故當時雖以凶威虐焰加於天下而不至於亡者由此故也若專凶焰暴虐以無道行之只如州吁數月便亡大抵暴不可恃若專以無道必不能久厯考篡弑之人粗能支持皆出於此後世之君却謂天道難知而不知天道本不難知也左氏傳說卷十
