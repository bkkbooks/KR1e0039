body:
  text: 左氏傳説卷十九宋吕祖謙撰定公六月季孫意如卒九月陽虎囚季桓子五年陽虎自平子疾專政及平子卒囚季桓子以陪臣之微而秉一國之政論季氏是彊家大族在平子時親逐君非不彊何故身死未幾便為陪臣據其家如此之速固是説道天下無道則禮樂征伐自諸侯出又降而自大夫出又降而自陪臣出僭亂之萌既開彼此相倣天下之大勢都如此須又自就着實處看魯之權所以在大夫者何故正緣有慶父襄仲之難所殺者三君季友與季文子有定君之功自此專權因成弑君之亂此權所以在大夫季氏之權所以在陪臣何故蓋季平子所以能逐君外則諸侯從之内則國人服之豈平子一手一足所能自至皆是家臣彊悍勇知之人為之爪牙搏擊於外乃可如陽虎者實宣力焉於是假借長養他惟恐他惡不彊但知崇奨他而不知其利在前其毒在後及昭公死定公立季氏長養容縱家臣之禍方出來蒲囿之亂幾亡其所以不亡者僅於一髮天下事利於一時之便其後未有不反為所害者譬如要得放縱肆欲之人服丹藥相似後來血氣既衰未有不為癰為疽反以喪其軀者當時雖得他不義後來為其不義所敗古之君子言必慮其所終行必稽其所敝蓋為此也宋樂祁言諸侯惟我事晉六年宋樂祁言於景公曰諸侯惟我事晉今使不往晉其憾矣樂祁告其宰陳寅寅曰必使子徃子立後而行料得晉政多門必過其禍樂祁用其言見溷而行及祁到晉果如陳寅之言為范獻子所執終不得歸看這一叚事當時陳寅之謀也自精宻因此可論天下大勢考左氏所載本末可以觀春秋天下大𫝑若是桓文以前諸侯多見於左氏所載凡見於征伐盟會之間皆諸侯自相為謀蓋當時之政自諸侯出故也自雞澤溴梁之會大夫專盟全不見諸侯言語宋之一㑹多是趙武等説話大夫之事多見於傳蓋當時之政自大夫出故也及春秋末後一節陪臣執政如陽虎如仲梁懐如公山不狃如北宫氏之宰如樂祁之陳寅是時家臣事迹言語多見於傳蓋當時之政自陪臣出故也以三者觀天下大𫝑可見政在諸侯縱天子失權然猶自可政在大夫縱諸侯失權尚可整頓到得陪臣名字見於書傳當時大𫝑亦自可知范獻子執羔趙簡子中行文子皆執鴈魯於是始尚羔八年公會晉師于瓦范獻子執羔趙簡子中行文子皆執鴈魯於是始尚羔在春秋時號為周禮盡在魯然而卿大夫羔鴈之制尚且不知因見晉師卿與大夫執羔執鴈尊卑之别方始知尚羔以此見當時先王之禮散在諸國不能備魯最秉周禮尚不知羔鴈之别必待見晉卿大夫執之方且一一修整舉此一條其他禮不備處多又以這一叚推之當時春秋之末先王之禮散在天下無所統紀正合當收拾時節所以孔子出來刪詩定書繫周易作春秋蓋這時節正是道德仁義典章文物欲散而未盡使當時無孔子都散盡了當時所謂典章文物之備無如魯魯尚不知先王之制其他可知孔子所以問官名於郯子問禮於老聃皆收拾天下之遺文逸典以示後世法然而魯之禮當時是周公之所傳想見無所不備而卿大夫所執正是帝王巡狩之禮修五玉三帛二生一死贄羔鴈正是卿大夫所執在虞則有五載一巡狩所修在周則有十二年巡狩所修尊卑上下之分全在玉帛采章以别等差魯所以不辨羔鴈亦是周之東遷巡狩之禮久不講故也季寤公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏叔仲志不得志於魯故五人因陽虎陽虎欲去三家而代位八年陽虎之亂當時國人皆聽命所以三家皆在其掌握然而當時欲滅三家垂成而敗非是威力不足亦非知謀不及看得本源他所以欲去三家其本心非是欲張公室不過要得貪其禄位以亂易亂以此見季寤公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏叔仲志不得志於魯當時五人不過欲因陽虎去三桓而代其位而已當時使陽虎之事成公室未必張徒以亂易亂而已然陽虎所以不成亦是當時家臣勢鈞力敵自足以相制所以當時享季氏於蒲圃孟氏家臣公斂處父告孟孫先備陽虎陽虎雖出奔三家雖脱陽虎之禍然而陪臣得志其權卒未能收論來陽虎既出奔其權自當復歸於三家然而卒不能收者蓋所以去陽虎非是三家之功乃是資陪臣之力陪臣展轉竊位據權是去一陽虎又生一陽虎凡事皆如此小人竊位據權亦未有不敗時然其敗出於君子君子得志則公論便正出於小人小人自相攻擊雖去一小人公室之權無緣得振正如陽虎之亂相似若去形迹上看陽虎陽虎飛揚跋扈及一旦去之却是公歛處父之謀陪臣之禍於此方生且如漢宏恭石顯欲擅帝室之權蕭望之劉向之徒或死或逐或不得志天下所憂成帝之時恭顯之去論漢室之威權自合復振其所以不振者何故蓋其所以去恭顯又不過一王鳯而已宦官既去外戚又擅權此漢室所以不免於亡學者尚論其𫝑須看去小人者是誰去小人陽虎奔齊請師伐魯九年陽虎既敗於魯自魯奔齊請師以伐魯曰三加必取之齊侯將許之鮑文子諫曰夫陽虎有􅃂於季氏而將殺季孫以不利於魯國而求容焉親富不親仁君焉用之君富於季氏而大於魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執陽虎不用其䇿觀這一叚事以此知小人所以能入其君奮其詐謀皆國無人故乘間伺隙所以得入當是時齊雖衰尚有鮑文子年九十餘為老成人在譬如人元氣未盡外邪客氣尚擔當得去以此觀之重臣宿德於國家平居無事未見得力到得邪説將興小人將進變亂之際是時得一重臣宿德如砥柱之在中流優游謀畫變亂為治若使齊無鮑文子又被陽虎專政復蹈魯之覆轍幸有鮑文子在陽虎雖有詐謀要入不得所謂老成尚有典刑正為此及其奔晉晉無人所以有晉陽之危亦是用小人之過何故去齊入不得去晉入得當時齊有人晉無人故也晉趙簡子盟衞侯將歃涉佗捘衞侯之手及捥八年晉車千乘在中牟衞侯將如五氏曰敵矣九年晉侯使渉佗成何辱衞侯當時為他深辱朝國人欲讓國慨然發憤以衞之小晉不能抗當時晉車千乘在中牟衞侯將如五氏卜過之龜焦衞侯曰可也衞車當其半寡人當其半敵矣乃過中牟人欲伐之衞褚師圃亡在中牟曰衞雖小其君在焉未可勝也以衆寡彊弱論之晉車千乘衞車五百乘晉之師倍衞之師衞侯不度衆弱以一朝之忿招危取敗何故晉人望而避之不能與敵緣他當時慨然發憤立志得堅雖晉甲兵之多亦不能當以此觀之人不可不立志以衞之小慨然發憤立志得堅雖三軍之衆尚自望而避之更不敢與校衞侯既有此志故卿大夫有此志士民亦有此志人皆有此志則人人皆是必死之人十自可以擊百百自可以擊千何况衞車有晉車之半晉人雖多安能當必死之人所以望而避之事𫝑如此以此知天下事近而用兵大而脩身齊家治國平天下立志在先所謂三軍可奪帥匹夫不可奪志當時衞本是會齊齊克夷儀進軍千乘在中牟及衞侯過中牟晉人不敢伐禇師圃且言齊師克城而驕其帥又賤遇必敗之不如從齊乃伐齊師果敗此有志無志之辨初不在彊弱之間當時晉欲服衞緣衞侯立志之堅屢加兵而不能服到這裏反卑辭問衞所以叛之故衞人皆曰渉佗成何之辱晉人遂執涉佗以求成於衞衞人不許趙簡子遂殺渉佗以謝衞論當時所以辱衞侯非他本心乃是趙簡子之意使非趙子使他誰敢辱衞侯渉佗成何承順簡子之意至於捘衞侯之手其意謂簡子秉政當權奉迎簡子以取敵而已到得衞既叛屢加兵不服是時秉政亦是趙簡子反執渉佗殺之以謝罪於衞不知當時二子所以無禮已實使之就簡子自身上論自古姦雄賣人以自脱都如此自不足論姦雄一時使人為不義後來便賣人以自脱如司馬昭之於成濟朱温之於蔣元暉趙簡子之於渉佗成何皆是學者當深戒然渉佗成何以匹夫之微而辱國君正是靠趙簡子如山岳不知一旦事𫝑之變他人以義來責已道理去不得為渉佗者終不免於戮當此時雖趙簡子亦末如之何矣以此知徒倚權臣為事不顧義理之所安者未有不反為所害仲由為季氏宰將墮三都叔孫墮郈季氏墮費公山不狃叔孫輒帥費人以襲魯十二年孔子為政於魯墮三家都邑考當時本末自有次序所謂三家兼魯國而有之已四五君矣仲尼驟得政若驟墮三家都邑自常人論之必疑變不可知然考當時事端初不發於仲尼乃仲由為季氏宰發此議又是三家自有此議後來論此却言仲尼不自為謀恐三家萬一不從傷威損重不可復令魯國若使仲由為之從則公室之權自此振不從則不過不從家臣之言仲尼之體貎未損魯國之威權未沮為此論者亦未免為利害所奪亦未知聖人為政夫子之得邦家所謂立之斯立綏之斯來動之斯和聖人作而萬物覩仲尼在上同此心者孰不懷同此氣者孰不感況仲由是勇銳兼人之資感於氣最先者所以為墮都之議而叔孫氏季氏皆從墮郈與費此二人亦非仲由所能令蓋聖人在上他自有所感動仲由特發之耳然兩都既墮獨公歛處父負固而不服何故此閉固難感者所以雖用兵未克如三苖逆命一般若仲尼終為政於魯則閉固者亦須服又將此事反覆論當時仲尼為政公室之權雖未盡收已不見公室與三家之異昭公時三家與公室相為仇讎到此能與三子入宮登臺當倉卒變亂之時敢如季氏之宮分明見得季氏與國同體了此見聖人感化之功如此晉趙鞅謂邯鄲午曰歸我衞貢五百家於晉陽午不從趙孟怒殺午十三年秋范氏中行氏伐趙氏之宮趙鞅奔晉陽同上十二月趙鞅入于絳同上晉范氏中行氏與趙氏相攻觀始者作亂之由與後來范中行氏之所以敗趙鞅之所以再入看此曲折斷之一言不過私之一字為致亂之由當時趙鞅欲邯鄲午歸衞貢五百家於晉陽午不從趙孟怒殺午緣此作亂范氏助他所以致亂之由只緣趙氏豐植其私欲私邑彊大到得范中行氏所以援邯鄲午亦非有公心正緣午是荀寅之甥荀寅又是范吉射之姻親黨更相助到得趙鞅奔晉陽後來韓簡子之徒言於公欲逐荀寅范吉射之徒亦非是正國家之刑其端亦私意乃欲以私愛立梁嬰父為卿故欲逐范氏代其位韓簡子亦與中行文子相惡欲乘閒逐之范氏助私黨韓氏報私怒外面若欲振綱紀其實是私以此知晉室之亂舉六卿雖或勝或負或存或亡通是一箇私意為國盡皆私意無一人為公晉安得不亡子貢見邾子執玉高公受玉卑皆有死亡焉十五年子貢見邾隱公執玉高公受玉卑皆知其死亡既而果然仲尼曰賜不幸言而中是使賜多言者也左氏雖近然未入聖人之門庭觀其所載多是變移了意不得其眞與論語所載大叚不同惟此一叚獨得其眞仲尼此言乃是深警省子貢處前此初入聖門専恃智辨只去人上做工夫如方人如看二君死亡皆是億則屢中皆是志滿意得之時到此若非聖人有以警省他子貢㸃檢已分工夫都無專去人上做工夫了正當驕大矜揚之際却與他萬鈞之石壓倒了許多意見所以後來説紂之不善其忠厚意思與前日方逆料二君死分明是兩箇人何故正如病作而投與藥左氏傳説卷十九
