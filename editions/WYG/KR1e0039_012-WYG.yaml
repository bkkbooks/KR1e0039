  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0039_WYG_012-1a, image: WYG0152/WYG0152-0091a.png}
body:
  text: 左氏傳說卷十二宋吕祖謙撰昭公治兵于邾南甲車四千乗十三年平丘之㑹叔向曰寡君有甲車四千乗在其何敵之有同上晉自平公以後所謂霸業僅存而已到得昭公時諸侯皆有二心在晉無䇿不過掃境内之衆以治兵於邾南欲以服呉甲車至於四千乗夫晉霸業之最盛者莫過於文公文公之戰最大者莫過於城濮城濮之戰不過七百乗當時能服強楚遂霸諸侯至於後来相繼或盛或衰亦未嘗有四千乗全出時節鞌之戰雖郤克再三請益兵不過至於八百乗及楚靈王欲執韓宣子與叔向而薳啓彊諫之亦不過曰晉長轂九百是晉當時出兵大率不過千餘乗何故當此削弱之時兵乃如是之多蓋當其盛時兵常在國雖有四五千乗所出不過千餘乗故力常有餘而能坐制諸侯到此霸業既衰求以自振於是焚林涸澤掃國内之衆而出欲以威靈氣焰驚讋諸國初不慮其後之不繼也然而主此謀者叔向也叔向晉之賢大夫豈不知前出兵規模如此叔向之心見國勢衰弱如此亦欲庶幾一時之強而已自古論王霸皆曰王以德霸以力德與力是王霸所由分處然而霸亦嘗假德而行亦未嘗專恃力而能霸者如晉文公之霸所謂出定襄王入務利民伐原以示之信大蒐以示之禮皆是依傍德而行惟文公以德輔力故能一戰而霸到得平公以後全無德全恃力不知霸雖是力亦必假徳方能立以此知維持天下者其可斯須去德邪昭公不合全倚靠着力此所以雖有四千乘而不能以一振也以此見兵初不在衆晉當時所以盡出兵革乃叔向之謀叔向晉之望也豈不知文公舊規模豈不知掃境出来後無以繼所以如此蓋出不得已當時晉君侈六卿強公室又卑紀綱文章皆不振雖叔向亦不能救勉強圖須臾之安所以為此舉看此事皆非叔向之本心觀平邱之㑹别無人奮臂攘袂主盟其事其謀大抵多出於叔向強如此主張先曰諸侯不可以不示威到得晉將尋盟齊人不可叔向又奉命告於齊齊遷延不從叔向又舉先王朝聘㑹盟之禮數十語責之之後方得齊人懼而聽命叔向見得諸侯解弛一㑹之閒凡兩治兵到得於治邾莒之愬又是叔向責魯時惠伯對曰君信蠻夷之愬以絶兄弟之國叔向又奮然言之曰寡君有甲車四千乗在雖以無道行之必可畏也考此一㑹本末見得晉衰弱皆無人維持全是叔向強主張振厲奮發如此然叔向豈得已哉亦圖於衰弱之中少振起之故不得已如此自形迹上看叔向但見得他發揚蹈厲見事風生風采凛然可畏然未嘗知叔向勉強恨愧不得已之氣象皆在言意之外此段事只看他震動諸侯非真知叔向者讀書須見得叔向外為壯語其内心如何叔弓圍費十三年南蒯將叛十四年魯昭公當時不能堪季氏之強暴陵弱公室不勝一朝之忿舉兵伐季氏至於失其國身死於外自當時觀之不過言魯失民數世一旦輕舉妄動以喪社稷固昭公之可罪然當時便俛首聽命於強族亦豈是承周公伯禽付托之意但季氏雖強然考當時事勢亦自有可乗之機昭公智不足以知此費季氏腹心之地季氏不能自固根本南蒯以費叛腹心内潰季氏討之三四年不服閒隙孰􅂈於此昭公若乗此機㑹正一國之紀綱收公室之權當時又有子家覊清忠逺識與之圖回舉兵以伐之季氏必敗大抵投機之㑹固有閒不容髮者今也季氏討費數年之久亦一大機㑹也而昭公不能知當可為之時不為及季氏既服費大强之後始謀討季氏亦已晚矣此其所以反為季氏所陵而身死于外也楚令尹子旗有德於王不知度九月楚子殺鬬成然十四年楚令尹子旗有德於王而求無厭故楚子殺子旗當時平王所以立子旗實與其謀到得平王即位之後以子旗為令尹尊寵在羣臣之上報之亦云足矣然子旗之心責報無已所以至殺其身大凡有德於人人已報方且誅求無厭卒至以德為怨觀富辰之言曰報者倦矣施者未厭此兩言天下之至言也當時有德於人人報我之心已倦然施徳之人尚無厭卒至以恩易怨至於不得其終所以後漢崔子玉座右銘之語有曰施人謹勿念受施謹勿忘亦是富辰始終兩語然於此又當求其病根何故施恩之人常誅求無已受恩之人常厭倦此須思病根所在正縁不知反已只去人上看了有德之人但只以當時我曽有德於人只去誅求不知權衡輕重都不思量我當初有多少德在他處他如何報我了報者但說我已報他了又如此誅求不已兩者都不去反已只去自私心上看了然則報者自當無倦施者自當知足故以德易怨嘗出於不知此楚費無極害朝呉之在蔡十五年楚靈王之後平王立楚國稍整頓規模方略奠枕再傳至昭王終有呉入郢之禍幾亡楚國其病源皆起於費無極之亂楚國其病根則又在於譖朝呉上當時朝呉有功於楚與平王是同體人費無極欲害其寵用間諜使蔡逐朝呉夫朝呉有佐命之功未有顯惡王怒曰余唯信呉故寘諸蔡且微呉吾不及此女何故去之王之怒當矣使平王於此時便能正無極之罪必無後害惟平王却被他䜛佞辨給巧言移奪了反以無極為忠無極以此一事試得平王之意自此全無忌憚其後遂至譖逐太子建殺伍奢及昭王立又譖殺左右賢人不已終至於神怒民怨此其所以幾危楚之社稷只縁當時被他移換了大抵姦臣欲肆其謀第一次必先以一事試其君君若不受其欺即正其罪彼亦有所懼憚便自俯首帖耳不敢繼来若被他試過能移奪了便無忌憚矣無極之請一則是欲害朝呉之寵一則欲試平王之昬與明使平王不改初心之怒必無他日之禍以此䜛口移人最難自覺佞人須是屏絶之不使一時在左右􅂊近他雖自能執持終必為他移奪而不自知此孔子所以有言曰逺佞人此古今之所深戒晉荀呉帥師伐鮮虞十五年晉荀呉帥師滅陸渾之戎十七年晉荀呉使師偽糴者負甲襲鼓滅之二十二年晉荀呉帥師伐鮮虞圍鼓始者鼓人或請以城叛荀呉不許曰或以吾城叛吾所甚惡也人以城来吾獨何好圍鼓三月或請降荀呉見其民曰猶有食色姑修而城當時軍吏以獲城而弗取勤民頓兵為諫穆子曰獲一邑而教民怠將焉用邑及鼓人告食竭力盡而後取之若獨以此論之雖三代之用師亦不過此然考其本末乃知伐鼓之役蓋是荀呉姑假此以立信義之名始者做得太過後来所以不能繼當其鼓人以城叛固未可受到得圍之三月之久至於他自請降則受之可也然必待他食竭力盡而後取之以此見得他分明是欲以此一事成信義之名惟其如此做得過當此其後之所以不繼也到得數年之後欲伐陸渾之戎亦是荀呉為主帥到得雒水先張虚聲要祭雒與三塗使陸渾弗為備乃用牲于雒為祭之状掩其不備襲而滅之同一荀呉何故數年前滅鼓守信義如此其賢而伐陸渾之時詐謀如此其甚只是一箇荀呉而信與詐前後相反如此蓋當時圍鼓鼓外援既絶已在荀呉掌握中雖少緩之數月彼自不能逃故於此時示信義以假其名也若陸渾則貳於晉又有强楚以為之助雖欲示信義以假其名亦不得所以不得不用詐謀以勝之也以此知荀呉於無利害處常是信義於有害處常用詐謀惟其信義不出於誠所以不能服人考後来之事則可見觀十數年後鼓人又叛晉附鮮虞當時取鼓三次方受其信義如此論来人當心恱誠服何故不十數年而叛以信義不出於誠蓋天下之不可掩者誠也方荀呉伐鼓時鼓人已在掌握中呉故於此無利害處示信義此心之發鼓人已窺見其機矣所以召其後之不服遂致再叛而歸于戎狄使呉當時果能三擒三縱皆出於誠則鼓人雖數十世亦不叛可也以此知矯情飾詐不如誠之可以服人明矣到得第二次伐鼓使偽糴者負甲襲而取之前此信義都不見了何故蓋前此許多信義到此亦自知使不得了故不免用詐以此知矯情飾詐之人旣如此不可久他後来亦不自信他當時閑暇示信義鼓人旣窺見之及後来使不得不自咎此心不純方且謂誠不足以動人信義不可以服衆居春秋之世不如詐謀竒計之可以立國遂一向立詐故伐鼓所以如此譬如世之人誠心素不足以服人假一日之誠信求以服人而人不我服遂斷然謂不如詐此天下必無之理且以唐德宗觀之平昔猜忌無所不至特閒有一兩件假誠信而行及奉天之禍方且自以為推誠之過德宗平生是猜疑忌刻之人猜疑忌刻已信於人偶然一兩事人不信他不能自咎終身之猜疑忌刻反責片時之誠乃為信義用不得一日之誠豈足以勝其千日之猜忌學者須思一杯之水不能救車薪之火之意反言我已為信義事人猶不信我今里巷人多言好事做不得正為此爾須能自此充養不可暫時善善而不孚於人縁此遂止為善之心此與荀呉所謂示信義之意同矣左氏傳說卷十二
