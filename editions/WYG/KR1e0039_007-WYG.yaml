body:
  text: 左氏傳説卷七宋吕祖謙撰成公聖人内外無患十六年鄢陵之戰以兵家曲直論之楚新與晉盟而背之用師是晉直楚曲勝敗之勢顯然可見晉元帥僨然興師都欲討楚獨范文子不欲戰曰若逞吾願諸侯皆叛晉可以逞及臨陣又曰惟聖人能内外無患自非聖人内寧必有外憂欒書之徒徒能外面看晉楚之曲直不能於内看君之昬明説背盟棄好討之必勝不知厲公驕縱遂至於滅亡大抵天下之事有當作而不作惟知義之君子隨時輕重權衡隆殺觀一時之勝敗如射共王中目見得楚之大敗晉師三日館穀見得晉之大勝然楚大敗之後君臣戒懼兢兢守國終始保全厲公一勝之後殺郤錡郤犫郤至又欲殺欒書中行偃君臣相賊然文子雖見之明憂之深立於戎馬之前而言之其拳拳之忠懇懇之意可謂深切而終不能救厲公之驕至使祝宗祈死但以不見禍為幸文子之志固亦可哀然亦有可責處文子雖有區區之意養之未充信未孚於人威望不足以壓羣臣是以終無所濟區區於衆邪之閒事窮計極拱手無䇿徒欲避禍而死使其加之講學終無僨爭之禍必將見幾而作或出或處亦不至於徒欲速死後之有志之士規模狹小者可以此為戒晉悼公即位于朝始命百官十八年厲公既弑悼公初立若論事勢晉自襄公以來權柄浸移臣下至靈公之弑臣下之權漸重到得厲公既弑之後最是難為時節然悼公即位之後自朝廷至於田野曠然大變使復見文公之威儀綱紀此見得悼公得要領處悼公自大夫逆于清原之日先與之定要約凡晉之驕臣皆聳然股栗此亦是正其紀綱此一段正與惠公相反惠公未入之初許賂中大夫惟恐不得入今悼公先與羣臣要約而後肯入大抵天下之事須是初時做得是若太阿倒持已授他柄那時如何正得是時悼公即位之始先逐不臣者七人以明君臣之義使威令赫然始命百官施舍己責逮鰥寡振廢滯匡乏困救災患禁滛慝薄賦歛宥罪戾節器用時用民大布曠蕩之澤使霸業復興是知霸業之所以興者一則明要約如悼公初入之言曰二三子用我今日否亦今日如此等言是也二則立威令如逐不臣者七人是也三則布恩惠如施舍己責是也四則定規模如命荀家等使訓卿之子弟恭儉孝悌是也五則舉賢才如六官之長舉不失職以下是也晉悼公之所以霸其規模根本皆在於此襄公孟獻子請城虎牢以逼鄭知武子曰善二年晉悼公戚之㑹以鄭從楚故謀討鄭孟獻子請城虎牢以逼鄭知武子善其言遂城虎牢鄭乃服此一段事雖小見得悼公所以霸處蓋孟獻子魯國之臣也當戚之㑹獻城虎牢之謀知武子遂從其言此見悼公之君臣惟善是用初無親疏内外之閒孟獻子雖魯之臣言一可用則欣然從之亦見悼公規模稍闊處晉之君臣能用善所以致得孟獻子敢言雖然是如此又須觀孟獻子納忠之由亦縁悼公初即位大率規模足以服諸侯之心且魯君初朝晉歸語杞桓公以晉侯之德是時魯之君臣已心服於晉孟獻子雖不立晉之朝於戚之㑹便獻城虎牢之謀武子欣然從之又須看獻子所以不外於晉晉亦不外於獻子這兩句須兼看晉之君臣視諸侯爲一體此晉之所以霸晉侯以魏絳為能以刑佐民反役與之禮食使佐新軍三年晉悼公怒魏絳戮楊干之僕晉侯私愛其弟初欲殺絳及觀授僕人書公遽翻然改悔至不及履跣出以止其死又與之禮食不特食之又使佐新軍又使之聽國事從和戎之謀初疾之如仇讎後乃委之如腹心此最見悼公天資易曉無固必處晉之所以霸雖一時私愛私忿未能克除恨殺魏絳之不速及其悔過不特是克除私愛又且因以知其人之賢委之以腹心看得這一段晉悼公之資質大段髙以春秋時論之自悼公資質已難得在後世獨有漢髙帝二君皆無意無必當其觸物髮上衝冠不可止遏及其事過毫髮不留此二人有過人資質然髙帝總理事物尚有疏畧若悼公規模纎悉備具樞機周密則天資又在髙帝上惜乎當時人臣如韓獻子知武子等不過輔之以才能事功無有知道之士引而達之此悼公之所以止於悼公定姒薨不殯于廟無櫬不虞匠慶謂季文子子為正卿而小君之喪不成四年定姒魯襄公之母季文子魯之正卿定姒薨季文子降殺夫人之禮以從菲薄國君之母薨而無櫬當是時季文子秉一國之政不能成君母之喪他主意要菲薄誰能諫止得他若要諫止須是勢均力敵之人如孟孫尚敢廢嫡立庶這一等人又不然其次如臧孫猶似可諫而數子又無一言以及之匠慶不過工人之賤乃能以此責季氏又擅伐蒲圃之檟以成其禮初季孫為己樹六檟於蒲圃他日準備要自己用匠慶請木季氏説道與劫略何異以上卿如此忿辭匠慶一面自斫更不恤他季文子亦不能止禦以此知至理所在雖至微賤之臣所守既正雖如正卿之貴有所不能屈此最學者不可不講究鄭子駟使賊夜弑僖公而以瘧疾赴于諸侯七年鄭僖公將㑹諸侯在道中子駟使賊夜弑僖公偽以瘧疾赴諸侯晉悼公當時方圖霸業何故受他偽赴都不考究明正其罪求子駟戕弑之實遂從而隱忍不問以此見霸者本原不是處大抵霸者本心只在於强國初無誠心為天下賞善罰惡其所以賞有功罰有罪不過假此以濟霸業耳至於事有不可掩者不得已而興師討罪若其可以苟免便因循鹵莽過了初不曽有為天下討亂臣賊子之誠心此晉國所以止於悼公一霸而已秦景公使士雃乞師于楚將以伐晉楚子許之子囊曰不可九年秦景公使士雅乞師于楚將以伐晉楚子許之子囊止之子囊初不曾立晉朝之上歴數晉國之德政自任賢使能至於工賈皂隷政事本末無不備知如親立於晉朝此一段當以邲之戰參看當時楚莊王方強如晉士會欒武子雖晉之臣而能歴數楚國之德刑政事卒乘軍旅之事士會欒武子不在楚之朝言楚之政如親歴楚之朝子囊不在晉朝言晉國之政亦如親立晉之朝蓋晉楚兩强國所以兩立百有餘年者蓋其國各有腹心之臣互觀兩國之政表裏洞見不敢輕略故如此凡一盛一衰一治一亂其腹心骨髓一一見得是以晉楚之霸業各至於百餘年至如陳隋之際一在江南一在江北但有一江之隔隋脩德政欲取陳而陳懵然不知此陳隋不能兩立而晉楚相距如此之逺所以相持百餘年者以其國各有人常察兩國之政以是見國之有人無人之閒也荀偃士匄請伐偪陽十年荀偃言雞鳴而駕塞井夷竈十四年晉悼公再脩文公之霸業復使晉之威令赫然布於諸侯自襄公厲公未有如悼公者所以後世論晉之霸必須稱悼公然其閒亦有得有失其小處固不足論今則論其大處所謂得之大者向者固已言之至其大失却未有説出晉自厲公以來政事弛墮權移臣下悼公初立方其朝於武宫逐不臣者七人固已能攬權柄使上下知所畏到此為之一新固是得之大若失之大者是何處晉自襄公以後權在臣下世世都如此自襄公時先軫不顧而唾已有臣强之漸後來靈公以下馴至厲公威令在臣下以悼公之霸一時收晉國之權及細考之政在臣下君弱臣强根本之患元不曾除去悼公事不一如十年荀罃為元帥荀偃士匄請伐偪陽罃不能違卒從之及十四年偃為元帥令軍中曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶狼僻從下軍而歸當時此事甚不一自此數事觀之以悼公之明其臣尚如此後六卿遂至分晉在悼公論固如是今則論時深為晉惜自晉傳之悼公出來禍亂萌芽當盡掃去悼公自以在自家粗可以辦事止論目前不能深憂逺慮此是悼公大失後不免至於六卿分晉正如唐宦官之盛敬宗文宗皆不能去此二君柔懦無志固不足論以武宗之英武宣宗之明察趣過目前將就容養以為不害國事反使之盤根錯節不能盡去但能使之稍戢不為大害而已此所以終不免朱全忠之患武宣唐之賢君二君自可除宦官之禍既不能去後來何縁去得晉自襄公厲公以來都不能去權臣至于悼公亦晉之賢君却都不理㑹後來如何去得以此見悼公規模狹小雖有違命之臣反將就容養悼公自以為辦事得一時之便不知亂根所在子孫之所深憂惜乎以悼公之明臣强可削而不能削偪陽之役其獻俘反謂夷俘偪陽乃宋之附庸國而謂之夷俘晉自獻公以來滅耿滅霍滅虞滅虢非不多也皆未嘗隱其名而謂之夷俘悼公君臣稍賢獨知中國自相屠戮之恥遮蓋其名謂之夷俘又不欲盡滅其嗣使内史選其族嗣納諸霍人其賢可見然就此責之既知其非自當不為乃隱其名上欺先君下欺國人此可見悼公大失所在所以不忍盡滅使周内史者可見制度尚在周官内史之職掌八柄曰爵曰賞以封諸侯晉要封偪陽必命周内史此周之官制尚在左氏與周禮源流體統相承接鄭子駟為田洫司氏堵氏侯氏子師氏皆喪田焉故五族以作亂十年鄭子駟為田洫而當時司氏堵氏侯氏子師氏何為許多人皆喪田焉以此觀之蓋周之井田廢壞至此已見其端四家侵占遂更溝洫為田子駟後來要整頓田洫便把四家田再開故四家作亂且田洫自古有之若仍舊制何縁喪田必其閒嘗有侵削皆非舊制有如子産欲復鄭田制民謗以為取我田疇而伍之此又見井田漸壞人皆謂商君開阡陌大壞井田之制曾不知其來之漸已乆若使元不曾壞商君亦未能一旦盡掃去先王之制不獨田制如此而先王之樂亦莫不然且以樂論之孔子指不正之樂歸之鄭聲如當時衛有桑間濮上之音子夏魏文侯之對言之甚詳皆是不正之音何故獨歸之鄭聲者蓋鄭音首壞先王之樂其姦聲尤甚如十一年鄭自蕭魚之㑹以女樂二人賂晉後來十五年鄭師慧過宋朝曰若猶有人豈其以千乘之相易􅁋樂之矇以此見鄭所有之樂皆非先王所有之樂亦如井田壞之有漸同盟于亳范宣子言不慎必失諸侯十年會于戚范宣子假羽毛於齊十四年晉侯問衛故於中行獻子十四年晉悼公之霸至蕭魚之會霸業成就與齊桓公葵邱之會晉文公踐土之盟一同晉悼公自即位以來許多工夫積累到三駕而楚不敢與爭此是悼公一時之盛處然雖盛於蕭魚亦衰於蕭魚想蕭魚未㑹之前君臣兢兢上下一心唯恐不及同力以興霸業如十一年范宣子盟于亳曰不慎必失諸侯其警戒固如此及既會蕭魚之後君臣之閒志得意滿且以樂賞魏絳言八年之中九合諸侯如樂之和無所不諧其君之驕可見於此如戚之會范宣子假羽毛於齊齊人有之已僭了悼公不能正其罪今宣子假羽毛而私有之以一大夫而僭天子之禮則其臣之驕亦可知而悼公之衰墮亦可見就宣子身上看未盟之前如此謹嚴到後來如此僭一身之謹與僭不同如此更就悼公實事上看如衛孫林父逐君若是蕭魚以前晉必討之今十四年悼公問中行獻子獻子却説不如因而定之皆是君臣苟簡弛墮之語況林父自衛獻公即位時已善晉大夫了到得中行獻子受林父結托故不討其罪悼公自蕭魚已會之後霸業日衰不無自也晉悼賜魏絳樂曰子敎寡人和諸戎狄以正諸華十一年悼公所以成霸業規模皆可見得如政事用人此不必論其一更出迭入不戰屈楚其二使魏絳和戎欲無後顧之慮故得專意南方觀其賜魏絳有言曰子敎寡人和諸戎狄以正諸華抑微子寡人無以待戎不能濟河此和戎之䇿正如諸葛亮出來欲一統天下興漢社稷欲與魏爭衡五月渡瀘先去降孟獲前整頓南邊羌夷使無後顧之慮然後出師為進取之計看諸葛亮之規模正得晉悼公之遺意晉平公即位改服脩官會于湨梁十六年人君即位之初便可占知終身之昬明治亂之由晉平公繼悼公之後恃晉國之少安放於奢侈溺於宴安觀其即位之初使羊舌肸為傅張君臣為中軍司馬祁奚韓襄欒盈士鞅為公族大夫虞丘書為乘馬御改服脩官烝于曲沃警守而下㑹于湨梁平公固是無知其初即位能用許多人何故後來衰弱須看他承悼公之後典刑法度尚在略有可觀固是平公之力亦皆是悼公之餘平公即位之初規模便與悼公别了且悼公即位之初政事用人一國上下煥然一新其初如此後來蕭魚既會之後早是漸衰況平公即位之初規模已不如悼公賴悼公之舊政遺法尚在慿藉扶持平穩安帖至數十年而後平公又漸漸昬墮以此知霸業之衰亦可占知於即位之初其後之霸主强弱昬明治亂亦基於此宋皇國父為太宰為平公築臺妨於農收子罕請俟農功之畢十七年宋皇國父為大宰為平公築臺妨於農收子罕請俟農功之畢公弗許築者怨皇國父而譽子罕子罕聞之而扶其不勉者意葢不欲怨獨歸於皇國父德獨歸於己欲分受其謗春秋之時分謗之事甚多如鞌之役韓獻子欲斬人郤克馳救之至則已斬之矣遂令速以徇曰吾以分謗分謗之説若不去深考止去形迹上看固見彼此相體恤不使怨獨有所歸恩獨有所在與世閒爭功者相去十倍然以大公至正之道論之則天下之事有是有非有幸有不幸上則有君次則有同列看他舉事之失自當竭忠推誠以救濟它不幸誠意已盡有救不得處吾職已盡歸之無可奈何之地而非揚已取名則人亦自不歸恩於我萬一不幸而人因德於我我亦安然處之事久自定若自上面加添要與人分謗便非大公至正之道亦是以善為之而不知其惡分謗之弊流至於李斯之事始皇每事皆與分謗盡小忠而不知大義所以養成始皇二世飾非䕶短之惡終至於亡國雖然要之分謗之後不若無謗之可分天下之理自有大公至正之道吾舉事以公民又何怨亦何謗若是出於公民雖怨謗無恤可也何分之有子罕徇小忠而不知大義不能安平和緩而至於揚已取名非忠臣之體也楚子言師徒不出人其以不榖為自逸十八年鄭子孔將叛晉出楚師使告子庚子庚弗許楚子聞之使告子庚曰國人謂不榖主社稷而不出師死不從禮不榖即位於今五年師徒不出人其以不榖為自逸而忘先君之業看楚子數句見得楚自武王以來養成尚武風俗處惟其風俗尚武此楚所以常能抗衡上國雖其閒君有賢有不賢有能有不能政事或脩或不脩而尚武之風俗常自若且以周論之周之君自文武成康皆以敦本務農孝悌忠厚涵養天下是以能維持周室此周之所以王以周論楚王霸粹駁雖不同要之皆不可不養其根本各隨其所尚養成風俗則一也自古皆以養風俗為根本看子庚處此事又須見得他盡忠體國處當時楚子既堅意於起師庚若驟諫楚子必不能遏若使楚子自行未必不傾國而往再有鄢陵之敗若使諸大夫行又恐或不能看量事情輕犯大敵故不若自以身往上不至於沮君下不至於大敗楚國之師故雖無功而還亦足以見子庚盡忠體國處左氏傳説卷七
