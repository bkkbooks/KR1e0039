body:
  text: 左氏傳說卷十五宋吕祖謙撰昭公魯人侵邾邾人訴于晉晉人來討執行人叔孫婼二十三年魯人侵邾邾人訴于晉晉人來討執行人叔孫婼初時晉使婼與邾大夫坐論曲直婼則曰列國之卿當小國之君請以寡君之命介子服回當之既歷舉周制為辭乃不果坐其後韓宣子使邾人聚其衆欲以叔孫與之叔孫聞之則去衆與兵而朝宣子悟士彌牟之言弗與乃館諸箕及范獻子欲求貨於叔孫使以請冠為名叔孫與之兩冠而不與貨到得申豐以貨如晉而叔孫又禁之使他不得行貨惟其如此所以卒免於難而魯亦免大國之討及其歸所館者雖一日必葺其牆屋去之如始至觀叔孫處艱難險阻之際措置經畫纎悉曲折件件皆當故能不辱君命叔孫之能固可取也學者於叔孫之事但知叔孫處死生艱危之際如此以身衛社稷其所以能此者則有所自當䆒其源流蓋古之大臣有世職者必有家學當時魯三家叔出季處蓋魯之季世季氏掌國中之事叔孫氏則世掌四方之事凡魯之出使無非叔孫觀昭元年叔孫豹曰叔出季處有自來矣此便見叔孫氏世世專掌此職平日父詔其子兄詔其弟無不專講論此一事則當時纎悉曲折無不知之楚囊瓦為令尹城郢沈尹戌曰子常必亡郢二十三年楚囊瓦為令尹城郢沈尹戌言曰子常必亡郢謂苟不能衛城無益也囊瓦子囊之孫也當時子囊為令尹襄十五年卒遺言令必城郢君子謂子囊忠以城郢論之子囊既有遺言今囊瓦果城之可謂能承乃祖之志而終其業何故當時深識逺慮之士便指以為危亡之證蓋當時子囊建城郢之議時正是楚國之勢尊安間暇時能為預備之計此正是制治于未亂保邦于未危到得囊瓦為令尹時內有弱勢外逼強吳則其城郢蓋不能與人校要得畏避退守為自固之地自郢之外有不暇及故城郢雖同事勢大異天下之事固有事迹同而心甚異者不可不察也當尊安之時城郢乃所以見其有備當畏縮之時城郢豈非危亡之證正如仁宗朝西夏內陵范文正公建築都城之議當時斷國論者以不可示弱諍之亦沈尹戌城郢之意也晉士彌牟逆叔孫于箕二十四年晉士彌牟逆叔孫于箕將禮而歸之叔孫疑其來殺已乃使梁其脛待于門內曰余左顧而咳乃殺之右顧而笑乃止前日奮然而前雖死不屈到得此恐士彌牟來殺已反與家臣謀欲殺之前日直前不可少屈之氣至此盡消索不見了以此知血氣把持終是有衰時雖能勉強於前終不保其移易於後惟是集義而生至於浩然之氣則終不可得變昭子如宋逆女公若謂曹氏勿與魯將逐之九月戊戌伐季氏二十五年天下之事固有未為之前而成敗可以先卜者魯昭公欲去季氏當時季氏專秉魯權已百餘年魯之失政已四五世大抵欲去百餘年之強家巨室非其謀之審重周密終不能成事觀昭子為季平子逆女於宋季公若從是時昭公已有逐季氏之謀雖其謀未發然已可逆知其無成觀宋欲以女妻季平子平子使昭子逆女公若於聘女之際已知其必逐季氏使宋勿與女曰魯將逐之是昭公逐季氏之謀雖未發而季氏之徒已泄於外國凡出師鄰國與夫除權臣之謀不可三人共昭公欲逐震主之權臣與百餘年之強家巨族其謀未發先使異國聞之其不審不密可知夫謀既聞於外國平子豈不知其深謀固慮為備必久看公若此一段凡與昭公謀者其病有二其一曰踈其二曰易欲逐季氏謀未發而泄於外國其踈可知逆料平子無能為而其謀不密則其易可知有此二病安能成事觀昭公逐季氏本末考論其故不惟君之謀不密當時之臣亦皆輕淺而無謀大抵欲去百年之強室非其君剛明果斷沉幾先物終不能成大事觀昭公逐季氏本末其謀却不出於昭公都是羣臣湊合成此事蓋始者季氏與公若有怨又與郈氏有怨又與臧昭伯有怨季氏與下面臣有怨故皆欲逐季氏昭公始雖不信而終從之此是逐季氏發源處舉如此大事本不出於人君之心却出於下面嬖幸之人與左右二三大夫當時羣小挾私怨而醖釀其謀昭公既自無謀如此安能成事觀其當時聘女於宋鄰國已知了看他相與議論之際初昭公憚季氏之強不從僚柤之言懼而不出數月不見大凡惟口起羞出好興戎惟甲胄起戎投機之㑹間不容髮當時欲逐季氏言一出於口却停待數月則其謀如何不深其備如何不素季氏之為謀既深為備既素何故公遂入季氏之門季氏猶未覺此見季氏機謀之深欲歸咎於昭公先引昭公入來見得有殺他之迹他却陽為不敢拒君之狀所以為後日文過之地做一重籬障觀公之能入其門而不能登其臺足見季氏之為備雖不見於外而備於內者有素矣後來叔孫果來救他當時從昭公與謀之臣皆輕淺寡謀獨子家羈深謀逺慮有臣如子家羈者乃不能用此昭公之所以亡國季氏之勢所以不失學者須看子家羈忠愛懇切似非春秋時人初公如晉女叔齊言有子家羈不能用其言遂至聞於諸侯子家不以昭公之不用而拳拳之忠常不已使昭公早從他言不至逐於季氏子家初言讒臣以君僥幸不可為蓋當時與公共謀之臣何嘗以祿去公室政在大夫為念但以私怨相報耳昭公既無定志下面又無誠心如何做得事成公是時不獨不從子家之諫而反退之其拒之深矣自常人處之使子家忠誠不篤則以為我已曽諫君君不聽我去之可也然子家方且曰臣與聞命言若泄臣不獲死到後來猶入身荆棘之中周旋其間昭公雖不從亦要分數救他此尤見其應變精密尚冀公之聽其言而消其禍患也此事第一著不能聽子家之言及季氏登臺請命傲然以為得志而弗許請囚不許請亡不許請待罪不許昭公與羣臣之心自以為唾手可取季氏子家羈又言於公曰君其許之政自之出久矣公又不聽此又見公與羣臣皆輕淺寡謀不知季氏登臺之請豈其誠心猶設檻穽以待公使過在公而不在已當時之臣不知季氏自有深謀獨子家識其姦使公當時能從子家之言則君臣之間其患猶未深此第二著不能聽子家之言及叔孫氏之臣司馬鬷戾救季氏伐公徒果敗子家又曰諸臣僞劫君者而負罪以出君止意如之事君也不敢不改公又不聽蓋子家慮事精當能料季氏終不敢成篡弒之事公上二著既已不能聽其言於此苟能聽其言季氏雖專權不到輕去其國次于陽州取笑於諸侯此是第三著不能聽子家之言三諫不從猶未已及公孫于齊齊侯請致千社公一聞之而喜便有安齊之意其輕淺可知子家又言天祿不再不如早之晉昭公全不能處事晉雖衰微猶為盟主尚可號令諸侯而納公公不知齊侯無信而安於齊終不能求援於晉而晉亦得以為辭此是第四著不從子家之言夫以子家之於昭公言屢不聽而拳拳之忠愈不自己事無不諫慮無不盡學者須子細看他本末便見子家之用心處宋樂大心言我不輸粟我於周為客若之何使客二十五年宋樂大心曰我不輸粟我於周為客若之何使客晉士伯曰自踐土以來宋何役之不㑹而何盟之不同曰同恤王室子焉得辟之子奉君命以㑹大事而宋背盟無乃不可乎右師不敢對受牒而退此一段當時晉頃公㑹諸侯輸粟於周宋樂大心獨拒晉曰我不輸粟我於周為客如之何使客晉士伯責之曰自踐土以來宋何役之不㑹而何盟之不同曰同恤王室子焉得辟之子奉君命以㑹大事而宋背盟無乃不可乎引他許多從來舊例以責樂大心大心不敢對受牒而退以此晉士伯能舉許多舊例故典以折宋人可謂有專對之才大綱看左傳是如此然此一事為晉人惜惜乎晉人用得小了何故用得小了他引舊事以責樂大心止能服大心而已所用小晉人如能因此自反其益非細說自踐土以來宋何役之不㑹而何盟之不同今於此不出粟必是我德澤不及先公信義不如先公羣臣輯睦不如先公士卒訓整不如先公宋所以敢如此前此恭命今為跋扈晉人反思自踐土以來宋何役之不㑹而何盟之不同今忽然如此我豈可不自反使其能如此則文公之霸業可復惜乎士伯引將來責大心使得小了此晉所以終於不霸也晉趙鞅荀寅帥師城汝濵遂賦晉一鼓鐵以鑄刑鼎二十九年晉趙鞅荀寅帥師城汝濵遂賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書左氏載仲尼之言夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也以左氏所載仲尼之言考之當是時春秋之末所謂周室法度尚在何故看晉文公之時唐叔所受法度本末都在有志王者之事用此法度尚可去維持與孟子時不同到孟子時班爵祿之制諸侯惡其害已而皆去其籍時雖不同而萌芽端兆皆起於春秋時使諸侯常守周室之法度必可長久緣春秋諸侯國自為政不用先王之法如魯之作丘甲用田賦如鄭之鑄刑書作邱賦如晉之鑄刑鼎舉三事論之當時諸國已自不用先王之法所謂先王之法不過藏之書府而已所以其漸到戰國之時敢去其籍大抵先王法度本末具在不可得而變然而立法之時所謂諸侯各守爾典以承天休當時文武成康分付諸侯雖數百年尚未嘗變無緣一次剪滅得非特先王之意在而唐叔之法度亦在看仲尼言文公作執秩之官為被廬之法文公雖求近功要速效亦未能全變到這裏方始敢變當其鄭鑄刑書之時晉叔向詒書以責之叔向晉國之望想叔向既以為不然必舉晉國之人亦以為不然到十數年之後晉鑄刑鼎蹈鄭之覆轍正緣老成先進都盡所以做亂法度事使叔向在見他國鑄刑書尚且詒書以責之則晉有所畏心不敢鑄刑鼎以此知為國家者須有老成先進必不到做壞法度事晉所以衰由老成先進皆亡使叔向在何緣至此左氏傳說卷十五
