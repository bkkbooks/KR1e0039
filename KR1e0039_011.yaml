body:
  text: 左氏傳說卷十一宋吕祖謙撰昭公晉侯飲酒樂膳宰屠蒯請佐公使尊而遂酌以飲工九年晉平公飲酒樂膳宰屠蒯請佐公使尊而遂酌以飲工公愧悔之心隱然而生本欲廢知氏縁此遂止看此一事猶見得三代工執藝事以諫氣象大抵三代以前諫官無定職各隨事以諫膳宰乃飲食之官其職甚賤到得晉平公時尚能一舉爵轉移平公之心蓋風聲氣習相傳未泯後世工執藝事以諫之風稍衰諫有定官言路始狹不似三代之時人人皆可以諫也當晉平公之時晉雖號為衰世其朝非無君子所謂叔向司馬叔侯如膳宰屠蒯皆有深慮逺識以是只衰世未嘗無賢人然而晉卒以衰者雖有賢人只縁安頓不定晉之時居六卿之位者皆委靡自私之人雖叔向女齊之徒不過沉下僚雖有區區之心無所自盡閒或因職事規正得一二事大體不正故終難着手以此知亂世未嘗無君子只是安頓不定然君子在下僚雖不能回國家之大勢然隨小隨大亦可以裨助國家古之賢者所以自隱於抱關擊柝之間豈獨全身逺害而已彼亦知其欲因事規正人君過失也如屠蒯之舉爵則諫可見矣周甘人與晉閻嘉爭閻田晉梁丙張趯率隂戎伐潁九年自春秋以来論霸業到得晉平公之世最衰以其侈泰懦弱失諸侯文公霸業自襄公以来最衰莫如平公最可罪亦莫如平公自五霸初起齊桓本是尊王其後晉文公河陽之狩雖有以臣召君之罪然尚有依傍王室之名自襄公以来雖不及文公之盛尊王室之意漸衰然未有如平公憑陵王室觀周甘人與晉閻嘉争閻田晉梁丙張趯率隂戎伐潁前此只是不能尊王室尚自未敢伐雖如鄭伯射王中肩却是王先伐鄭鄭伯不得已而禦之使中國諸侯敢伐天子平公實啓其端故王使詹桓伯責晉以為我在伯父猶衣服之有冠冕木水之有本源民人之有謀主也伯父猶欲裂冠毁冕拔本塞源專棄謀主雖戎狄其何有余一人其辭甚峻周之東遷繄諸侯是頼言語不曽如此峻故其告命之辭無非撫摩奬勸而已到此言語却如此非周之强能然亦是晉無禮之甚深犯周王之怒當時頼有叔向調䕶謂宣子曰文之霸也豈能改物翼戴天子而加之以共自文以来世有衰德而暴滅宗周之事非一蓋當時五霸之衰君臣之分不明不知尊卑只問強弱不知邪正只計利害猶頼當時有叔向尚知尊周之義調䕶韓宣子使不為己甚固則可嘉然叔向之言復謂且王辭直子其圖之其言似是移於習俗而不自知蓋天子諸侯本非校曲直之地到此亦不知有天子之尊如平公宣子不知尊周固不足道賢如叔向亦以為等盡而校曲直以是知習俗之移人雖賢者不能免諸大夫如晉葬平公也鄭子皮將以幣行晉平公之喪諸侯遣諸大夫送葬鄭子皮欲以見新君之禮行子産止之以鄭之小所費不貲必將盡用則鄭必困子皮固請以行及既葬諸侯大夫皆欲見新君惟叔孫昭子以為非禮叔向果辭之諸大夫皆無辭以退子皮遂盡用其幣而還一如子産所料子皮歸乃自歎曰非知之實難將在行之夫子知之矣我則不足又言我實縱欲而不自克觀子皮數語能深自克責如此因觀此一段見得天下事聽言甚難以子皮傾心聽子産言無不行初間授之以政既以國事歸之後来諫尹何為邑又曰雖吾家聽子而行國事家事既一委心聽之到用幣一事却信子産不過到得果然有害而無益方悔其初之不聼子皮自言我實縱欲而不能自克是的當言語凡人舉事或得人勸之豈謾然不知正縁私慾不能自克故爾觀子皮言雖此一時之語想後来自克之愈深以其言有力也蓋當初聽子産之言豈不欲從又恐僥倖可以見新君看得不真二者交戰於胷中故終歸一邉去惟兩者交戰不能自決此自克工夫所以不能用也故孔子曰吾未見能見其過而内自訟者也子皮可謂能自訟矣楚子伏甲而饗蔡侯於申醉而殺之十一年楚子奉孫呉以討於陳而遂縣之同上楚靈王以強暴兇虐之力吞滅諸侯固非一國至滅陳滅蔡是失人心最深處他當時要滅陳奉孫呉要整頓社稷及其聽命遂滅之本以定國誘之而終之以滅國此固是逆人心之大處到得滅蔡又以甘言重幣誘之到得蔡侯既至遂饗靈侯於申醉而執殺之又刑其士七十人乗其虚而滅其國此兩事最是逆人心之甚者唯其如此故後来靈王所以不得其終其初靈王威行於諸侯固自滅蔡始而靈王喪身亦起於滅二國正縁棄疾在陳與蔡合謀遂弑靈王於乾谿觀靈王之所以死不在其他而在陳蔡正縁滅陳蔡失人心太甚故禍端起於人怨之最深處以此見天理不可誣且如秦滅六國皆以兵伐而取之雖無道行之猶自干戈相持勝負已分唯楚最無罪獨以重幣誘懐王而殺之其後天下亡秦禍端亦起於楚之遺民蓋其滅楚亦是逆人心之大處當時言楚雖三户亡秦必楚以此見人心之怨之深者不可支也楚靈王秦始皇之亡其揆一也楚子為令尹殺大司馬薳掩使蔡洧守國奪成然邑十三年楚公子比自晉歸于楚弑其君䖍于乾谿十三年楚靈王之亡自為令尹之後以至於弑於乾谿之前無一日不得其志所以志得意滿終於喪其身譬如人平時或有疾病一警動之故其起居飲食調護未必不保其生若平時無疾恃此恣縱一旦有疾反至扵不可救藥靈王所以死正縁平日略無齟齬所以直至衆叛親離不可救處靈王之亡正縁楚最強盛之時晉室既弱諸侯皆在下風邊楚之國如陳如蔡皆已相繼吞滅當時天下大勢盡歸於楚唯其如志所以侈心無厭亦速其亡左氏敘楚靈王所以致叛亂之由如所謂殺大司馬薳掩而取其室使蔡洧守國奪成然邑使為郊尹等數事其所以致人怨非一端然君子㸔靈王所以亡固是如此然亦不専在此只縁許多仇怨之人皆置在腹心之地此所以亡然看靈王敢置此等人於腹心之地正縁他輕視一世以為天下之人皆無能為所以如此當其未亡之際見得甲兵之衆土地之廣四方諸侯莫不拱服自視不勝其強及至衆叛親離彷徨無措孑然一身周章山林之間到此許多意氣都不見了以此知靈王不曽見得真強弱前日所以横行四海臣服諸侯下視一世而不知其所謂強者當時盡是外面虚氣湊合得成一箇強亦非真強到此衆叛親離師潰之際都無預於一箇身已處外面虚氣都解散了只孑然一獨夫而已靈王非特外面之強是假虚氣雖一身之強亦是假虚氣觀其卜龜有小天下之言則以一身之外無加於我及乾谿之潰到此都無䇿如右尹請待于郊以聽國人王則曰衆怒不可犯欲乞師諸侯王則曰皆叛矣以此知前日外面湊合得成都不干楚靈王事正縁他只看得外面甲兵之强土地之廣養得許多虚氣此亦為無道人君之戒當時靈王之所以亡固是衆怨交作正縁公子棄疾觀從擣其虚而入其國蓋乾谿之師父母妻子皆在内惟其據根本之地士卒各顧其家蓋靈王所以亡也觀此亦是用兵之法且以孫權取關羽當時其勢甚不可禦却得吕蒙陸遜乗虚先入荆州是以關羽之師皆潰當時楚雖無道其權謀威力尚赫然若非先據根本之地如何便滅得他楚人所以滅得靈王蓋以先據根本之地故也左氏傳説卷十一
