body:
  text: 左氏傳說卷十八宋吕祖謙撰定公楚子常欲蔡唐二侯裘馬二年晉荀寅求貨於蔡侯四年晉人假羽毛於鄭同上祝他言於萇宏蔡將先衛同上楚令尹子常以貪賄敗國之政為一裘留蔡昭侯三年為一馬留唐成公三年以一裘一馬之故淹留二國之君囚之至於三嵗之久使他忿然有與楚必爭之意後來到吳入郢柏舉之敗楚國幾亡子常之罪雖三尺之童亦知後世觀史冊者莫不知其然然而病源不可不察大抵人心之所用有大有小若用大可以經緯天地可以開物成務可以財成天地之道若用小聲色玩好之間而已子常以一裘一馬所以前有危而不見後有患而不知心之用小如此學者看此須察他用心在甚處唯復在仁義禮樂上唯復在於狗馬玩好上若用心在於狗馬玩好上則子常此等事便漸漸做出來學者觀此不當徒罪子常須自察其用心之大小蔡侯既被子常留之三年而歸及漢執玉而沈曰余有所濟漢而南者有若大川誓必報楚遂如晉是時晉雖無盟主之實其承襲世業尚有盟主之虛名所以蔡侯赴訴于晉當時晉之不為盟主也久矣晉於此當因蔡之怒以奉王命㑹諸侯之師以討楚城濮之功可以再立文公之霸業可以再興晉既不能與蔡救患方且求貨於蔡侯自此晉失霸蔡被子常求貨無厭見晉尚稱霸王所以赴訴今晉之執政又求貨於蔡侯是脫子常於楚又見子常於晉他到這裏事窮計迫安得不歸命於吳吳人從之卒敗楚於柏舉所以吳之𫝑自此強中國之𫝑自此弱中國不如蠻夷何嘗是蠻夷之罪此一件可見大抵中國與蠻夷君子之與小人國家之有權臣常為消長蠻夷盛則中國衰權臣強則王室弱且如齊景公奢侈不能撫循其民故驅其民於陳氏且如漢孔光董賢之徒為政不能撫循其民而歸之於王氏蓋天下統一為之君者當撫循其民君不拯救撫循非所以為君及至天下分裂撫循其民者當在霸主霸主不能撫循其𫝑自然歸蠻夷此中國不如蠻夷皆中國之過非蠻夷之過當時晉既不伐楚㑹而歸自此失諸侯晉之失諸侯其大者如適來所論其小者方且假羽毛於鄭鄭人與之明日或斾以㑹然羽毛是王者之用鄭人僭用之故當明貴賤尊卑之等證其罪不以其僭而不討反借之是與他共為亂此見晉失諸侯處自城濮以來㑹盟先後固有定秩所以欲長蔡侯於衛者非是晉人不知故事不識先後之秩蓋以其不能舉兵為蔡討楚故欲以此留蔡侯也及至衛祝他陳成周之封制衛以德封蔡有罪封其委付不同踐土之盟衛成不在夷叔其弟也猶先蔡祝他陳許多故事萇宏說告劉子與范獻子謀之乃長衛侯於盟非是晉人於城濮之故事不知必待祝他說方知蔡以急難訴晉晉不能為他舉兵伐楚所以長蔡侯欲以虛禮留蔡侯其情却如此到得祝他言出先王之典踐土之故事晉人無辭以對所以不得已從其舊當蔡之初忿然有與楚不俱存之氣晉却不問他罪於楚區區以先後之小禮留蔡所以棄晉即知天下事當從其大者若小者不用却未見得害事釋其大者而用其小則事焉能濟今晉釋其大者而不用故其小節虛禮誠不足留蔡侯此霸權所以移於吳矣蔡侯吳子唐侯伐楚敗諸雍澨五戰及郢四年吳之伐楚所以入郢幾滅楚論其源流固有自來自子常為令尹貪冒信讒所以致亡之道固非在於交戰之日然當時所以致敗所以速亡蓋自有說當吳伐楚自豫章與楚夾漢左司馬戍謂子常曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥厄子濟漢而伐之我自後擊之必大敗之司馬說令尹與之上下款吳人兵不能與戰司馬欲自後毁舟表裏夾攻之當時司馬之謀要得子常禦吳人於前司馬以竒兵繞出吳之後使子常聽之則伍貟孫武亦無應楚之䇿勝敗未可知然子常所以敗正緣史皇謂子常楚人惡子而好司馬若司馬毁吳舟于淮塞城口而入是獨克吳也子必速戰不然不免乃濟漢而陳然所以喪師幾至亡國全在此子常平日失人心國勢以危使其聽司馬之謀勝敗尚未可知亦未至於亡國惟其私心疾忌謂楚惡已而好司馬怕司馬有功不使之先戰所以敗子常於國家危如纍卵之時尚且忌賢疾能恐他人有功不恤國家之安危此其所以亡大抵看古今亂亡之由無不由立朝之臣以私忌克所以亡看史皇為子常子必速戰不然不免諷喻他這幾句楚安得不亡以此一段看秦漢之後五代以前所以亡國同出一轍往往皆自此忌心當時子常背司馬之約先戰屢戰屢敗至於柏舉之戰楚師大敗子常奔鄭吳自此入郢當時史皇獻謀不用以其乘廣死楚之幾亡生於楚人惡子而好司馬之一言雖區區能死不過匹夫匹婦自經於溝瀆之諒本不足論看史皇之言半正半邪初間與子常說楚人惡子而好司馬數句便是李林甫盧杞一等人便是李林甫盧杞口裏說話子常欲奔史皇曰安求其事難而逃之將何所入子必死之到得子常不用他言出奔鄭他便自死於軍後面一假便是張巡顔杲卿一等人便是張巡顔杲卿口裏說話何故史皇之為人半正半邪後面終至於自死者於是知大段姦僞底人尚自知恥畏義這箇人平日不會克私意於愛憎勝負之間消磨未盡前面教子常奪司馬之功致於亡楚看他後面死於軍本是一箇知恥畏義底人緣他愛憎勝負之間不曽克私意論其罪考其實與李林甫盧杞罪一等可為學者深戒何況未有史皇之畏義於愛憎勝負安得不十分消磨學者須是切近看這般事方㑹長進吳入郢以班處宫子山處令尹之宫四年伍貟與申包胥友謂曰我必復楚國包胥曰子能復之我必能興之同上申包胥以秦師救楚大敗夫槩王于沂同上吳闔廬與子胥謀楚與士卒同甘苦服勤盡瘁所以能成功及既入郢之後志滿意得至於班處宫之際爭處令尹之宫其無統紀如此未幾復敗而楚再興大抵天下事居功持勝最難如唐莊宗夾河之戰擒王彥章之徒以服後梁其用兵二十年方能成功一旦入汴之後便放縱田獵所以致亡如杜元凱贊晉武吞吳之後不能保世之不亂以此知後面一假最難然而當時吳之謀臣如子胥但做伐楚工夫不曽度闔廬之為人可以承當得這段事子胥之大缺處在此當時入郢之後若能誅其君弔其民若時雨降楚何緣得再興其實子胥專理㑹得前一假不曽去闔廬身上做工夫後來吳王夫差與子胥論曰其興也以此得之其亡也以此失之亦是他自悔之辭當時既入郢楚子自奔於鄖吳既據楚之都當時楚已自亡了申包胥以匹夫再復楚之社稷且以吳兵之衆申包胥以眇然之力存楚於既亡之中何故此最要看伍貟之與申包胥本是一等人志同道合皆豪傑之士不是碌碌底人伍貟以父為楚所殺其亡也謂申包胥曰我必復楚國申包胥曰我子勉之子能復之我必能興之當時二人相别已自說定於十餘年之前如臯陶邁種德須種得深方始有力伍貟便有滅楚之念申包胥便有興楚之念伍貟做滅楚工夫申包胥做興楚工夫所以伍貟養復楚之念十數年其發時便能鞭平王之墓夫滅楚之社稷此不是一日做成自一念之力養得十數年到這裏有力申包胥養興楚之念亦得十數年其發時以匹夫之微乞師於秦再興楚之社稷此亦不是一日做成自一念之力養得十數年到這裏有力以此知古人在草野之間所以相期如此做工夫又如此然其為志雖非居仁由義之志在當時可謂有志者如五代時李穀與韓熙載友少時以功名相期熙載將事江南與穀别熙載曰江南如用我當長驅以定中原穀曰中原見用取江南探囊中物耳已而穀相周世宗遂臣江南果如探囊中物韓熙載在江南並無所聞徒有大言無實事然却不如此李穀遇周世宗之明所以展盡底藴便如子胥遇吳王闔廬所以報讎無不如意到韓熙載在江南所事者李景暗弱之君安能用他與申包胥自奮者不同所以無聞不是大言乃是李景不能用他何以見得韓熙載在江南終日嗜酒猖狂不事事自是荒縱底人亦不見他胸中有處置後見一兩處說景使熙載使於周是時太祖為殿前太尉已識太祖於潛龍之中他豈是尋常人舉這一件豈不做得李穀事正是李景不能用他所以自放於酒不事事不可以成敗論人如此之類左氏傳說卷十八
