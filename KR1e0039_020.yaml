body:
  text: 左氏傳說卷二十宋吕祖謙撰定公於越敗吳于檇李十四年吳與越戰越子勾踐禦之陳于檇李勾踐患吳之整也使死士再禽焉不動使罪人三行屬劒於頸而辭曰二君有治臣奸旗鼓不敏於君之行前不敢逃刑敢歸死遂自剄也師屬之目越子因而伐之大敗之靈姑浮以戈擊闔廬闔廬傷將指取其一履還卒於陘到此吳方為越所敗闔廬傷而死吳之陳所以如此整乃當時申公巫臣孫武之餘教何故他當時適吳舍偏兩之卒於吳教他伍乘之法後來又從孫武教宮人戰陳斬其犯命者則陳法吳人講之精雖闔廬末年尚承餘教遺習以越之剽悍輕易猶畏而不敢前以此知用兵不可無法制何故越出其計變吳人耳目終為所敗蓋兵有正有竒正則可效奇則不可效所謂行列卒伍分布之法固可傳得千變萬化移換耳目則不可教若使巫臣孫武之法便不到陳亂地位既無巫臣孫武之臣徒守巫臣孫武之法便到敗處以此知天下之事有傳者有不可傳者闔廬既敗死其子夫差使人立於庭苟出入必謂已曰夫差而忘越王之殺而父乎其復讎之志甚堅惟其立志之堅所以幾滅越國後來何故為勾踐甘言重幣所誘聽太宰嚭讒臣之說志滿意得終為越滅若以常理論之坐薪嘗膽之時為之則易志滿意得之時持之甚難然觀夫差本源發處其志已不全了所以常使人立於庭出入必謂已是常要人喚省他使其志堅如火之必熱如水之必濕如江河之不可轉移則復讎之念豈有間斷今必待人提起他意思則知他當時工夫已自有間斷隔絶處了所以終至於志滿意得為越所滅學者觀此事最當警戒今學者能親直諒之友朝夕警省亦是大段有志之人然而須以夫差事自警戒見得人終靠不得志滿意得地位便自見學者做工夫須到不待人地位方堅固哀公公孫彊言霸說於曹伯乃背晉奸宋七年宋公伐曹將還子肥殿曹人詬之公怒遂滅曹八年宋之入曹當時本出他無意因曹人詬辱子肥宋公怒遂反既還之師以滅曹觀滅曹甚易必是曹大假無政無備不然人如何無意偶然去滅他得考當時曹之見滅任公孫彊為政方欲圗霸背晉奸宋築伍邑于郊當時公孫彊與曹伯論霸大如晉尚且背之近如宋尚且奸之正是用武時節不為無備何故忽然滅得大抵天下事若是根本已虛則禍釁之發不必作意為之雖偶然小小變故皆足以為禍當時曹伯與公孫彊為政以小國單弱之衆外則用兵於諸侯內則興土功民心已離了正如元氣虛底人不須十分病可以致死雖一飲一食一起一居間稍將攝不到便足以致死國家到得根本民心已離雖甲兵之利城池之固皆不足恃以此知古先聖王所以培養根本者以此齊師伐魯冉求為季氏謀一子守二子從季孫曰不能十一年魯哀公時不特魯國𫝑衰到此三家之𫝑亦衰孔子所謂祿之去公室三桓之子孫微矣正是三家衰時節始者三家之彊同心併力以弱公室相救如左右手到得中間雖有間隙然急難之際尚為一體如昭公伐季氏時叔孫氏實救之陽虎欲殺季桓子孟孫氏實救之到得哀公之世三家各自為政都不相應及齊師伐魯當時冉求為季氏謀言以一子守二子從季氏則以其力之不足以使叔孟二子冉求又欲使之居封疆之間季孫又以冉求之言告二子二子不可到此雖當患難之際皆不同休戚了所以齊師得至其城下冉求又畫背城而戰之䇿論來此是下䇿了到此孟孫叔孫尚不肯向前同出力直待冉求激武叔了方退而搜乘豈惟魯之𫝑衰三家之𫝑到此亦衰蓋齊師至其城下論來正同舟遇風胡越相救之時他尚未肯向前看此一假魯之國𫝑如此衰固是可慮三家之𫝑如此衰却自可喜故此却是轉移時節魯自此若無所作為因循拱手待之則魯之國𫝑固與三家之𫝑俱至於削亡若能用君子因三家之離心以收公室之權則亦尚可整頓在何故却此正是轉換時節哀公處此時卒至於亡蓋以有君子而不能用也三家如此離心論來齊師至城自合便趨於亡然猶能粗支持者則又出於孔子之徒初間是冉求迂回委曲畫數䇿得三家出師後來又得冉有用矛以入齊師及樊遲為右所以能退齊師而魯之社稷未即泯滅者皆孔子之徒之力也當時孔子既不用於魯孔子之徒亦不為魯用尚餘二三人仕於魯可以退彊敵存危邦以此知君子初不負人之用伍子胥使於齊屬其子於鮑氏為王孫氏十一年伍子胥以忠諫為夫差所殺夫差失道固不足論若論子胥之死亦自有可愧處子胥奔吳輔佐闔廬吳自此大論子胥之於吳為宗臣當與吳俱存亡到得夫差無道子胥極力忠諫奮不顧身以此而死固無愧然當時子胥死却不然當時子胥出使見夫差無道屬其子於鮑氏以為後計此心全不是公以私心間雜於其閒既是為吳宗臣吳存則俱存吳死則俱死却愛其子要使宗祀有主其意以謂已事吳固當以諫死而子嗣先世不可便絶所以屬之鮑氏而之他國使宗祀不殞他當時未必自把做私心看自以為兩下都安排得好不知才顧慮便是私心了然看子胥之所以死本不由於忠諫正緣他有二心以此而死豈不有愧然則為子胥計當如何使子胥當時事吳初不為吳宗臣則三諫不聽去之可也今既受闔廬之托自當與國存亡更無顧慮若能以此處心雖進之比干之徒可也今以此而死與自靖人自獻于先王大段不同孔文子將攻大叔仲尼對以甲兵之事未之聞十一年左氏於定哀之閒載孔子事甚多其閒皆傳聞之失實此以知左氏本不曽登聖門使其得與聞孔子謦咳之末則必不如是之訛錯觀其載孔子對孔文子一假事正是左氏不曽登聖人之門分明證據蓋左氏載孔子答孔文子之辭與論語載衛靈公問陳孔子之對一般若是對兩人之問無緣句句相似蓋當時本是一事唯弟子得其真故言衛靈公左氏不曽登聖門故以孔文子載之舉此一事則其他皆可知越子伐吳為二隧十三年越之謀吳自哀公元年勾踐棲於㑹稽自此便做謀吳工夫其次第機謀甚密當時有大夫種范蠡深於知兵始者事吳皆如臣妾到得吳伐齊率其衆卑身以朝蓋欲以此驕吳之心使皆無後顧之患一意從事於中原到得十三年夫差空國盡出以爭諸侯為黃池之㑹正是可乘之機越王於此方出兵伐吳蓋吳腹心臣既死又空國出在外所以守國者皆庸人此越所以沼吳之師其戰亦有本末當時所謂信臣精卒悉皆在外所與抗越師者不過太子友王孫彌庸之徒皆孱弱不足勝之人然初間與越戰彌庸尚且獲疇無餘王子地獲謳陽如何能以孱弱之兵勝越養鋒蓄鋭之師蓋此正是兵法示之以不能先與他一敗所以驕吳人到得越全師至果然大敗吳師入吳他當時分兵為兩道所謂越子全師是一道疇無餘謳陽所將皆寡弱之師委之於敵此有兩意一是驕吳人之心一是吳人敗越孱弱之師其兵已困及全師至所以不能敵然越既入吳國何故不盡滅必先退而後復滅之蓋當時越入吳不過能勝孱弱不足勝之人精鋭之卒隨吳王在外者尚多若便滅吳吳王之歸雖無道若收合餘燼以戰却自未可必故越之退所以嘗試吳王若吳王經此大變側身修行吳如何便滅得惟其經大變而不以為事遂一舉而滅之此是大夫種范蠡之深謀陳恆執公于舒州十四年齊陳氏之亂始於景公而成於簡公自子雅子尾相繼而沒陳氏已竊其柄後來景公嫡庶不明陳氏又專立君之功封殖至簡公時陳氏之𫝑已成簡公却欲闞止為政所謂闞止初非深識逺慮之人不過當時從陽生有道路之勞因此得寵是左右近習之人而已看他所以謀陳氏甚踈淺而無術所謂陳豹乃陳氏宗人當時要謀百年深根固蒂之族深慮遠謀猶恐不濟今見他宗人略可喜便以本謀告之謂欲盡逐陳氏而立女其輕淺無謀可見此所以殺其身陳以此而興齊以此而亡然以事𫝑論陳氏當時尚有可圖之理闞止是左右近習之人驟使為政尚能分陳氏之權觀陳成子憚他可見此與魯昭公欲逐季氏不同當時盡收一國之權人誰間得他若陳氏則不然觀諸御鞅言於公則曰陳闞不可並君其擇焉闞止小人固不足道然擇用之權猶在齊侯當時若得深識遠慮之士豈無可圖之理唐文宗時宦官日盛當時用訓注宦官猶自稽首迎拜尚自畏宰相在然所以致甘露之禍正緣注淺無謀陳氏尚有可圖緣用闞止所以成陳氏之𫝑宦官尚可圖緣用訓注所以遂成宦官之勢圖之不可不審如此考當時禍端却起於陳豹陳豹當時欲使公孫言已要事闞止公孫所薦陳豹之辭乃云有陳豹者長而上僂望視事君子必得志欲為子臣吾憚其為人也故緩以告以此事論之公孫之薦所謂謀而不忠持兩端之說若以正理論他却是反覆傾險之人固不當薦雖知他不當薦又恐違他人情不得不薦他所以又曰吾憚其為人故緩告此二句使我知他難保持兩端使他自擇當時使全遮護他專說陳豹之美此猶可恕今既知其如此而持兩端之說他日陳豹敗時以為我曽說了罪不在我此其人深可誅宋向魋請享公以日中為期家備盡往公知之與皇野謀召左師同發兵魋奔衛十四年向魋自有寵其跋扈難制至於有殺君之謀要得享宋公而殺之宋公先知之與左師謀伐向魋向魋戰不勝遂入曹叛繼宋圍曹要執曹子弟以自固魋不可民叛之此事始末大槩如此然此事尚多可論者向魋自宋公封殖長養非一日前此奪馬請行哭之日腫其崇奬他可見大凡人君之養臣須養之以道若縱以奢侈崇奬他到奢侈之極他自然是不奪不厭其勢不至於殺君不已他當時要設享召公以日中為期宋公偶先知之與皇野謀召左師同發兵看此尚有周制在其大者且論發兵當時與司馬謀既定司馬却請瑞蓋當時兵雖掌於司馬必請瑞而後敢發以此知周之制度兵雖散在鄉遂與卿大夫之家固各有主掌非得君之苻節則不敢發此其大者若論其小者當時司馬詐君命召左師來却言迹人來告今官載周禮掌山澤之事以此知周之官制尚見於周之末當時要攻向氏其父兄故臣皆曰不可其新臣却聽命是何故蓋父兄故臣家世仕於桓氏漸染其惡但知有臣而不知有君故不肯攻新臣是新仕於他尚漸染未慣略知君臣之義所以君子居必擇鄉游必就士正怕漸染深了向魋既入曹他所以質民乃却言既不能事君又得罪於民遂舍之何故一二日之間其心便不同前日犯弒君之大惡而不顧今則却為恐斂怨於民寧是出奔此見得姦雄之人最能擇利害處前次在國秉大政事成則享大利所以寧負惡名而不恤今則退保一邑已不能與一國抗恐徒然斂怨於民所以先做活路出去此非他能遷善改過却是他最能擇利害處左氏載司馬牛一段事甚詳觀他當時顚沛造次皆不失義自向魋未出亡時故嘗曰人皆有兄弟我獨亡他已知有他日之禍其既亡宋公初未嘗逐司馬牛他已先出奔蓋謂兄弟既有謀逆之惡則已亦不當處此國遂適齊而向魋亦奔齊為卿司馬牛致其邑示不與他同政大凡人激昻為義第一次尚易若至于再至于三屢經顛挫而不悔非學力不能司馬牛亦是在孔門曽經做工夫了所以能如此楚子西召子木之子勝為白公葉公言無乃害乎弗從秋果殺子西十六年楚子西召白公所以致亂之由亦當深考當時既不聽葉公之諫召白公使處邊境子西既不信葉公能委任白公亦得蓋知他是素剛底人凡事能殺其怒使不至於甚亦無緣作亂他使者請伐鄭欲報父讎子西許之不起師及晉人伐鄭子西反救鄭凡事都激他怒所以速成他殺子西之謀他當時厲劔欲殺子西他直言告子期之子平子西聞得恬不為怪反以為白公必不至此正緣輕忽他過了所以致亂大凡人心所信固有邪正不同若不信正人則信邪人必篤何故他心在這一邊今子西既不聽信葉公之言何故於白公又不篤蓋天下事不可以等間看了當時子西存楚於既亡之餘負如此大功遂於天下之事皆以等間處之所以葉公白公兩無所信殊不知他日之禍又發於前日之所謂等間視之者古今人於志得意滿之後皆不能保蓋為此當時白公與石乞謀不過欲得五百人尚不能辦子西以堂堂楚國之衆若欲敵他甚易正緣把做等間看了越滅吳二十二年越之伐吳始也因吳人為黃池之㑹乘其虛以入其國自太子以下皆見執其再也以三軍潛涉敗吳及其三也以二十年方圍吳夫越已三加師於吳方能圍吳之國論來夫差自黃池之㑹以前勞民力肆彊暴其國根本虛了到得歸自㑹則已為越所入覆其根本何故又須到三加兵方能圍吳到此已二十年了而師在吳城下又且兩年方能滅人之國何故只緣他基業厚了吳自巫臣教戰法自諸樊以至闔廬撫循其民從事於耕戰甚久雖夫差二十年戕賊其本根勾踐二十年養成兵力也須用二十年工夫觀越三師於吳在吳城下又兩年方能入其國以此知非二十年工夫也不能克以此見古人立國其根本之固皆如此若後世則不然秦并吞六國全有天下其基業非不壯然陳勝劉項一呼不一二年便滅秦隋并吞南北兼有天下却到李王劉唐一起三兩年便滅隋所以如此正緣無根本了大抵觀人之國惟於國勢危亡時方見得根本厚薄譬如兩人同受病固是必死之病然一人元氣盛其死必緩一人元氣弱其死必速晉荀瑤伐齊言何必卜二十三年晉荀瑤伐鄭齊陳成子救之二十七年晉荀瑤圍鄭門于桔柣之門同上知伯以貪與驕亡其族為韓魏趙所分然知伯所以亡非委靡之故乃是才能知勇過人伐齊之事是知伯始見於傳他出來做第一件事觀當時伐齊之由見齊師馬駭知齊人之謀長武子請卜却之卒敗齊師他初為政小試之勇便能摧堂堂之大國殊不知此一戰正是他覆亡根本之始他所謂恃其智勇固是本來如此然自輕而重自淺而深却自因有功了漸漸去看他前面却長武子請卜一假自是輕敵寡謀然猶自近傍正理言語有次序自此一戰既勝之後言語略無倫理至於後來二十七年伐鄭齊陳氏救鄭他所以告陳氏之辭都無道理了所以成子亦知其不能久陳為楚滅與鄭元無相干晉用兵本是報怨與救陳亦無相干他到此大言略無道理如此用之於彊國看他此後與向來請卜之辭大假不同他非病狂喪心下視一時人敢為無稽之言以陵跨驕鑠人蓋到此漸漸滿了及後來悼之四年晉又圍鄭知伯門于桔柣之門使趙襄子直入門去知伯與趙襄子本並列為卿今乃頤指氣使役以一卒之事此全不近道理了蓋驕縱漸長正緣知伯勇悍所至有功所以湊成他到得全不近道理地位看他事一假深一假觀趙襄子對知伯以為主在此知伯乃言惡而無勇何以為子此全是以醜言詆他趙襄子以為能忍恥庶無害趙詳觀左氏記此數句甚有意若略看時只說道襄子能忍恥左氏之意不專在此下又言知伯不悛一句可見蓋當時知氏趙氏並是彊家橫勢相與低昻趙襄子由是忌知伯若是有謀人到此須自修省知伯全不以為事所以至於亡左氏之意蓋如此公子荆之母嬖將以為夫人二十四年哀公欲立嬖妾使宗人釁夏獻其禮對曰無之公怒問何故無之乃以禮對此見得魯秉周禮他宗人尚能執禮如此固是秉周禮然以是見仲尼風化所及且以立夫人一事論之仲子是妾天王歸其賵則因以仲子為夫人矣成風是妾僖公以所生之故尊為夫人當時之宗人初不曽諫以此見仲尼風化所及若就宗人論之如前此夏父弗忌為宗伯躋臣於君所謂宗伯豈能守禮孔子自衛反魯刪詩書定禮樂其風化之餘者尚可見當整頓禮之初見於宗人能守當整頓樂之初見於大師摯之適齊惟夫聖人一振禮樂雖賤有司亦能守如此使自為政則三年有成信何難者中行文子告陳成子曰有自晉師告寅者將為輕車千乘以厭齊師之門二十七年范氏中行氏將伐公齊高彊言三折肱知為良醫定十三年中行文子既為晉所逐出奔於齊到得齊與晉師相持所謂中行文子告成子欲以輕車千乘以厭齊師之門陳成子以其與晉有謀他方悟而有始衷終之說學者最當深察此天下一事一物皆有始衷終若看得始不見得衷若見得終不見得始皆是見理不盡若中行子在晉豈能察始衷終之理蓋其在困亡患難之中困於心衡於慮而後作所以言吾乃今知所以亡觀吾今知之語則知文子自出奔之後方才講論到此以此知患難進人如此且如中行氏之亂齊髙彊在晉范氏中行氏將伐公高言三折肱知為良醫亦是經患難後方見得如此左氏傳說卷二十
