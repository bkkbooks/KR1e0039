body:
  text: 左氏傳說卷十四宋吕祖謙撰昭公費無極言於楚子若大城城父而置太子以通北方王收南方是得天下王說十九年費無極欲譖太子建先言諸王曰建可室矣王為之聘於秦王卒取之其後又言於楚子曰晉之霸也邇於諸夏而楚僻陋故弗能與爭若大城城父而置太子焉以通北方王收南方是得天下也王說從之故太子建居于城父大抵小人情狀機械雖逾百年若合符節而同出於一轍驪姬賂外嬖梁五與東關嬖五使二五耦譖太子申生與費無極同出於一謀驪姬欲譖太子其初說獻公亦曰曲沃君之宗也蒲與二屈君之疆也不可以無主宗邑無主則民不威疆埸無主則啓戎心使太子主曲沃重耳夷吾主蒲與屈足以威民懼戎且旌君伐使俱曰狄之廣莫於晉為都晉之啓土不亦冝乎其言威民懼戎廣土闢地之利誘獻公先是間踈其父子使出於外然後施其計費無極譖太子建亦言若大城城父而置太子焉是得天下亦是以廣土闢地之利誘楚平王亦是先要間踈他父子其說同其術又同蓋驪姬賂二嬖五先以開拓土地威民懼戎之說誘獻公故獻公使城曲沃而太子出居之費無極今亦以通北方收南方得天下之說誘平王故太子建出居城父以此知小人之術雖曠百數年其機械陷穽同出一轍若合符節然大抵父子之道天性也雖獻公平王之昏所謂天性亦未盡泯滅如何遽然便間得盡蓋人之心有內外天屬之愛內心也惟後來被小人以開拓土地之說引誘他內心向外去流而忘反他外心日熾內心日消使他裏面心都消盡故其父子自為虎狼更相戕賊然後讒間之計可行也學者看小人須看此處方知小人骨髓夫降衷秉彛何嘗不善其良心或至於戕賊到泯滅地位皆是被人物引其內心向外去了夫豈獨父子之間為然凡事皆然如孟子所謂學問之道無他求其放心而已矣此所謂內心學者不可不關防也楚人城州來沈尹戌曰楚人必敗昔吳滅州來子旗請伐之王曰吾未撫吾民今亦如之十九年平王初即位當時吳滅州來子旗請伐吳平王不許曰吾未撫吾民未可用兵到得即位五年之後却舉兵動衆遂城州來以挑吳而取之自形迹上論之平王初時即位尚新民情未安國勢未強其不許子旗之請未與吳校前之不伐是也其後五年城州來其意謂息民五年然後可以興兵動衆與吳爭州來而遂城之亦是也兩者皆是何沈尹戌乃知楚人必敗當時平王與左右自謂息民五年可以用兵學者觀此須知平王徒有息民之名而無息民之實平王所謂息民者止免用兵之役一件而已當時沈尹戌言今宫室無量民人日駭徒知息之於外而有以勞之於內勞役有甚於用兵便以為息民了却不算內作許多宫室土木之工反過於用兵此其所以終於吳入郢而至於敗亡只緣平王錯認了息民之名而不究息民之實古之所謂息民者如晉悼公之施舍已責器用不作衣服從給當時三駕而楚不能與之爭他當時既息民於外然器用不作衣服從給亦何嘗勞民於內方可謂之息民平王雖不勞民於外而實勞於內如何便認以為息民後世姦臣之事君或十年或二三十年以息民為言而緩於用兵者皆非其本心其實內之工役並興其作宫室臺榭修苑囿池沼其害反過於用兵如天寶之末是也此最不可不察費無極言建與伍奢將以方城之外叛王信之二十年費無極言於楚子曰建與伍奢將以方城之外叛自以為猶宋鄭也齊晉又交輔之將以害楚其事集矣王信之問伍奢伍奢對曰君一過多矣何信於讒王執伍奢使城父司馬奮揚殺太子未至而使遣之三月太子建奔宋王召奮揚奮揚使城父人執已以至王曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞不能苟二奉初以還不忍後命故遣之既而悔之亦無及已王曰而敢來何也對曰使而失命召而不來是再奸也逃無所入王曰歸從政如他日觀此一段見得當時楚平王信讒喜佞至於一箇世子之重為讒人所搖遂逐太子國本傾覆可謂昏暗之至然而使奮揚執太子建揚導之使亡空身歸報以常理論之平王方信讒怒太子奮揚縱太子使之亡以空身歸必蹈鼎鑊之禍却陳一箇正義曰君王命臣事建如事余臣不佞不能苟二奉初以還不忍後命故遣之既陳正義感悟王慨然使歸從政如他日不特不罪亦不奪其祿位以此一段事觀之似乎平王雖信讒聞正言法語其心便開明何緣始怒終息便不罪揚若精微論之不然不可謂平王開明蓋平王中無所主易為人所移易前此既被無極以讒佞之說所移易至於逐太子是中無所主後來怒奮揚亦被揚以正言法語感動便霽威息怒此二事雖不同極論精微皆中無所主易為人所移學者看此不可謂平王開明須看事雖善惡不同心無所主一也齊豹北宫喜禇師圃作亂公遂出二十年齊氏之宰渠子召北宫子北宫氏之宰不與聞謀殺渠子滅齊氏而公入同上天下有道則禮樂征伐自天子出及其衰也則自諸侯出又其衰也自大夫出又其衰也自陪臣出觀春秋時自可見得自平王失政諸侯交爭五霸迭興主盟諸夏此所謂自諸侯出也至於雞澤溴梁之㑹諸侯失政大夫主盟㑹之權而一時政令盡出於大夫諸侯皆不能制所謂自大夫出也至魯昭公之世大夫失政所謂自陪臣出觀衛靈公出奔一段則見得自陪臣出之兆當時齊豹率大夫北宫喜之徒作亂逐靈公于外當時逐君是大夫到得靈公所以得歸乃齊氏之家臣渠子召北宫子同謀北宫氏之宰不與其謀乃殺渠子滅齊氏而公入當時北宫子為家臣所制俯首聽命之不暇看此一段便見得政不在大夫全在陪臣齊氏之亂大夫不能平其亂其平亂一時者皆北宫宰之力論事勢大夫為亂家臣雖不與而大權已在陪臣了後之學者看論語見陽虎専政以謂陪臣專政自陽虎始殊不知陽虎是後來事陪臣專政之兆乃在數十年之前已有北宫宰矣蓋北宫宰之事隱陽虎之事顯所以學者多捨北宫宰而惟陽虎之是責都不曽仔細考究大抵學者考書當如此考齊景公曰唯據與我和夫晏子對據亦同也焉得為和二十年晏子立於齊景公之朝當時景公非不知尊信晏子言無不聽景公疾梁丘據裔款欲誅祝史以謝諸侯晏子諫以暴虐淫泆征斂無度宫室日更無道若此神怒民痛之所致罪不在祝史景公悟遂命有司薄斂已責非不尊信晏子之言如齊侯稱梁丘據與我和晏子又力辨和與同之異且斥據之諂諛是所謂同而非所謂和景公亦敬愛其言而受之不以為忤而據亦不能害晏子此可見尊信之實處又如孟子所載景公問晏子吾欲觀於轉附朝儛晏子引先王省耕省斂之制對之景公便出舍於郊興發補不足觀此三事則晏子之言景公無不聽從然以晏子輔景公而齊終不振以至於衰者何故蓋景公雖間有一二事上聽信晏子之言使民隂受其賜而却不知正其大綱不過一時間有一兩件事從他其大勢元不曽轉諂諛如梁丘據終其身而不能去強大如陳氏授之權而不能除以是知為國者既未能絶去小人之根本雖有一二事上從賢者之言無益也宋華亥自入于南里以叛二十一年宋華亥定自宋南里出奔楚二十二年宋元公不能撫公族大臣遂有華向之亂當時華向之族皆出奔獨華費遂在宋費遂有子三人華登已亡尚有華多僚華貙在而多僚與華貙相惡乃譖諸公貙將納亡人元公則曰司馬以吾故亡其良子死亡有命吾不可以再亡之元公此言已是而又為多僚出亡逃死之言轉移之公故召冝僚飲之酒使告司馬逐華貙貙之臣張丐聞遂貙與貙議使貙承冝僚以劍而訊之冝僚盡以告丐欲殺多僚貙則曰司馬老矣登之謂甚吾又重之不如亡也貙之此言亦是既而貙將見司馬而行則遇多僚御司馬而朝丐不勝其怒遂與貙殺多僚劫司馬以叛而召亡人以此段論之大抵人初心之發未嘗不是惟其臨事移奪多不能保此心故其初雖是往往終入於不善使元公能保其初心不奪於多僚逃死之言華貙能保其初心不移於張丐遇多僚之際則宋亦安有此禍哉大抵欲驗人之良心須於其初心之發觀之此時未為事物所移奪故初心之發即良心所在也華向之亂固元公不能撫存之罪然華氏之族兄弟亦自不相親睦多僚與貙兄弟也而更相戕害而又遇其君如此所以既出奔而復入為亂幾亡宋國是雖元公之罪而華氏之族亦不能無罪也及華氏與公分國而守翟僂新居于新里既戰脫甲於公而歸華妵居于公里亦如之夫僂新居華氏之地而反助公戰妵居公之地而反助華氏戰當時彼此皆無猜嫌便見得此時淳古之風俗尚在春秋已後全無此風俗古者兵交使在其間以宋區區小國尚有此風則伊尹五就湯五就桀信有此事及赭丘之戰干犫華豹張丐同為一車與公子城相遇城射豹殪又射丐殪是一車三人已死其二人矣而干犫方且請一矢以死城欲赦而用之犫則曰不死伍乘軍之大刑也干刑而從子君焉用之子速諸乃射之殪此一段見得軍法精密處推此亦可見三代伍乘之制矣五人為伍七十二人為乘伍死其伍乘死其乘則推而上之萬二千五百人之軍莫不皆相為死則臨敵之際烏得有魚潰鳥散之患蓋春秋以前之戰殺人之少只緣伍乘之法不廢是伍乘乃軍法之根本也至後世伍乘之法既廢臨戰之際人各有心故有一戰而殺人不可勝計者如白起長平之戰死者四十萬人使當時伍乘之法尚存雖遇起亦不至殺人如此之多也左氏傳說卷十四
