body:
  text: 左氏傳説卷一宋吕祖謙撰隱公祭仲諫鄭莊封叔假元年石碏諫衛莊寵州吁三年師服諫晉封桓叔桓二年左氏所載春秋以前事如第一第二卷尚有數假事可取如祭仲之諫鄭莊公石碏之諫衛莊公師服之諫晉君此三處皆是東遷之初是以言多典法如祭仲之諫鄭莊公封叔假於京所謂先王之制大都不過三國之一中五之一小九之一今京不度非制也見得成周築城之遺制尚在如石碏之諫衛莊公所謂臣聞愛子教之以義方弗納於邪驕奢淫佚所自邪也見得先王教子家傳之法尚在如師服之諫晉君曰吾聞國之立也本大而末小是以能固故天子建國諸侯立冢卿置側室大夫有二宗士有𨽻子弟庶人工商各有分親皆有等衰猶見得三代上下名分等差纎悉委曲如此之不可亂此是春秋初老師宿儒之所傳先王之典法在學者須當深考三代之氣象到後來春秋中與末能如此言者甚少如左史倚相之於楚叔向之於晉子産之於鄭才能言當時便謂之聖賢博物君子齊人卒平宋衛于鄭八年秋會于溫盟于瓦屋八年冬齊侯使來告成三國八年春秋之初齊僖公當時謂之小霸見於春秋經傳與諸侯會盟征伐稍多這便是霸之始方周未東遷之前未嘗無方伯連帥之職然當時尚稟王命所以不謂之霸到得平王東遷後王者自無總合係屬人心道理諸侯稍有才智自然出來會盟此霸之名所以立然僖公所以謂之小霸非惟其他政事權謀不可望後來桓文然當時時節亦未能做得所以凡書盟於宋衛告成三國不過三國之盟到得後來齊衛鄭宋盟惡曹亦不過四國之盟又如齊宋衛燕伐魯時亦不過四國蓋春秋之初王綱尚在未至於甚壞後來王室陵替凡會盟統天下之諸侯皆在焉以齊一國論之僖公霸業不如桓公以天下之勢論之桓公之時却不如僖公之時何故王道霸業相為消長到得桓公所以大國言齊宋逺國言江黃其餘莫不至霸業盛處便是王道消亡齊僖公所以小霸多是用私意所謂諸侯會于稷以成宋亂又與桓公會成魯之亂以至班爵不同帥諸侯來戰于郎凡此類是私意當時偶然得諸侯此時才智無加於僖公所以略霸羽父請諡與族八年春秋之初諡族尚少見於魯者如所謂挾如所謂翬如所謂宛如所謂無駭皆不命氏傳世官春秋初東遷命大夫官爵甚少以魯一國論之諡族甚少大夫官爵無非賜姓使當時春秋以前有世官所謂鄉舉里選賔興不可行秀民無處安排看得世官只是起於春秋以來滕薛來朝爭長十一年滕薛來朝爭長此一假須看得官制滕侯曰我周之卜正也以此見成周盛時諸侯非惟入為王卿士而卜正一官亦皆諸侯為之鄭莊因入許而曰寡人有弟弗能和協十一年鄭入許而不有許此一假看得王綱初解紐諸侯亦未敢放手滅人國如後之滅霍滅耿滅魏略無顧忌觀莊公封許之言委曲涵養有唐虞三代氣象然因入許而曰寡人有弟弗能和協使糊其口於四方此謂莊公悔過之言不可此謂莊公不情之言亦不可蓋莊公是一箇有才智占勝底人觀他初待叔假止欲假曲我直彼惟有歉於心故恐為人所議所以先自説破了依舊是前時養惡之氣習猶未之改至莊十六年鄭厲公之言曰不可使共叔無後於鄭則是共叔嘗有後於鄭矣此言非是虛言正是兄弟不可泯絶處後來果然封他子弟世世食祿而不絶夫共叔之於鄭初無功德及民而有叛逆之惡何為必欲不絶其後也於此須見得非是莊公之悔心正是莊公當初機謀培養陷叔假也深至此常常自歉故施恩意於後也亦深使當時只恁地逐假不用許多機關陷穽到此必不然也且如楚懷王之在國荒淫不度本無德以及人一旦秦人殺之而舉國無有不念之者至於八十餘年之後猶以是而亡秦只緣秦人毒之太深故國人思之愈切莊公惟其當初下手得毒故後來施得恩意極深蓋兄弟天屬也此正相反之道理也息侯伐鄭十一年息侯伐鄭此假須就息上看得楚之盛衰當是時如息如蔡尚與中國相通皆會盟征伐及楚一盛則與中國絶矣蓋息蔡皆近楚之國楚既盛則必有吞併之意彼朝夕自救之不暇何暇及其他看此可見是時楚未強盛也何故蓋楚衰則邊楚之國必強楚盛則邊楚之國必弱大抵看左傳須旁看方可若一事只作一事看不可桓公宋督弒君與大夫二年左氏序宋督事極好觀其論督有無君之心而後動於惡此左氏識見髙逺處蓋人心各有所主使宋督有尊君之心決不敢為弒逆之事惟此心一蕩則縱橫放肆無所忌憚蓋督之殺孔父與殤公乃為惡之末流其有無君之心乃為惡之根本聖人所以過位變色入門鞠躬夫豈繁文末節哉蓋所以養其尊君之心也臧哀伯諫取郜大鼎二年哀伯之諫取郜鼎其中所言周家宗廟制度固當考然桓公於弒逆之事猶忍為之哀伯乃諫其取叛臣之鼎是猶不能三年之喪而緦小功之察者也哀伯亦可謂習而不察矣然看哀伯之諫周內史之言須看得天下之人皆習而不察哀伯魯之賢大夫也周內史周之良史也尚不知君臣之大義區區然惟納賂之是諫文辭之是取在賢者猶不知而況下賢者數等而為衆人者乎以此知當時天下之人視弒君弒父以為常矣條之役千畝之戰二年條及千畝之役皆在幽厲間又見得周衰諸侯之相侵有日矣夫人君命太子之名臣下視之以為輕重漢武名鈎弋之門為堯母故江充遂譖戾太子是知命名之際亦不可不謹也楚武王侵隨六年楚侵隨一假見得楚自此憑陵諸夏自前年蔡鄭會于鄧則始懼楚至此楚浸盛矣蓋外域之強弱常由中夏之盛衰政治元氣也兵革亂氣也元氣全則亂氣不能入元氣喪則亂氣乘之楚之為患其來有自矣如商之衰荆楚常為亂矣至髙宗時商盛故能冞入其阻其後周之盛時桃弧棘矢以共禦王事篳路藍縷以處草莽以其勤勞如此方服役之不暇可見其弱至此復悍然陵犯中國非專楚之罪也蓋政治之與兵革內憂之與外患其相為消長理之常耳魯以周班後鄭六年諸侯伐齊鄭忽有功魯以周班後鄭此假見得魯秉周禮舉春秋之初一事言之則以周班後鄭而致三國之師舉春秋之末言之則以不見天子不稽首而取齊侯之責哀二十年原始要終則魯之秉周禮可知然魯秉周禮見與於大國則甚易今也吾方秉禮而彼之加於我者大則甲兵小則責讓乃能終守而不替此則甚難此其所以魯一變而至於道然此非魯之君相能然蓋一國之風聲氣習能使之耳亦周公伯禽之化所漸者深也鄭忽辭昏六年北戎伐齊鄭忽救齊齊侯請妻之忽辭其言曰自求多福在我而已大國何為此言甚善彼祭仲之諫特以利害論之耳後世徒見昭公奔衛則咎其不用祭仲之言卒以無大國之助殊不知忽之敗正不在此特以不能充自求多福之言耳自求多福雖以堯為父而不能與丹朱舜為子而不能與瞽瞍周公為兄而不能與管蔡況大國乎後世不可因昭公之失而廢其言也楚子伐隨隨敗八年第二卷適當楚之方興故其載楚事為甚詳隨之敗止緣有一少師博議論之詳矣大抵小人之根未去則雖勝不足喜小人之根既去則雖敗不足憂此固已言之然而尚有未盡者蓋大而天下小而一國必有所謂體國之臣有所謂社稷之臣君存與存君亡與亡社稷之臣是也夫季梁之謀楚亦工矣言不用諫不行去之可也然必待少師之死而不去者蓋季梁隨之宗臣與國相為終始義不當去是以隨侯當時雖不用其言而楚人上左君必左其效謀畫計如初此季梁所以不去所謂君存與存君亡與亡者也楚子伐隨八年晉滅耿滅霍滅魏閔元年入春秋之初當時先聖王之後及三代所封之國尚小大皆錯其事可見者尚有一二到得後來翦滅吞併雖不盡見於傳以大略觀之見於傳者楚晉為多何故楚與晉蓋有説楚自是荆蠻之與中國相為消長中國是元氣元氣才衰邪氣便勝所以被他吞滅先王所封之國無足怪者楚之於中國蓋自商以來迭為盛衰商盛則楚衰商衰則楚盛如殷武詩所謂撻彼殷武奮伐荆楚罙入其阻裒荆之旅以此見商衰楚盛到得莫敢不來享莫敢不來王見得商盛楚衰及到周時周盛楚再衰如與晉戰時欒武子謂其訓之若敖蚡冒篳路藍縷以啓山林見得楚衰周盛到得東遷後周既衰楚自然盛所以楚武王僭號抗衡中國以此見中國與外域迭為消長楚固是荆蠻與中國相為消長何故晉亦吞中國如滅耿滅霍滅魏蓋緣晉不是先王所封乃是宗族作亂自封桓叔於曲沃其後恃其詐力自覆本宗以詐力為常事不復有先王之制固敢吞滅中國蓋緣他都是詐力無規矩典刑了若是他國如齊非不滅談滅遂亦不減於晉然尚有畏憚者蓋齊是太公後先王所封之國所謂典章文物法度尚在虢仲與芮梁荀賈伐曲沃九年虢仲芮伯梁伯荀侯賈伯伐曲沃此雖等間言語亦可以觀天下之勢何以見之蓋自此以後五國皆不見於傳盡為大國併吞了此又見世代升降處是豈不可以觀天下之大勢乎莫敖請濟師十二年十三年莫敖之為人徒外面加添而裏面初不長進蒲騷音消之役用鬭亷之謀能敗鄖師及伐絞之役幸而絞小復勝及其伐羅之時志滿意得徒恃前日之勝而謂小國不足敵是以輕敵而敗遂致有荒谷之縊大凡學者最怕外面加添裏面初不長進鄧曼謂鬬伯比非衆十三年楚屈瑕伐羅鬭伯比送之還謂其御曰莫敖必敗云云入告夫人鄧曼鄧曼曰大夫其非衆之謂看此一假便見得楚之在當時所謂盜亦有道夫楚夷狄之國耳以夷狄而憑陵諸夏其強如此其盛如此者豈不以亦有其道哉觀當時內則有鄧曼之賢以為之助內強可知外則有鬭亷伯比之智以為之謀外強可知內外俱有人所以到得如此強盛地位蓋大學之道必本於家齊而二南之化亦首於關睢豈非所謂盜亦有道乎鄭厲奔蔡十五年公會宋伐鄭十五年此卷載鄭事稍詳見得莊公始末當莊公之初殺弟囚母雖是天下極惡緣其權謀智略有以掩之固不甚覺及其季年公子互爭兵革不息病弊至此始露大抵人之一身於少壯時戕賊其血氣雖有疾亦自可以支持及其老也血氣既衰百病俱作如唐太宗初間內則肅清華夏外則蕩滌羌戎雖有殺兄戮弟閨門大惡亦緣貞觀之治有以掩之故不甚見及一傳髙宗百弊俱出學者切不可於一事二事上錯放過不理會雖其初未甚覺其後終不可掩也莊公單伯送王姬元年秋築王姬之館于外元年莊公之立桓公見殺於齊則莊公之於齊有不共戴天之讎而不能以復讎為念前輩論之詳矣然須識得莊公之要領王姬歸於齊魯絶之而不與主昏義也而魯則畏齊之強而不敢絶欲與之主昏內則畏清議而不敢與外則畏齊之見討而不敢絶其君臣之間宛轉商量一箇兩不相妨底道理故築王姬之館于外三傳之説不一然皆未必是凡天下之事不知夫不共戴天之讎義不可與者未足為憂既知之而求所以委曲回護者深可憂蓋其不知者良心一朝頓回則其發不可禦既知之而欲立一名字求以委曲回護亦終於此而已矣父子之間天屬之恩莊公報齊之心宜如火之必熱如水之必寒如手足之捍頭目安可以委曲安排回護使其兩不相妨至如伐郕一假亦然莊公本自畏齊而曰我實不德齊師何罪皆是要立一箇名字文飾之此其所以終於不振齊無知弒君諸兒八年看齊襄公須看得每舉而每得志是其所以速襄公之死觀其當時淫侈無度肆行不道無不得志如一滅紀則紀侯大去其國才以王人伐衛衛便服才欲滅郕郕便降至於欲會魯侯則魯侯至欲要薑氏則薑氏至每舉而每得志惟其得志之頻故所以為死期之速宜乎卒蹈無知篡弒之禍也左氏傳説卷一
